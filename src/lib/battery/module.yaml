__max_num_config_instances: &max_num_config_instances 3

module_name: battery

parameters:
    - group: Battery Calibration
      definitions:
        BAT${i}_V_EMPTY:
            description:
                short: Empty cell voltage
                long: |-
                    Per-cell voltage considered empty. Set above 3.5V; Li cells at high
                    load drop to damaging levels below ~10% SoC.
            type: float
            unit: V
            decimal: 2
            increment: 0.01
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [3.6, 3.6, 3.6]

        BAT${i}_V_CHARGED:
            description:
                short: Full cell voltage
                long: Per-cell voltage considered full. For accuracy, set below nominal (e.g., 4.2V).
            type: float
            unit: V
            decimal: 2
            increment: 0.01
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [4.05, 4.05, 4.05]

        BAT${i}_R_INTERNAL:
            description:
                short: Explicitly defines the per cell internal resistance for battery ${i}
                long: If non-negative, overrides the online-estimated internal resistance.
            type: float
            unit: Ohm
            min: -1.0
            max: 0.2
            decimal: 4
            increment: 0.0005
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [-1.0, -1.0, -1.0]

        BAT${i}_N_CELLS:
            description:
                short: Number of cells for battery ${i}.
            type: enum
            values:
                0: Unknown
                1: 1S Battery
                2: 2S Battery
                3: 3S Battery
                4: 4S Battery
                5: 5S Battery
                6: 6S Battery
                7: 7S Battery
                8: 8S Battery
                9: 9S Battery
                10: 10S Battery
                11: 11S Battery
                12: 12S Battery
                13: 13S Battery
                14: 14S Battery
                15: 15S Battery
                16: 16S Battery
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0, 0, 0]

        BAT${i}_CAPACITY:
            description:
                short: Battery ${i} capacity.
            type: float
            unit: mAh
            min: -1.0
            max: 100000
            decimal: 0
            increment: 50
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [-1.0, -1.0, -1.0]

        BAT${i}_SOURCE:
            description:
                short: Battery ${i} monitoring source.
                long: |-
                    Power Module/Analog: ADC or I2C power monitor (e.g. INA226).
                    External: battery status from MAVLink/CAN or an external driver.
                    ESCs: voltage and current from esc_status (requires ESC telemetry).
            type: enum
            values:
                -1: Disabled
                0: Power Module / Analog
                1: External
                2: ESCs
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0, -1, -1]

        BAT${i}_I_OVERWRITE:
            description:
                short: Battery ${i} idle current overwrite
                long: |-
                    Overrides unarmed idle current measurement with a constant (A).
                    Armed state always uses measured current. Useful for ESCs inaccurate
                    at no load. <=0: disabled.
            type: float
            decimal: 2
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0, 0, 0]

        BAT_LOW_THR:
            description:
                short: Low threshold.
                long: Battery low warning threshold; must exceed BAT_CRIT_THR.
            type: float
            unit: norm
            min: 0.12
            max: 0.5
            decimal: 2
            increment: 0.01
            default: 0.15

        BAT_CRIT_THR:
            description:
                short: Critical threshold.
                long: Battery critical threshold (below BAT_LOW_THR); typically triggers RTL.
            type: float
            unit: norm
            min: 0.05
            max: 0.5
            decimal: 2
            increment: 0.01
            default: 0.07

        BAT_EMERGEN_THR:
            description:
                short: Emergency threshold.
                long: Battery emergency threshold (below BAT_CRIT_THR); typically triggers landing.
            type: float
            unit: norm
            min: 0.03
            max: 0.5
            decimal: 2
            increment: 0.01
            default: 0.05

        BAT_AVRG_CURRENT:
            description:
                short: Expected battery current in flight.
                long: Seeds the in-flight average current estimate used for flight time and RTL triggering.
            type: float
            unit: A
            min: 0
            max: 500
            decimal: 2
            increment: 0.1
            default: 15
