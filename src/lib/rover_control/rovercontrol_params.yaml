module_name: rover_control
parameters:
- group: Rover Attitude Control
  definitions:
    RO_YAW_P:
      description:
        short: Proportional gain for closed loop yaw controller
      type: float
      default: 0.0
      min: 0
      max: 100
      increment: 0.01
      decimal: 3
- group: Rover Rate Control
  definitions:
    RO_YAW_STICK_DZ:
      description:
        short: Yaw stick deadzone
        long: Fraction of stick range interpreted as zero near center.
      type: float
      default: 0.1
      min: 0
      max: 1
      increment: 0.01
      decimal: 2
    RO_YAW_EXPO:
      description:
        short: Yaw rate expo factor
        long: "Input curve shape exponent. 0 = linear, 1 = cubic."
      type: float
      default: 0.0
      min: 0
      max: 1
      decimal: 2
    RO_YAW_SUPEXPO:
      description:
        short: Yaw rate super expo factor
        long: |-
          Refines input curve shape beyond RO_YAW_EXPO.
          0 = pure expo; 0.7 = enhanced feel; 0.95 = very strong (active near maxima only).
      type: float
      default: 0.0
      min: 0
      max: 0.95
      decimal: 2
    RO_YAW_RATE_TH:
      description:
        short: Yaw rate measurement threshold
        long: Yaw rates below this are treated as zero.
      type: float
      default: 3.0
      unit: deg/s
      min: 0
      max: 100
      increment: 0.01
      decimal: 2
    RO_YAW_RATE_P:
      description:
        short: Proportional gain for closed loop yaw rate controller
      type: float
      default: 0.0
      min: 0
      max: 100
      increment: 0.01
      decimal: 3
    RO_YAW_RATE_I:
      description:
        short: Integral gain for closed loop yaw rate controller
      type: float
      default: 0.0
      min: 0
      max: 100
      increment: 0.01
      decimal: 3
    RO_YAW_RATE_LIM:
      description:
        short: Yaw rate limit
        long: Caps yaw rate setpoints; maps controller inputs to yaw rate setpoints in Acro, Stabilized, and Position modes.
      type: float
      default: 0.0
      unit: deg/s
      min: 0
      max: 10000
      increment: 0.01
      decimal: 2
    RO_YAW_ACCEL_LIM:
      description:
        short: Yaw acceleration limit
        long: |-
          Caps rate of increase in yaw rate setpoints.
          -1 = disabled.
      type: float
      default: -1.0
      unit: deg/s^2
      min: -1
      max: 10000
      increment: 0.01
      decimal: 2
    RO_YAW_DECEL_LIM:
      description:
        short: Yaw deceleration limit
        long: |-
          Caps rate of decrease in yaw rate setpoints.
          -1 = disabled.
      type: float
      default: -1.0
      unit: deg/s^2
      min: -1
      max: 10000
      increment: 0.01
      decimal: 2
    RO_YAW_RATE_CORR:
      description:
        short: Yaw rate correction factor
        long: |-
          FF mapping correction for yaw rate controller.
          Increase (>1) if measured rate < setpoint, decrease (<1) otherwise.
          Especially useful for skid-steered rovers or those with misaligned wheels causing high turning friction.
      type: float
      default: 1.0
      min: 0.01
      max: 10000
      increment: 0.01
      decimal: 2
- group: Rover Velocity Control
  definitions:
    RO_MAX_THR_SPEED:
      description:
        short: Speed the rover drives at maximum throttle
        long: Maps speed linearly to throttle [-1, 1].
      type: float
      default: 0.0
      min: 0
      max: 100
      unit: m/s
      increment: 0.01
      decimal: 2
    RO_SPEED_P:
      description:
        short: Proportional gain for ground speed controller
      type: float
      default: 0.0
      min: 0
      max: 100
      increment: 0.01
      decimal: 2
    RO_SPEED_I:
      description:
        short: Integral gain for ground speed controller
      type: float
      default: 0.0
      min: 0
      max: 100
      increment: 0.001
      decimal: 3
    RO_SPEED_LIM:
      description:
        short: Speed limit
        long: Caps speed setpoints; maps controller inputs to speed setpoints in Position mode.
      type: float
      default: -1.0
      unit: m/s
      min: -1
      max: 100
      increment: 0.01
      decimal: 2
    RO_ACCEL_LIM:
      description:
        short: Acceleration limit
        long: |-
          -1 = disabled.
          For mecanum rovers: applies to longitudinal and lateral acceleration.
      type: float
      default: -1.0
      unit: m/s^2
      min: -1
      max: 100
      increment: 0.01
      decimal: 2
    RO_DECEL_LIM:
      description:
        short: Deceleration limit
        long: |-
          -1 = disabled; rover won't decelerate near waypoints in auto modes.
          For mecanum rovers: applies to longitudinal and lateral deceleration.
      type: float
      default: -1.0
      unit: m/s^2
      min: -1
      max: 100
      increment: 0.01
      decimal: 2
    RO_JERK_LIM:
      description:
        short: Jerk limit
        long: |-
          -1 = disabled; rover won't decelerate near waypoints in auto modes.
          For mecanum rovers: applies to longitudinal and lateral jerk.
      type: float
      default: -1.0
      unit: m/s^3
      min: -1
      max: 100
      increment: 0.01
      decimal: 2
    RO_SPEED_TH:
      description:
        short: Speed measurement threshold
        long: |-
          -1 = disabled.
          Speed below this is treated as zero.
      type: float
      default: 0.1
      unit: m/s
      min: 0
      max: 100
      increment: 0.01
      decimal: 2
    RO_SPEED_RED:
      description:
        short: Tuning parameter for the speed reduction based on the course error
        long: |-
          ```
          Reduced_speed = RO_MAX_THR_SPEED * (1 - normalized_course_error * RO_SPEED_RED)
          ```
          Normalized course error = angle between current course and bearing setpoint, mapped [0°, 180°] -> [0, 1].
          Higher = more speed reduction. Also determines arrival speed at waypoints in auto modes.
          -1 = disabled.
      type: float
      default: -1.0
      min: -1
      max: 100
      increment: 0.01
      decimal: 2
