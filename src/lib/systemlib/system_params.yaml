module_name: systemlib
parameters:
- group: System
  definitions:
    SYS_AUTOSTART:
      description:
        short: Auto-start script index
      type: int32
      default: 0
      reboot_required: true
      min: 0
      max: 9999999
    SYS_AUTOCONFIG:
      description:
        short: Automatically configure default values
        long: Platform-specific values used if available. RC* parameters preserved.
      type: enum
      values:
        0: Keep parameters
        1: Reset parameters to airframe defaults
      default: 0
    SYS_HITL:
      description:
        short: Enable HITL/SIH mode on next boot
        long: |-
          HITL/SIH mode disables sensors and preflight checks.

          -1 (external HITL): behaves as a real vehicle; only the parameter value differs (useful for log analysis).
      type: enum
      values:
        -1: external HITL
        0: HITL and SIH disabled
        1: HITL enabled
        2: SIH enabled
      default: 0
      reboot_required: true
    SYS_PARAM_VER:
      description:
        short: Parameter version
        long: Internal use. Airframe sets expected version via PARAM_DEFAULTS_VER; mismatch on boot resets and reloads parameters from airframe config.
      type: int32
      default: 1
      min: 0
    SYS_CAL_GYRO:
      description:
        short: Auto start gyro thermal calibration on next boot
        long: Reset to 0 automatically when calibration starts.
      type: int32
      default: 0
      min: 0
      max: 1
    SYS_CAL_ACCEL:
      description:
        short: Auto start accel thermal calibration on next boot
        long: Reset to 0 automatically when calibration starts.
      type: int32
      default: 0
      min: 0
      max: 1
    SYS_CAL_BARO:
      description:
        short: Auto start baro thermal calibration on next boot
        long: Reset to 0 automatically when calibration starts.
      type: int32
      default: 0
      min: 0
      max: 1
    SYS_CAL_TDEL:
      description:
        short: Required temperature rise during thermal calibration
        long: Each sensor calibrates when temperature rises this much above start. Insufficient rise causes indefinite calibration; power cycle to exit.
      type: int32
      default: 24
      unit: celcius
      min: 10
    SYS_CAL_TMIN:
      description:
        short: Minimum starting temperature for thermal calibration
        long: Data below this temperature is ignored during calibration.
      type: int32
      default: 5
      unit: celcius
    SYS_CAL_TMAX:
      description:
        short: Maximum starting temperature for thermal calibration
        long: Calibration will not start if any sensor is above this temperature.
      type: int32
      default: 10
      unit: celcius
    SYS_HAS_GPS:
      description:
        short: Control if the vehicle has a GPS
        long: When 0, sensors hub skips sensor_gps and GPS is unavailable system-wide.
      type: boolean
      default: 1
      reboot_required: true
    SYS_HAS_NUM_GNSS:
      description:
        short: Control if and how many GNSS receivers are required
        long: |-
          0: no minimum; divergence/loss warn but never trigger COM_GNSSLOSS_ACT.
          1-N: N receivers required for arming; below-count in flight triggers COM_GNSSLOSS_ACT.
          2 also triggers COM_GNSSLOSS_ACT on position divergence between receivers.
      type: int32
      default: 0
      min: 0
      max: 2
    SYS_HAS_MAG:
      description:
        short: Control if and how many magnetometers are expected
        long: |-
          0: no mag expected; preflight passes without one.
          1-N: N magnetometers required for preflight.
      type: int32
      default: 1
      reboot_required: true
    SYS_HAS_BARO:
      description:
        short: Control if the vehicle has a barometer
        long: When 0, preflight skips barometer check (e.g., Omnibus F4 SD variants without baro).
      type: boolean
      default: 1
      reboot_required: true
    SYS_HAS_NUM_ASPD:
      description:
        short: Control if the vehicle has an airspeed sensor
        long: When 0, preflight skips airspeed sensor check.
      type: int32
      default: 0
      min: 0
      max: 1
    SYS_HAS_NUM_DIST:
      description:
        short: Number of distance sensors to check being available
        long: Preflight fails if fewer than N sensors have valid data. 0 disables.
      type: int32
      default: 0
      min: 0
      max: 4
    SYS_HAS_NUM_OF:
      description:
        short: Number of optical flow sensors required to be available
        long: Preflight fails if fewer than N sensors have valid data.
      type: int32
      default: 0
      min: 0
      max: 1
    SYS_FAC_CAL_MODE:
      description:
        short: Enable factory calibration mode
        long: Stores sensor calibrations to /fs/mtd_caldata. Only on boards with separate calibration storage.
      type: enum
      values:
        0: Disabled
        1: All sensors
        2: All sensors except mag
      default: 0
    SYS_BL_UPDATE:
      description:
        short: Bootloader update
        long: |-
          WARNING: do not cut power during update; recovery via JTAG required if interrupted.

          - Insert an SD card
          - Enable this parameter
          - Reboot the board
          - Wait at least 2 minutes for the board to return
          - If it does not return, check bootlog.txt on the SD card
      type: boolean
      default: 0
      reboot_required: true
    SYS_FAILURE_EN:
      description:
        short: Enable failure injection
        long: |-
          Allows MAVLink INJECT_FAILURE commands.
          WARNING: can easily cause crashes; use with caution.
      type: boolean
      default: 0
