module_name: mixer_module
parameters:
- group: PWM Outputs
  definitions:
    THR_MDL_FAC:
      description:
        short: Thrust to motor control signal model parameter
        long: |-
          Models the nonlinear motor signal (e.g. PWM) to static thrust relationship:

          ```
          rel_thrust = factor * rel_signal^2 + (1-factor) * rel_signal
          ```
          where rel_thrust and rel_signal are normalized 0-1.
      type: float
      default: 0.0
      min: 0.0
      max: 1.0
      decimal: 1
      increment: 0.1
