module_name: mixer_module
parameters:
- group: Mixer Output
  definitions:
    MC_AIRMODE:
      description:
        short: Multicopter air-mode
        long: |-
          Increases total thrust to maintain attitude/rate control at low and high throttle.

          Disable during tuning: amplifies divergence on an unstable vehicle.

          Yaw air-mode requires an arming switch.
      type: enum
      values:
        0: Disabled
        1: Roll/Pitch
        2: Roll/Pitch/Yaw
      default: 0
