module_name: mixer_module
parameters:
- group: Mixer Output
  definitions:
    MC_AIRMODE_LIM:
      description:
        short: Roll/pitch airmode authority limit
        long: |-
          Maximum total-thrust increase the mixer may add to keep roll/pitch authority at
          low and high throttle, as a fraction [0,1] of actuator range (0 = off, 1 = full).
          Disable (0) while tuning: it lets an untuned, unstable loop diverge.
      type: float
      default: 0.0
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.05

    MC_AIRMODE_YLIM:
      description:
        short: Yaw airmode authority limit
        long: |-
          Same as MC_AIRMODE_LIM but for yaw. 0 (deferred yaw) is safe with the arm stick
          gesture; greater than 0 enables yaw air-mode and requires an arming switch
          (incompatible with MAN_ARM_GESTURE).
      type: float
      default: 0.0
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.05
