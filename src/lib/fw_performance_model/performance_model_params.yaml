module_name: fw_performance_model
parameters:
- group: FW Performance
  definitions:
    FW_THR_TRIM:
      description:
        short: Trim throttle
        long: Level-flight throttle at sea level/ISA at FW_AIRSPD_TRIM.
      type: float
      default: 0.6
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_THR_ASPD_MIN:
      description:
        short: Throttle at min airspeed
        long: |-
          Level-flight throttle at sea level/ISA at FW_AIRSPD_MIN.
          0: disables airspeed-to-throttle mapping below FW_AIRSPD_TRIM.
      type: float
      default: 0.0
      min: 0
      max: 1
      decimal: 2
      increment: 0.01
    FW_THR_ASPD_MAX:
      description:
        short: Throttle at max airspeed
        long: |-
          Level-flight throttle at sea level/ISA at FW_AIRSPD_MAX.
          0: disables airspeed-to-throttle mapping.
      type: float
      default: 0.0
      min: 0
      max: 1
      decimal: 2
      increment: 0.01
    FW_SERVICE_CEIL:
      description:
        short: Service ceiling
        long: |-
          ISA altitude at which the vehicle at WEIGHT_BASE achieves 0.5 m/s climb at FW_THR_MAX.
          Used for air-density correction in FW_T_CLMB_MAX. Negative: disabled.
      type: float
      default: -1.0
      min: -1.0
      unit: m
      decimal: 0
      increment: 1.0
    WEIGHT_BASE:
      description:
        short: Vehicle base weight
        long: "Weight at which performance limits were derived. Zero/negative: disables trim-throttle and min-airspeed weight compensation."
      type: float
      default: -1.0
      unit: kg
      decimal: 1
      increment: 0.5
    WEIGHT_GROSS:
      description:
        short: Vehicle gross weight
        long: "Actual vehicle weight; differs from WEIGHT_BASE when payload or battery mass changes. Zero/negative: disables trim-throttle and min-airspeed weight compensation."
      type: float
      default: -1.0
      unit: kg
      decimal: 1
      increment: 0.1
    FW_T_CLMB_MAX:
      description:
        short: Maximum climb rate
        long: |-
          Max calibrated climb rate at FW_THR_MAX and trim airspeed.
          For electric aircraft, verify achievable at end of flight (low battery).
      type: float
      default: 5.0
      unit: m/s
      min: 1.0
      decimal: 1
      increment: 0.5
    FW_T_SINK_MIN:
      description:
        short: Minimum descent rate
        long: Min calibrated sink rate at THR_MIN, at the same airspeed used to measure FW_T_CLMB_MAX.
      type: float
      default: 2.0
      unit: m/s
      min: 1.0
      decimal: 1
      increment: 0.5
    FW_AIRSPD_TRIM:
      description:
        short: Trim (Cruise) Airspeed
        long: |-
          Default CAS setpoint when airspeed control is active.
          Corresponds to level flight at default weight.
      type: float
      default: 15.0
      unit: m/s
      min: 0.5
      decimal: 1
      increment: 0.5
    FW_AIRSPD_STALL:
      description:
        short: Stall Airspeed (CAS)
        long: Used for airspeed sensor failure detection and control surface scaling limits.
      type: float
      default: 7.0
      unit: m/s
      min: 0.5
      decimal: 1
      increment: 0.5
    FW_AIRSPD_MIN:
      description:
        short: Minimum Airspeed (CAS)
        long: |-
          TECS aggressively recovers airspeed if below this. Set with margin above FW_AIRSPD_STALL.
          Applies at default load factor (level flight, default weight);
          auto-adapted via roll setpoint and WEIGHT_GROSS/WEIGHT_BASE.
      type: float
      default: 10.0
      unit: m/s
      min: 0.5
      decimal: 1
      increment: 0.5
    FW_AIRSPD_MAX:
      description:
        short: Maximum Airspeed (CAS)
        long: The maximal airspeed (calibrated airspeed) the user is able to command.
      type: float
      default: 20.0
      unit: m/s
      min: 0.5
      decimal: 1
      increment: 0.5
    FW_AIRSPD_FLP_SC:
      description:
        short: Airspeed scale with full flaps
        long: Factor applied to the minimum and stall airspeed when flaps are fully
          deployed.
      type: float
      default: 1.0
      min: 0.5
      max: 1
      decimal: 2
      increment: 0.01
