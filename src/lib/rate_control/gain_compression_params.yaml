module_name: rate_control
parameters:
- group: FW Rate Control
  definitions:
    FW_GC_EN:
      description:
        short: Enable rate gain compression
      type: boolean
      default: 1
    FW_GC_GAIN_MIN:
      description:
        short: Compression gain lower limit
        long: The range of the compression gain is between this parameter and 1.0
      type: float
      default: 0.3
      min: 0.0
      max: 1.0
      increment: 0.01
      decimal: 2
