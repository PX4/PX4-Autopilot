module_name: airspeed_selector
parameters:
- group: Airspeed Validator
  definitions:
    ASPD_WIND_NSD:
      description:
        short: Wind estimator wind process noise spectral density
        long: |-
          Wind process noise of the internal wind estimator(s) of the airspeed selector.
          When unaided, the wind estimate uncertainty (1-sigma, in m/s) increases by this amount every second.
      type: float
      default: 0.1
      min: 0
      max: 1
      unit: m/s^2/sqrt(Hz)
      decimal: 2
    ASPD_SCALE_NSD:
      description:
        short: Wind estimator true airspeed scale process noise spectral density
        long: |-
          Airspeed scale process noise of the internal wind estimator(s) of the airspeed selector.
          When unaided, the scale uncertainty (1-sigma, unitless) increases by this amount every second.
      type: float
      default: 0.0001
      min: 0
      max: 0.1
      unit: 1/s/sqrt(Hz)
      decimal: 5
    ASPD_TAS_NOISE:
      description:
        short: Wind estimator true airspeed measurement noise
        long: True airspeed measurement noise of the internal wind estimator(s) of
          the airspeed selector.
      type: float
      default: 1.4
      min: 0
      max: 4
      unit: m/s
      decimal: 1
    ASPD_BETA_NOISE:
      description:
        short: Wind estimator sideslip measurement noise
        long: Sideslip measurement noise of the internal wind estimator(s) of the
          airspeed selector.
      type: float
      default: 0.15
      min: 0
      max: 1
      unit: rad
      decimal: 3
    ASPD_TAS_GATE:
      description:
        short: Gate size for true airspeed fusion
        long: Sets the number of standard deviations used by the innovation consistency
          test.
      type: int32
      default: 4
      min: 1
      max: 5
      unit: SD
    ASPD_BETA_GATE:
      description:
        short: Gate size for sideslip angle fusion
        long: Sets the number of standard deviations used by the innovation consistency
          test.
      type: int32
      default: 1
      min: 1
      max: 5
      unit: SD
    ASPD_SCALE_APPLY:
      description:
        short: Controls when to apply the new estimated airspeed scale(s)
      type: enum
      values:
        0: Do not automatically apply the estimated scale
        1: Apply the estimated scale after disarm
        2: Apply the estimated scale in air
      default: 2
    ASPD_SCALE_1:
      description:
        short: Scale of airspeed sensor 1
        long: This is the scale IAS --> CAS of the first airspeed sensor instance
      type: float
      default: 1.0
      min: 0.5
      max: 2.0
      decimal: 2
    ASPD_SCALE_2:
      description:
        short: Scale of airspeed sensor 2
        long: This is the scale IAS --> CAS of the second airspeed sensor instance
      type: float
      default: 1.0
      min: 0.5
      max: 2.0
      decimal: 2
    ASPD_SCALE_3:
      description:
        short: Scale of airspeed sensor 3
        long: This is the scale IAS --> CAS of the third airspeed sensor instance
      type: float
      default: 1.0
      min: 0.5
      max: 2.0
      decimal: 2
    ASPD_PRIMARY:
      description:
        short: Index or primary airspeed measurement source
      type: enum
      values:
        0: Groundspeed minus windspeed
        1: First airspeed sensor
        2: Second airspeed sensor
        3: Third airspeed sensor
        4: Thrust based airspeed
      default: 1
      reboot_required: true
    ASPD_DO_CHECKS:
      description:
        short: Enable checks on airspeed sensors
        long: |-
          Controls which checks are run to check airspeed data for validity. Only applied if ASPD_PRIMARY > 0.

          Note: The missing data check (bit 0) is implicitly always enabled when ASPD_DO_CHECKS > 0, even if bit 0 is not explicitly set.
      type: bitmask
      bit:
        0: Only data missing check (triggers if more than 1s no data)
        1: Data stuck (triggers if data is exactly constant for 2s in FW mode)
        2: Innovation check (see ASPD_FS_INNOV)
        3: Load factor check (triggers if measurement is below stall speed)
        4: First principle check (airspeed change vs. throttle and pitch)
      default: 7
      min: 0
      max: 31
    ASPD_FALLBACK:
      description:
        short: Fallback options
      type: enum
      values:
        0: Fallback only to other airspeed sensors
        1: Fallback to groundspeed-minus-windspeed airspeed estimation
        2: Fallback to thrust based airspeed estimation
      default: 0
    ASPD_FS_INNOV:
      description:
        short: Airspeed failure innovation threshold
        long: |-
          This specifies the minimum airspeed innovation required to trigger a failsafe. Larger values make the check less sensitive,
          smaller values make it more sensitive. Large innovations indicate an inconsistency between predicted (groundspeed - windspeeed)
          and measured airspeed.
          The time required to detect a fault when the threshold is exceeded depends on the size of the exceedance and is controlled by the ASPD_FS_INTEG parameter.
      type: float
      default: 5.0
      unit: m/s
      min: 0.5
      max: 10.0
      decimal: 1
    ASPD_FS_INTEG:
      description:
        short: Airspeed failure innovation integral threshold
        long: |-
          This sets the time integral of airspeed innovation exceedance above ASPD_FS_INNOV required to trigger a failsafe.
          Larger values make the check less sensitive, smaller positive values make it more sensitive.
      type: float
      default: 10.0
      unit: m
      min: 0.0
      max: 50.0
      decimal: 1
    ASPD_FS_T_STOP:
      description:
        short: Airspeed failsafe stop delay
        long: Delay before stopping use of airspeed sensor if checks indicate sensor
          is bad.
      type: float
      default: 1.0
      unit: s
      min: 0.0
      decimal: 1
    ASPD_FS_T_START:
      description:
        short: Airspeed failsafe start delay
        long: |-
          Delay before switching back to using airspeed sensor if checks indicate sensor is good.
          Set to a negative value to disable the re-enabling in flight.
      type: float
      default: -1.0
      unit: s
      min: -1.0
      decimal: 1
    ASPD_WERR_THR:
      description:
        short: Horizontal wind uncertainty threshold for valid ground-minus-wind
        long: |-
          The airspeed alternative derived from groundspeed and heading will be declared valid
          as soon and as long the horizontal wind uncertainty is below this value.
      type: float
      default: 2.0
      unit: m/s
      min: 0.01
      max: 5
      decimal: 2
    ASPD_FP_T_WINDOW:
      description:
        short: First principle airspeed check time window
        long: |-
          Window for comparing airspeed change to throttle and pitch change.
          Triggers when the airspeed change within this window is negative while throttle increases
          and the vehicle pitches down.
          Is meant to catch degrading airspeed blockages as can happen when flying through icing conditions.
          Relies on  FW_THR_TRIM being set accurately.
      type: float
      default: 2.0
      unit: s
      min: 0
      decimal: 1
