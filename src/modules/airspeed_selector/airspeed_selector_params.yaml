module_name: airspeed_selector
parameters:
- group: Airspeed Validator
  definitions:
    ASPD_WIND_NSD:
      description:
        short: Wind estimator wind process noise spectral density
        long: Unaided wind estimate uncertainty (1-sigma) grows by this value per second.
      type: float
      default: 0.1
      min: 0
      max: 1
      unit: m/s^2/sqrt(Hz)
      decimal: 2
    ASPD_TAS_NOISE:
      description:
        short: Wind estimator true airspeed measurement noise
      type: float
      default: 1.4
      min: 0
      max: 4
      unit: m/s
      decimal: 1
    ASPD_SCALE_APPLY:
      description:
        short: Controls when to apply the new estimated airspeed scale(s)
      type: enum
      values:
        0: Do not automatically apply the estimated scale
        1: Apply the estimated scale after disarm
        2: Apply the estimated scale in air
      default: 2
    ASPD_SCALE_1:
      description:
        short: Scale of airspeed sensor 1
        long: IAS->CAS scale for sensor 1.
      type: float
      default: 1.0
      min: 0.5
      max: 2.0
      decimal: 2
    ASPD_SCALE_2:
      description:
        short: Scale of airspeed sensor 2
        long: IAS->CAS scale for sensor 2.
      type: float
      default: 1.0
      min: 0.5
      max: 2.0
      decimal: 2
    ASPD_SCALE_3:
      description:
        short: Scale of airspeed sensor 3
        long: IAS->CAS scale for sensor 3.
      type: float
      default: 1.0
      min: 0.5
      max: 2.0
      decimal: 2
    ASPD_PRIMARY:
      description:
        short: Index or primary airspeed measurement source
      type: enum
      values:
        0: Groundspeed minus windspeed
        1: First airspeed sensor
        2: Second airspeed sensor
        3: Third airspeed sensor
        4: Thrust based airspeed
      default: 1
      reboot_required: true
    ASPD_DO_CHECKS:
      description:
        short: Enable checks on airspeed sensors
        long: Only applies if ASPD_PRIMARY > 0. Bit 0 (missing data) is implicitly enabled whenever any check is active.
      type: bitmask
      bit:
        0: Only data missing check (triggers if more than 1s no data)
        1: Data stuck (triggers if data is exactly constant for 2s in FW mode)
        2: Innovation check (see ASPD_FS_INNOV)
        3: Load factor check (triggers if measurement is below stall speed)
        4: First principle check (airspeed change vs. throttle and pitch)
      default: 7
      min: 0
      max: 31
    ASPD_FALLBACK:
      description:
        short: Fallback options
      type: enum
      values:
        0: Fallback only to other airspeed sensors
        1: Fallback to groundspeed-minus-windspeed airspeed estimation
        2: Fallback to thrust based airspeed estimation
      default: 0
    ASPD_FS_INNOV:
      description:
        short: Airspeed failure innovation threshold
        long: |-
          Min innovation to trigger failsafe. Larger = less sensitive. Large values indicate groundspeed-windspeed vs measured inconsistency.
          Detection time scales with exceedance size (see ASPD_FS_INTEG).
      type: float
      default: 5.0
      unit: m/s
      min: 0.5
      max: 10.0
      decimal: 1
    ASPD_FS_INTEG:
      description:
        short: Airspeed failure innovation integral threshold
        long: Time integral of innovation exceedance above ASPD_FS_INNOV to trigger a failsafe. Larger = less sensitive.
      type: float
      default: 10.0
      unit: m
      min: 0.0
      max: 50.0
      decimal: 1
    ASPD_FS_T_STOP:
      description:
        short: Airspeed failsafe stop delay
      type: float
      default: 1.0
      unit: s
      min: 0.0
      decimal: 1
    ASPD_FS_T_START:
      description:
        short: Airspeed failsafe start delay
        long: Negative value disables in-flight re-enabling.
      type: float
      default: -1.0
      unit: s
      min: -1.0
      decimal: 1
    ASPD_WERR_THR:
      description:
        short: Horizontal wind uncertainty threshold for valid ground-minus-wind
      type: float
      default: 2.0
      unit: m/s
      min: 0.01
      max: 5
      decimal: 2
    ASPD_FP_T_WINDOW:
      description:
        short: First principle airspeed check time window
        long: |-
          Triggers when airspeed change within this window is negative while throttle increases and vehicle pitches down.
          Catches degrading blockages (e.g. icing). Requires accurate FW_THR_TRIM.
      type: float
      default: 2.0
      unit: s
      min: 0
      decimal: 1
