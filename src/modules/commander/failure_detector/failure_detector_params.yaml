module_name: failure_detector
parameters:
- group: Failure Detector
  definitions:
    FD_FAIL_R:
      description:
        short: FailureDetector Max Roll
        long: |-
          Triggers attitude_failure flag when exceeded.
          Flag: flight termination (CBRK_FLIGHTTERM=0), setting outputs to failsafe values.
          On takeoff: lockdown (ignores CBRK_FLIGHTTERM), disarms motors without failsafe outputs.
          0 disables.
      type: int32
      default: 60
      min: 0
      max: 180
      unit: deg
    FD_FAIL_P:
      description:
        short: FailureDetector Max Pitch
        long: |-
          Triggers attitude_failure flag when exceeded.
          Flag: flight termination (CBRK_FLIGHTTERM=0), setting outputs to failsafe values.
          On takeoff: lockdown (ignores CBRK_FLIGHTTERM), disarms motors without failsafe outputs.
          0 disables.
      type: int32
      default: 60
      min: 0
      max: 180
      unit: deg
    FD_FAIL_R_TTRI:
      description:
        short: Roll failure trigger time
        long: Seconds roll must exceed FD_FAIL_R to be considered a failure.
      type: float
      default: 0.3
      unit: s
      min: 0.02
      max: 5
      decimal: 2
    FD_FAIL_P_TTRI:
      description:
        short: Pitch failure trigger time
        long: Seconds pitch must exceed FD_FAIL_P to be considered a failure.
      type: float
      default: 0.3
      unit: s
      min: 0.02
      max: 5
      decimal: 2
    FD_EXT_ATS_EN:
      description:
        short: Enable PWM input from external ATS for failsafe
        long: |-
          Active on AUX5 or MAIN5 (board-dependent).
          Required by ASTM F3322-18.
      type: boolean
      default: 0
      reboot_required: true
    FD_EXT_ATS_TRIG:
      description:
        short: External ATS PWM threshold for failsafe
        long: Required by ASTM F3322-18.
      type: int32
      default: 1900
      unit: us
      decimal: 2
    FD_IMB_PROP_THR:
      description:
        short: Imbalanced propeller check threshold
        long: Imbalanced propeller metric (horiz + vert acceleration variance) threshold. 0 disables.
      type: int32
      default: 30
      min: 0
      max: 1000
      increment: 1
    FD_ALT_LOSS:
      description:
        short: Altitude loss threshold for termination and parachute deployment
        long: "0 disables."
      type: float
      default: 0.0
      min: 0.0
      max: 200.0
      unit: m
      decimal: 1
      increment: 0.5
    FD_ALT_LOSS_T:
      description:
        short: Altitude loss failure trigger time
        long: Seconds threshold must be exceeded before failure is declared.
      type: float
      default: 1.0
      min: 0.02
      max: 5.0
      unit: s
      decimal: 2
