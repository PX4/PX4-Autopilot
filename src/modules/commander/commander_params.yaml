module_name: commander
parameters:
- group: Commander
  definitions:
    COM_DL_LOSS_T:
      description:
        short: GCS connection loss time threshold
        long: Seconds without datalink before the GCS connection lost mode triggers.
      type: int32
      default: 10
      unit: s
      min: 5
      max: 300
      decimal: 1
      increment: 1
    COM_HLDL_LOSS_T:
      description:
        short: High Latency Datalink loss time threshold
        long: Seconds without datalink before the data link lost mode triggers.
      type: int32
      default: 120
      unit: s
      min: 60
      max: 3600
    COM_RC_LOSS_T:
      description:
        short: Manual control loss timeout
        long: |-
          Seconds without a new setpoint from RC or Joystick before connection is considered lost.
          Keep short: the vehicle holds the last setpoint until timeout.
          Must exceed the RC/Joystick update interval.
      type: float
      default: 0.5
      unit: s
      min: 0
      max: 35
      decimal: 1
      increment: 0.1
    COM_HOME_EN:
      description:
        short: Home position enabled
        long: |-
          Automatically set home position if possible.

          During missions, lat/lon is locked and won't reset on intermediate landings; only updates on mission complete or landing outside a mission. Altitude still corrects for GNSS vertical drift within 2 min of takeoff.
      type: boolean
      default: 1
      reboot_required: true
    COM_HOME_IN_AIR:
      description:
        short: Allows setting the home position after takeoff
        long: Back-computes home from local position estimate if available; otherwise
          uses current position.
      type: boolean
      default: 0
    COM_RC_IN_MODE:
      description:
        short: Manual control input source configuration
        long: |-
          Selects stick input: RC or MAVLink joystick. Priority sources switch immediately when valid.
      type: enum
      values:
        0: RC only (requires calibration)
        1: MAVLink only (disables RC checks)
        2: RC or MAVLink with fallback
        3: RC or MAVLink keep first until reboot
        4: Disable manual control
        5: 'Prio: RC > MAVL 1 > MAVL 2'
        6: 'Prio: MAVL 1 > MAVL 2 > RC'
        7: 'Prio: RC > MAVL 2 > MAVL 1'
        8: 'Prio: MAVL 2 > MAVL 1 > RC'
      default: 3
    COM_DISARM_LAND:
      description:
        short: Time-out for auto disarm after landing
        long: |-
          Positive: seconds of landing detection before auto-disarm. Zero/negative: disabled.
      type: float
      default: 2.0
      unit: s
      decimal: 1
      increment: 0.1
    COM_DISARM_PRFLT:
      description:
        short: Time-out for auto disarm if not taking off
        long: |-
          Positive: seconds after arming for takeoff, else disarms. Negative: disabled.
      type: float
      default: 10.0
      unit: s
      decimal: 1
      increment: 0.1
    COM_ARM_WO_GPS:
      description:
        short: Arming without GNSS configuration
        long: Controls arming without GNSS for modes requiring global position (when
          EKF2_GPS_CHECK fails).
      type: enum
      values:
        0: Deny arming
        1: Allow arming (with warning)
        2: Allow arming (no warning)
      default: 1
    COM_GNSSLOSS_ACT:
      description:
        short: GNSS loss failsafe mode
        long: |-
          Triggers when GNSS count drops below SYS_HAS_NUM_GNSS (disabled if 0), or (with
          SYS_HAS_NUM_GNSS=2) when two receivers disagree beyond reported accuracy (otherwise warning only).
          Values above Warning also block arming.
      type: enum
      values:
        0: Warning
        1: Return
        2: Land
        3: Terminate
      default: 0
    COM_ARM_SWISBTN:
      description:
        short: Arm switch is a momentary button
        long: "0: toggle on switch transition. 1: hold to trigger (like stick gesture)."
      type: boolean
      default: 0
    COM_LOW_BAT_ACT:
      description:
        short: Battery failsafe mode
        long: See BAT_CRIT_THR and BAT_EMERGEN_THR for battery state definitions.
      type: enum
      values:
        0: Warning
        2: Land mode
        3: Return at critical level, land at emergency level
      default: 0
    COM_FAIL_ACT_T:
      description:
        short: Delay between failsafe condition triggered and failsafe reaction
        long: |-
          Holds in Hold mode before entering failsafe, letting the user react.
          Mode switches allowed; stick override (COM_RC_OVERRIDE) is not.
          Afterwards failsafe triggers and stick override re-enables.
          0 disables.
      type: float
      default: 5.0
      unit: s
      min: 0.0
      max: 25.0
      decimal: 1
    COM_OF_LOSS_T:
      description:
        short: Offboard connection loss timeout
        long: See COM_OBL_RC_ACT to configure the action.
      type: float
      default: 1.0
      unit: s
      min: 0
      max: 60
      increment: 0.01
    COM_QC_ACT:
      description:
        short: Set action after a quadchute
      type: enum
      values:
        -1: Warning only
        0: Return mode
        1: Land mode
        2: Hold mode
      default: 0
    COM_OBL_RC_ACT:
      description:
        short: Set offboard loss failsafe mode
        long: Triggered after timeout set by COM_OF_LOSS_T.
      type: enum
      values:
        0: Position mode
        1: Altitude mode
        2: Stabilized
        3: Return mode
        4: Land mode
        5: Hold mode
        6: Terminate
        7: Disarm
      default: 0
    COM_ARM_IMU_ACC:
      description:
        short: Max accelerometer inconsistency for arming
        long: Max inconsistency between IMU accelerometers to allow arming.
      type: float
      default: 0.7
      unit: m/s^2
      min: 0.1
      max: 1.0
      decimal: 2
      increment: 0.05
    COM_ARM_IMU_GYR:
      description:
        short: Max rate gyro inconsistency for arming
        long: Max inconsistency between IMU rate gyros to allow arming.
      type: float
      default: 0.25
      unit: rad/s
      min: 0.02
      max: 0.3
      decimal: 3
      increment: 0.01
    COM_ARM_MAG_ANG:
      description:
        short: Max magnetic field inconsistency for arming
        long: |-
          Max inconsistency between magnetometers to allow arming.
          -1 to disable.
      type: int32
      default: 60
      unit: deg
      min: 3
      max: 180
    COM_ARM_MAG_STR:
      description:
        short: Enable mag strength preflight check
        long: Blocks arming (or warns) when EKF2_MAG_CHECK detects a strong magnetic
          disturbance.
      type: enum
      values:
        0: Disabled
        1: Deny arming
        2: Warning only
      default: 2
    COM_RC_OVERRIDE:
      description:
        short: Enable manual control stick override
        long: |-
          Deflection > COM_RC_STICK_OV switches to Position (or Altitude if unavailable), returning control to pilot.
          Only affects multicopters and VTOLs in MC mode.
      type: bitmask
      bit:
        0: Enable override during auto modes (except for in critical battery reaction)
        1: Enable override during offboard mode
      default: 1
      min: 0
      max: 3
    COM_RC_STICK_OV:
      description:
        short: Stick override threshold
        long: Joystick deflection threshold to trigger COM_RC_OVERRIDE pilot takeover.
      type: float
      default: 30.0
      unit: '%'
      min: 5
      max: 80
      decimal: 0
      increment: 0.05
    COM_ARM_MIS_REQ:
      description:
        short: Require valid mission to arm
        long: "0: arm without valid mission allowed."
      type: boolean
      default: 0
    COM_ARM_AUTH_REQ:
      description:
        short: Require arm authorization to arm
        long: "0: arm without authorization."
      type: boolean
      default: 0
    COM_ARM_AUTH_ID:
      description:
        short: Arm authorizer system id
        long: Used if COM_ARM_AUTH_REQ is set.
      type: int32
      default: 10
    COM_ARM_AUTH_MET:
      description:
        short: Arm authorization method
        long: Used if COM_ARM_AUTH_REQ is set.
      type: enum
      values:
        0: one arm (arm on auth received)
        1: two step arm (1st=request, 2nd=arm if OK)
      default: 0
    COM_FLTMODE_BOOT:
      description:
        short: Flight mode on boot
        long: Set on boot/power cycle, before any RC input or mode command.
      type: enum
      values:
        0: Manual
        1: Altitude
        2: Position
        3: Mission
        4: Hold
        6: Position Slow
        8: Altitude Cruise
        10: Acro
        14: Offboard
        15: Stabilized
        17: Takeoff
        23: External 1
        24: External 2
        25: External 3
        26: External 4
        27: External 5
        28: External 6
        29: External 7
        30: External 8
      default: 4
    COM_ARM_ON_BOOT:
      description:
        short: Arm automatically on boot
        long: |-
          Auto-arms when all preflight checks pass after boot; will not re-arm after manual disarm.
          No effect if COM_ARMABLE=0.
      type: boolean
      default: 0
      reboot_required: true
    COM_ARM_AUTH_TO:
      description:
        short: Arm authorization timeout
        long: |-
          Timeout for authorizer answer.
          Used if COM_ARM_AUTH_REQ is set.
      type: float
      default: 1
      unit: s
      decimal: 1
      increment: 0.1
    COM_POS_FS_EPH:
      description:
        short: Horizontal position error threshold for hovering systems
        long: |-
          Triggers failsafe when EPH exceeds this threshold.
          Hysteresis: invalidation threshold is 2.5× validation threshold.
          Only for multicopters and VTOLs in hover mode. Independent from EKF2_NOAID_TOUT.
          -1 to disable.
      type: float
      default: 5.0
      unit: m
      min: -1
      max: 400
      decimal: 1
    COM_VEL_FS_EVH:
      description:
        short: Horizontal velocity error threshold
        long: |-
          Triggers failsafe when EVH exceeds this threshold.
          Default suits multicopters; increase for fixed-wing.
          Hysteresis: invalidation threshold is 2.5× validation threshold.
      type: float
      default: 1.0
      unit: m/s
      min: 0
      decimal: 1
    COM_FLIGHT_UUID:
      description:
        short: Next flight UUID
        long: Auto-incremented on disarm. First flight is 0.
      category: System
      type: int32
      default: 0
      volatile: true
      min: 0
    NAV_DLL_ACT:
      description:
        short: Set GCS connection loss failsafe mode
        long: Triggered after COM_DL_LOSS_T timeout.
      type: enum
      values:
        0: Disabled
        1: Hold mode
        2: Return mode
        3: Land mode
        5: Terminate
        6: Disarm
      default: 0
    NAV_RCL_ACT:
      description:
        short: Set manual control loss failsafe mode
        long: Triggered after COM_RC_LOSS_T timeout.
      type: enum
      values:
        1: Hold mode
        2: Return mode
        3: Land mode
        5: Terminate
        6: Disarm
      default: 2
    COM_RCL_EXCEPT:
      description:
        short: Manual control loss exceptions
        long: |-
          External modes needing stick input still failsafe.
          Auto modes: Hold, Takeoff, Land, RTL, Descend, Follow Target, Precland, Orbit.
      type: bitmask
      bit:
        0: Mission
        1: Auto modes
        2: Offboard
        3: External Mode
        4: Altitude Cruise
      default: 0
      min: 0
      max: 31
    COM_DLL_EXCEPT:
      description:
        short: Datalink loss exceptions
        long: See also COM_RCL_EXCEPT.
      type: bitmask
      bit:
        0: Mission
        1: Auto modes
        2: Offboard
        3: External Mode
        4: Altitude Cruise
      default: 0
      min: 0
      max: 31
    COM_ACT_FAIL_ACT:
      description:
        short: Set the actuator failure failsafe mode
        long: Requires FD_ACT_* to enable and configure actuator failure detection.
      type: enum
      values:
        0: Warning only
        1: Hold mode
        2: Land mode
        3: Return mode
        4: Terminate
      default: 0
    COM_PARACHUTE:
      description:
        short: Parachute requirement and failsafe
        long: Requires MAVLink parachute system for arming; selected action triggers
          when missing/unhealthy.
      type: enum
      values:
        0: Disabled
        1: Warning
        2: Return
        3: Land
      default: 0
    COM_ARM_CHK_ESCS:
      description:
        short: Enable checks on ESCs that report telemetry
        long: |-
          When set, checks ESC online status and failures.
          Only effective on ESCs that report telemetry.
      type: boolean
      default: 0
    COM_PREARM_MODE:
      description:
        short: Condition to enter prearmed mode
        long: Non-throttling actuators activate in prearmed state (between disarmed
          and armed).
      type: enum
      values:
        0: Disabled
        1: Safety button
        2: Always
      default: 0
    COM_FORCE_SAFETY:
      description:
        short: Enable force safety
        long: Engage safety when the vehicle disarms.
      type: boolean
      default: 0
    COM_CPU_MAX:
      description:
        short: Maximum allowed CPU load to still arm
        long: |-
          Arming blocked if CPU load exceeds threshold for 2 s.
          Negative: disabled.
      type: float
      default: 95.0
      unit: '%'
      min: -1
      max: 100
      increment: 1
    COM_RAM_MAX:
      description:
        short: Maximum allowed RAM usage to pass checks
        long: |-
          Arming blocked if RAM usage exceeds threshold.
          Negative: disabled.
      type: float
      default: 95.0
      unit: '%'
      min: -1
      max: 100
      increment: 1
    COM_POWER_COUNT:
      description:
        short: Required number of redundant power modules
        long: |-
          Verifies the expected number of 5V rail power supplies.
          CBRK_SUPPLY_CHK disables all power checks including this one.
      type: int32
      default: 1
      min: 0
      max: 4
    COM_ARM_HFLT_CHK:
      description:
        short: Enable FMU SD card hardfault / watchdog detection check
        long: Blocks arming if hardfault/watchdog files are found on the SD card.
      type: boolean
      default: 1
    COM_ARM_ODID:
      description:
        short: Open Drone ID system check and in-flight failsafe
        long: Actions other than warning also prevent arming.
      type: enum
      values:
        0: Disabled
        1: Warning only
        2: Error only
        3: Return
        4: Land
        5: Terminate
      default: 0
    COM_ARM_TRAFF:
      description:
        short: Enable Traffic Avoidance system detection check
        long: Detects a missing ADSB/FLARM traffic avoidance transponder.
      type: enum
      values:
        0: Disabled
        1: Warning only
        2: Enforce for all modes
        3: Enforce for mission modes only
      default: 0
    COM_SPOOLUP_TIME:
      description:
        short: Enforced delay between arming and further navigation
        long: Allows motors/props to reach idle and ESCs/smart batteries to complete
          failure checks (e.g., stuck rotors).
      type: float
      default: 1.0
      min: 0
      max: 30
      decimal: 1
      increment: 0.1
      unit: s
    COM_CC_TEMP_WARN:
      description:
        short: Companion computer high-temperature warning threshold
        long: |-
          Arming not prevented as temperature typically drops in flight.
          -1 to disable.
      type: float
      default: 80.0
      min: -1
      max: 127
      decimal: 0
      increment: 1
      unit: celcius
    COM_WIND_WARN:
      description:
        short: Wind speed warning threshold
        long: Warning repeats every 1 min. -1 to disable.
      type: float
      default: -1.0
      min: -1
      decimal: 1
      increment: 0.1
      unit: m/s
    COM_FLT_TIME_MAX:
      description:
        short: Maximum allowed flight time
        long: |-
          Triggers RTL when airborne time exceeds this limit.
          Mission and non-RTL/Land auto modes blocked until landing; manual takeover still possible.
          Warning every 1 min from 90% of limit.
          -1 to disable.
      type: int32
      default: -1
      unit: s
      min: -1
    COM_WIND_MAX:
      description:
        short: High wind speed failsafe threshold
        long: Action set by COM_WIND_MAX_ACT.
      type: float
      default: -1.0
      min: -1
      decimal: 1
      increment: 0.1
      unit: m/s
    COM_WIND_MAX_ACT:
      description:
        short: High wind failsafe mode
        long: |-
          Threshold set by COM_WIND_MAX.
          When triggered, mission and non-RTL/Land auto modes blocked; manual takeover still possible.
      type: enum
      values:
        0: None
        1: Warning
        2: Hold
        3: Return
        4: Terminate
        5: Land
      default: 0
      increment: 1
    COM_POS_LOW_EPH:
      description:
        short: Low position accuracy failsafe threshold
        long: |-
          Triggers COM_POS_LOW_ACT when EPH drops below this.
          Local position must remain valid (velocity aiding or EKF2_NOAID_TOUT with COM_POS_FS_EPH satisfied).
          -1 to disable.
      type: float
      default: -1.0
      min: -1
      max: 1000
      unit: m
    COM_POS_LOW_ACT:
      description:
        short: Low position accuracy action
        long: |-
          Threshold set by COM_POS_LOW_EPH.
          Only executed in auto mission/loiter mode; otherwise warning only.
      type: enum
      values:
        0: None
        1: Warning
        2: Hold
        3: Return
        4: Terminate
        5: Land
      default: 3
      increment: 1
    COM_ARMABLE:
      description:
        short: Flag to allow arming
        long: "0: prevents arming for safety or maintenance."
      type: enum
      values:
        0: Disallow arming
        1: Allow arming
      default: 1
    COM_ARM_BAT_MIN:
      description:
        short: Minimum battery level for arming
        long: |-
          Arming blocked below this level.
          Negative: use BAT_CRIT_THR.
      type: float
      default: -1.0
      unit: norm
      min: -1
      max: 0.9
      decimal: 2
      increment: 0.01
    COM_THROW_EN:
      description:
        short: Enable throw-start
        long: Start by throwing the vehicle into the air.
      type: boolean
      default: 0
    COM_THROW_SPEED:
      description:
        short: Minimum speed for the throw start
        long: |-
          Motors won't spin until this speed is exceeded, preventing spin-up from accidental drops.
          0 to disable.
      type: float
      default: 5
      min: 0
      decimal: 1
      increment: 0.1
      unit: m/s
    COM_FLTT_LOW_ACT:
      description:
        short: Remaining flight time low failsafe
        long: Triggered when remaining flight time is below estimated RTL transit time.
      type: enum
      values:
        0: None
        1: Warning
        3: Return
      default: 0
      increment: 1
    COM_MODE_ARM_CHK:
      description:
        short: Allow external mode registration while armed
        long: Disabled by default for safety.
      type: boolean
      default: 0
- group: Radio Calibration
  definitions:
    TRIM_ROLL:
      description:
        short: Roll trim
        long: Actuator control value needed for straight and level flight.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
      increment: 0.01
    TRIM_PITCH:
      description:
        short: Pitch trim
        long: Actuator control value needed for straight and level flight.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
      increment: 0.01
    TRIM_YAW:
      description:
        short: Yaw trim
        long: Actuator control value needed for straight and level flight.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
      increment: 0.01
