module_name: HealthAndArmingChecks
parameters:
- group: Motor Failure
  definitions:
    FD_ACT_EN:
      description:
        short: Enable Actuator Failure check
        long: |-
          Verifies minimum ESC current per throttle level for each motor; shortfall indicates motor failure.
          Only works for ESCs that report current consumption.
      type: boolean
      default: 0
    MOTFAIL_C2T:
      description:
        short: Motor Failure Current/Throttle Scale
        long: |-
          Slope between expected steady-state current and linearized normalized thrust.
          MOTFAIL_C2T is the expected current at 100% thrust.
          FD_ACT_LOW_OFF and FD_ACT_HIGH_OFF offset the threshold from that slope.
      type: float
      default: 35.0
      min: 0.0
      max: 50.0
      unit: A/%
      decimal: 2
      increment: 1
    MOTFAIL_OFF:
      description:
        short: Under/over-current motor failure limit offset
        long: Check is triggered if `abs(FD_ACT_MOT_C2T * thrust - FD_ACT_OFF)` is above this value.
      type: float
      default: 10.0
      min: 0
      max: 30
      unit: A
      decimal: 2
      increment: 1
    MOTFAIL_TIME:
      description:
        short: Motor Failure Hysteresis Time
        long: Motor failure only triggers after current thresholds are exceeded for
          this time.
      type: float
      default: 1.0
      unit: s
      min: 0.01
      max: 10
      decimal: 2
      increment: 1
- group: ESC
  definitions:
    ESC_TEMP_WARN_TH:
      description:
        short: ESC temperature warning threshold
        long: |-
          Warning only, no failsafe or arming blocked.
          -1 disables the check.
      type: float
      default: 90.0
      min: -1
      max: 150
      unit: celcius
      decimal: 1
      increment: 1
