module_name: HealthAndArmingChecks
parameters:
- group: Motor Failure
  definitions:
    FD_ACT_EN:
      description:
        short: Enable Actuator Failure check
        long: |-
          If enabled, the HealthAndArmingChecks compare each motor's ESC current against the expected
          current for the commanded throttle, and flag a motor whose current stays too far from that
          expectation (too low or too high) for a set time.
          This check only works for ESCs that report current consumption.
      type: boolean
      default: 0
    MOTFAIL_C2T:
      description:
        short: Motor failure model current-vs-command slope
      type: float
      default: 35.0
      min: 0.0
      max: 50.0
      unit: A/%
      decimal: 2
      increment: 1
    MOTFAIL_IDLE:
      description:
        short: Motor failure model idle current
      type: float
      default: 0.0
      min: 0.0
      max: 20.0
      unit: A
      decimal: 2
      increment: 1
    MOTFAIL_OFF:
      description:
        short: Motor failure current trip threshold
      type: float
      default: 10.0
      min: 0
      max: 30
      unit: A
      decimal: 2
      increment: 1
    MOTFAIL_TIME:
      description:
        short: Motor Failure Hysteresis Time
        long: Motor failure only triggers after the trip threshold is exceeded for this time.
      type: float
      default: 1.0
      unit: s
      min: 0.01
      max: 10
      decimal: 2
      increment: 1
- group: ESC
  definitions:
    ESC_TEMP_WARN_TH:
      description:
        short: ESC temperature warning threshold
        long: |-
          Warning only, no failsafe or arming blocked.
          -1 disables the check.
      type: float
      default: 90.0
      min: -1
      max: 150
      unit: celcius
      decimal: 1
      increment: 1
