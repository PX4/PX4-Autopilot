module_name: spacecraft
parameters:
- group: Spacecraft Position Control
  definitions:
    SPC_POS_P:
      description:
        short: Proportional gain for position error
        long: Corrective velocity in m/s per m position error.
      type: float
      default: 0.2
      min: 0
      max: 2
      decimal: 2
      increment: 0.1
    SPC_POS_I:
      description:
        short: Integral gain for position error
        long: Corrective velocity in m/s per m velocity error.
      type: float
      default: 0.0
      min: 0
      max: 15
      decimal: 2
      increment: 0.1
    SPC_POS_I_LIM:
      description:
        short: Integral limit for position error
        long: Corrective velocity in m/s per m velocity error.
      type: float
      default: 1.0
      min: 0
      max: 5
      decimal: 2
      increment: 0.01
    SPC_VEL_P:
      description:
        short: Proportional gain for velocity error
        long: Corrective acceleration in m/s^2 per m/s velocity error.
      type: float
      default: 6.55
      min: 0
      max: 15
      decimal: 2
      increment: 0.1
    SPC_VEL_I:
      description:
        short: Integral gain for velocity error
        long: Corrective acceleration in m/s^2 per m/s velocity error.
      type: float
      default: 0.0
      min: 0
      max: 15
      decimal: 2
      increment: 0.1
    SPC_VEL_I_LIM:
      description:
        short: Integral limit for velocity error
        long: Corrective acceleration in m/s^2 per m/s velocity error.
      type: float
      default: 1.0
      min: 0
      max: 5
      decimal: 2
      increment: 0.1
    SPC_VEL_D:
      description:
        short: Derivative gain for velocity error
        long: Corrective acceleration in m/s^2 per m/s velocity error.
      type: float
      default: 0.0
      min: 0.0
      max: 15
      decimal: 2
      increment: 0.1
    SPC_VEL_MAX:
      description:
        short: Maximum velocity
        long: Caps velocity in all velocity-controlled modes; higher values are truncated.
      type: float
      default: 12.0
      unit: m/s
      min: 0
      max: 20
      decimal: 1
      increment: 1
    SPC_VEL_ALL:
      description:
        short: Overall Velocity Limit
        long: "Positive: overrides MPC_VEL_MAX and MPC_VEL_MANUAL. Negative: uses individual params."
      type: float
      default: -10.0
      min: -20
      max: 20
      decimal: 1
      increment: 1
    SPC_VEL_CRUISE:
      description:
        short: Cruising elocity setpoint in autonomous modes
      type: float
      default: 10.0
      unit: m/s
      min: 3
      max: 20
      increment: 1
      decimal: 1
    SPC_VEL_MANUAL:
      description:
        short: Maximum velocity setpoint in Position mode
      type: float
      default: 10.0
      unit: m/s
      min: 3
      max: 20
      increment: 1
      decimal: 1
    SPC_THR_MAX:
      description:
        short: Maximum collective thrust
      type: float
      default: 1.0
      unit: norm
      min: 0
      max: 1
      decimal: 2
      increment: 0.05
    SPC_ACC:
      description:
        short: Acceleration for autonomous and for manual modes
        long: "Manual: only used in MPC_POS_MODE 4."
      type: float
      default: 3.0
      unit: m/s^2
      min: 2
      max: 15
      decimal: 1
      increment: 1
    SPC_ACC_MAX:
      description:
        short: Maximum accelaration in autonomous modes
      type: float
      default: 5.0
      unit: m/s^2
      min: 2
      max: 15
      decimal: 1
      increment: 1
    SPC_JERK_AUTO:
      description:
        short: Jerk limit in autonomous modes
        long: "Lower: smoother motion, less agility."
      type: float
      default: 4.0
      unit: m/s^3
      min: 1
      max: 80
      decimal: 1
      increment: 1
    SPC_JERK_MAX:
      description:
        short: Maximum jerk in Position/Altitude mode
        long: "Lower: smoother, less agile. Max value (500) essentially disables. Only with MPC_POS_MODE 3 and 4."
      type: float
      default: 8.0
      unit: m/s^3
      min: 0.5
      max: 500
      decimal: 0
      increment: 1
    SPC_MAN_Y_MAX:
      description:
        short: Max manual yaw rate for Stabilized, Altitude, Position mode
      type: float
      default: 150.0
      unit: deg/s
      min: 0
      max: 400
      decimal: 0
      increment: 10
    SPC_MAN_Y_TAU:
      description:
        short: Manual yaw rate input filter time constant
        long: "0 disables filter; not used in Stabilized mode."
      type: float
      default: 0.08
      unit: s
      min: 0
      max: 5
      decimal: 2
      increment: 0.01
    SPC_VELD_LP:
      description:
        short: Numerical velocity derivative low pass cutoff frequency
      type: float
      default: 5.0
      unit: Hz
      min: 0
      max: 10
      decimal: 1
      increment: 0.5
- group: Miscellaneous
  definitions:
    SPC_VEHICLE_RESP:
      description:
        short: SPC_VEHICLE_RESP
      type: float
      default: 0.5
