module_name: spacecraft
parameters:
- group: Multicopter Position Control
  definitions:
    SC_MAN_TILT_MAX:
      description:
        short: Maximal tilt angle in Stabilized or Manual mode
      type: float
      default: 90.0
      unit: deg
      min: 0
      max: 90
      decimal: 0
      increment: 1
- group: Spacecraft Attitude Control
  definitions:
    SC_ROLL_P:
      description:
        short: Roll P gain
        long: Desired angular speed in rad/s per 1 rad error.
      type: float
      default: 6.5
      min: 0.0
      max: 12
      decimal: 2
      increment: 0.1
    SC_PITCH_P:
      description:
        short: Pitch P gain
        long: Desired angular speed in rad/s per 1 rad error.
      type: float
      default: 6.5
      min: 0.0
      max: 12
      decimal: 2
      increment: 0.1
    SC_YAW_P:
      description:
        short: Yaw P gain
        long: Desired angular speed in rad/s per 1 rad error.
      type: float
      default: 2.8
      min: 0.0
      max: 5
      decimal: 2
      increment: 0.1
    SC_YAW_WEIGHT:
      description:
        short: Yaw weight
        long: Fraction [0,1] deprioritizing yaw vs. roll/pitch in non-linear attitude
          control. Yaw has less authority and is non-critical for hover/navigation.
          No impact on SC_YAW_P gain.
      type: float
      default: 0.4
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.1
    SC_ROLLRATE_MAX:
      description:
        short: Max roll rate
        long: Applies in manual and auto modes (except acro). Limits large autonomous
          rotations to avoid mixer saturation. Also constrained by max gyro measurement rate.
      type: float
      default: 220.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    SC_PITCHRATE_MAX:
      description:
        short: Max pitch rate
        long: Applies in manual and auto modes (except acro). Limits large autonomous
          rotations to avoid mixer saturation. Also constrained by max gyro measurement rate.
      type: float
      default: 220.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    SC_YAWRATE_MAX:
      description:
        short: Max yaw rate
      type: float
      default: 200.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
- group: Spacecraft Position Control
  definitions:
    SC_MAN_TILT_TAU:
      description:
        short: Manual tilt input filter time constant
        long: "0 disables filter."
      type: float
      default: 0.0
      unit: s
      min: 0.0
      max: 2.0
      decimal: 2
    SC_MAN_Y_SCALE:
      description:
        short: Max manual yaw rate for Stabilized, Altitude, Position mode
      type: float
      default: 150.0
      unit: deg/s
      min: 0
      max: 400
      decimal: 0
      increment: 10
