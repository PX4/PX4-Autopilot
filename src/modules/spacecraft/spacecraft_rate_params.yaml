module_name: spacecraft
parameters:
- group: Spacecraft Rate Control
  definitions:
    SC_ROLLRATE_P:
      description:
        short: Roll rate P gain
        long: Roll rate proportional gain, i.e. control output for angular speed error
          1 rad/s.
      type: float
      default: 0.15
      min: 0.01
      max: 0.5
      decimal: 3
      increment: 0.01
    SC_ROLLRATE_I:
      description:
        short: Roll rate I gain
        long: Roll rate integral gain. Can be set to compensate static thrust difference
          or gravity center offset.
      type: float
      default: 0.2
      min: 0.0
      decimal: 3
      increment: 0.01
    SC_RR_INT_LIM:
      description:
        short: Roll rate integrator limit
        long: Roll rate integrator limit. Can be set to increase the amount of integrator
          available to counteract disturbances or reduced to improve settling time
          after large roll moment trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_ROLLRATE_D:
      description:
        short: Roll rate D gain
        long: Roll rate differential gain. Small values help reduce fast oscillations.
          If value is too big oscillations will appear again.
      type: float
      default: 0.003
      min: 0.0
      max: 0.01
      decimal: 4
      increment: 0.0005
    SC_ROLLRATE_FF:
      description:
        short: Roll rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    SC_ROLLRATE_K:
      description:
        short: Roll rate controller gain
        long: |-
          Global gain of the controller.

          This gain scales the P, I and D terms of the controller:
          output = SC_ROLLRATE_K * (SC_ROLLRATE_P * error
          + SC_ROLLRATE_I * error_integral
          + SC_ROLLRATE_D * error_derivative)
          Set SC_ROLLRATE_P=1 to implement a PID in the ideal form.
          Set SC_ROLLRATE_K=1 to implement a PID in the parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    SC_PITCHRATE_P:
      description:
        short: Pitch rate P gain
        long: Pitch rate proportional gain, i.e. control output for angular speed
          error 1 rad/s.
      type: float
      default: 0.15
      min: 0.01
      max: 0.6
      decimal: 3
      increment: 0.01
    SC_PITCHRATE_I:
      description:
        short: Pitch rate I gain
        long: Pitch rate integral gain. Can be set to compensate static thrust difference
          or gravity center offset.
      type: float
      default: 0.2
      min: 0.0
      decimal: 3
      increment: 0.01
    SC_PR_INT_LIM:
      description:
        short: Pitch rate integrator limit
        long: Pitch rate integrator limit. Can be set to increase the amount of integrator
          available to counteract disturbances or reduced to improve settling time
          after large pitch moment trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_PITCHRATE_D:
      description:
        short: Pitch rate D gain
        long: Pitch rate differential gain. Small values help reduce fast oscillations.
          If value is too big oscillations will appear again.
      type: float
      default: 0.003
      min: 0.0
      decimal: 4
      increment: 0.0005
    SC_PITCHRATE_FF:
      description:
        short: Pitch rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    SC_PITCHRATE_K:
      description:
        short: Pitch rate controller gain
        long: |-
          Global gain of the controller.

          This gain scales the P, I and D terms of the controller:
          output = SC_PITCHRATE_K * (SC_PITCHRATE_P * error
          + SC_PITCHRATE_I * error_integral
          + SC_PITCHRATE_D * error_derivative)
          Set SC_PITCHRATE_P=1 to implement a PID in the ideal form.
          Set SC_PITCHRATE_K=1 to implement a PID in the parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    SC_YAWRATE_P:
      description:
        short: Yaw rate P gain
        long: Yaw rate proportional gain, i.e. control output for angular speed error
          1 rad/s.
      type: float
      default: 10.0
      min: 0.0
      max: 10.0
      decimal: 2
      increment: 0.01
    SC_YAWRATE_I:
      description:
        short: Yaw rate I gain
        long: Yaw rate integral gain. Can be set to compensate static thrust difference
          or gravity center offset.
      type: float
      default: 0.865
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_YR_INT_LIM:
      description:
        short: Yaw rate integrator limit
        long: Yaw rate integrator limit. Can be set to increase the amount of integrator
          available to counteract disturbances or reduced to improve settling time
          after large yaw moment trim changes.
      type: float
      default: 0.2
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_YAWRATE_D:
      description:
        short: Yaw rate D gain
        long: Yaw rate differential gain. Small values help reduce fast oscillations.
          If value is too big oscillations will appear again.
      type: float
      default: 0.0
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_YAWRATE_FF:
      description:
        short: Yaw rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
      increment: 0.01
    SC_YAWRATE_K:
      description:
        short: Yaw rate controller gain
        long: |-
          Global gain of the controller.

          This gain scales the P, I and D terms of the controller:
          output = SC_YAWRATE_K * (SC_YAWRATE_P * error
          + SC_YAWRATE_I * error_integral
          + SC_YAWRATE_D * error_derivative)
          Set SC_YAWRATE_P=1 to implement a PID in the ideal form.
          Set SC_YAWRATE_K=1 to implement a PID in the parallel form.
      type: float
      default: 1.0
      min: 0.0
      max: 5.0
      decimal: 4
      increment: 0.0005
    SC_ACRO_R_MAX:
      description:
        short: Max acro roll rate
        long: 'default: 2 turns per second'
      type: float
      default: 720.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    SC_ACRO_P_MAX:
      description:
        short: Max acro pitch rate
        long: 'default: 2 turns per second'
      type: float
      default: 720.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    SC_ACRO_Y_MAX:
      description:
        short: Max acro yaw rate
        long: default 1.5 turns per second
      type: float
      default: 540.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    SC_ACRO_EXPO:
      description:
        short: Acro mode Expo factor for Roll and Pitch
        long: |-
          Exponential factor for tuning the input curve shape.

          0 Purely linear input curve
          1 Purely cubic input curve
      type: float
      default: 0.69
      min: 0
      max: 1
      decimal: 2
    SC_ACRO_EXPO_Y:
      description:
        short: Acro mode Expo factor for Yaw
        long: |-
          Exponential factor for tuning the input curve shape.

          0 Purely linear input curve
          1 Purely cubic input curve
      type: float
      default: 0.69
      min: 0
      max: 1
      decimal: 2
    SC_ACRO_SUPEXPO:
      description:
        short: Acro mode SuperExpo factor for Roll and Pitch
        long: |-
          SuperExpo factor for refining the input curve shape tuned using SC_ACRO_EXPO.

          0 Pure Expo function
          0.7 reasonable shape enhancement for intuitive stick feel
          0.95 very strong bent input curve only near maxima have effect
      type: float
      default: 0.7
      min: 0
      max: 0.95
      decimal: 2
    SC_ACRO_SUPEXPOY:
      description:
        short: Acro mode SuperExpo factor for Yaw
        long: |-
          SuperExpo factor for refining the input curve shape tuned using SC_ACRO_EXPO_Y.

          0 Pure Expo function
          0.7 reasonable shape enhancement for intuitive stick feel
          0.95 very strong bent input curve only near maxima have effect
      type: float
      default: 0.7
      min: 0
      max: 0.95
      decimal: 2
    SC_BAT_SCALE_EN:
      description:
        short: Battery power level scaler
        long: |-
          This compensates for voltage drop of the battery over time by attempting to
          normalize performance across the operating range of the battery. The copter
          should constantly behave as if it was fully charged with reduced max acceleration
          at lower battery percentages. i.e. if hover is at 0.5 throttle at 100% battery,
          it will still be 0.5 at 60% battery.
      type: boolean
      default: 0
    SC_MAN_F_MAX:
      description:
        short: Manual mode maximum force
        long: '*'
      type: float
      default: 1.0
      min: 0
      max: 1.0
      decimal: 2
    SC_MAN_T_MAX:
      description:
        short: Manual mode maximum torque
        long: '*'
      type: float
      default: 1.0
      min: 0
      max: 1.0
      decimal: 2
