module_name: spacecraft
parameters:
- group: Spacecraft Rate Control
  definitions:
    SC_ROLLRATE_P:
      description:
        short: Roll rate P gain
        long: Control output per 1 rad/s angular speed error.
      type: float
      default: 0.15
      min: 0.01
      max: 0.5
      decimal: 3
      increment: 0.01
    SC_ROLLRATE_I:
      description:
        short: Roll rate I gain
        long: Compensates static thrust difference or CG offset.
      type: float
      default: 0.2
      min: 0.0
      decimal: 3
      increment: 0.01
    SC_RR_INT_LIM:
      description:
        short: Roll rate integrator limit
        long: Increase to counteract disturbances; reduce to improve settling after large trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_ROLLRATE_D:
      description:
        short: Roll rate D gain
        long: Small values reduce fast oscillations; too large causes oscillations.
      type: float
      default: 0.003
      min: 0.0
      max: 0.01
      decimal: 4
      increment: 0.0005
    SC_ROLLRATE_FF:
      description:
        short: Roll rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    SC_ROLLRATE_K:
      description:
        short: Roll rate controller gain
        long: |-
          Scales all PID terms:
          output = SC_ROLLRATE_K * (SC_ROLLRATE_P * error
          + SC_ROLLRATE_I * error_integral
          + SC_ROLLRATE_D * error_derivative)
          SC_ROLLRATE_P=1: ideal form. SC_ROLLRATE_K=1: parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    SC_PITCHRATE_P:
      description:
        short: Pitch rate P gain
        long: Control output per 1 rad/s angular speed error.
      type: float
      default: 0.15
      min: 0.01
      max: 0.6
      decimal: 3
      increment: 0.01
    SC_PITCHRATE_I:
      description:
        short: Pitch rate I gain
        long: Compensates static thrust difference or CG offset.
      type: float
      default: 0.2
      min: 0.0
      decimal: 3
      increment: 0.01
    SC_PR_INT_LIM:
      description:
        short: Pitch rate integrator limit
        long: Increase to counteract disturbances; reduce to improve settling after large trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_PITCHRATE_D:
      description:
        short: Pitch rate D gain
        long: Small values reduce fast oscillations; too large causes oscillations.
      type: float
      default: 0.003
      min: 0.0
      decimal: 4
      increment: 0.0005
    SC_PITCHRATE_FF:
      description:
        short: Pitch rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    SC_PITCHRATE_K:
      description:
        short: Pitch rate controller gain
        long: |-
          Scales all PID terms:
          output = SC_PITCHRATE_K * (SC_PITCHRATE_P * error
          + SC_PITCHRATE_I * error_integral
          + SC_PITCHRATE_D * error_derivative)
          SC_PITCHRATE_P=1: ideal form. SC_PITCHRATE_K=1: parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    SC_YAWRATE_P:
      description:
        short: Yaw rate P gain
        long: Control output per 1 rad/s angular speed error.
      type: float
      default: 10.0
      min: 0.0
      max: 10.0
      decimal: 2
      increment: 0.01
    SC_YAWRATE_I:
      description:
        short: Yaw rate I gain
        long: Compensates static thrust difference or CG offset.
      type: float
      default: 0.865
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_YR_INT_LIM:
      description:
        short: Yaw rate integrator limit
        long: Increase to counteract disturbances; reduce to improve settling after large trim changes.
      type: float
      default: 0.2
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_YAWRATE_D:
      description:
        short: Yaw rate D gain
        long: Small values reduce fast oscillations; too large causes oscillations.
      type: float
      default: 0.0
      min: 0.0
      decimal: 2
      increment: 0.01
    SC_YAWRATE_FF:
      description:
        short: Yaw rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
      increment: 0.01
    SC_YAWRATE_K:
      description:
        short: Yaw rate controller gain
        long: |-
          Scales all PID terms:
          output = SC_YAWRATE_K * (SC_YAWRATE_P * error
          + SC_YAWRATE_I * error_integral
          + SC_YAWRATE_D * error_derivative)
          SC_YAWRATE_P=1: ideal form. SC_YAWRATE_K=1: parallel form.
      type: float
      default: 1.0
      min: 0.0
      max: 5.0
      decimal: 4
      increment: 0.0005
    SC_ACRO_R_MAX:
      description:
        short: Max acro roll rate
      type: float
      default: 720.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    SC_ACRO_P_MAX:
      description:
        short: Max acro pitch rate
      type: float
      default: 720.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    SC_ACRO_Y_MAX:
      description:
        short: Max acro yaw rate
      type: float
      default: 540.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    SC_ACRO_EXPO:
      description:
        short: Acro mode Expo factor for Roll and Pitch
        long: "0: linear curve, 1: cubic curve."
      type: float
      default: 0.69
      min: 0
      max: 1
      decimal: 2
    SC_ACRO_EXPO_Y:
      description:
        short: Acro mode Expo factor for Yaw
        long: "0: linear curve, 1: cubic curve."
      type: float
      default: 0.69
      min: 0
      max: 1
      decimal: 2
    SC_ACRO_SUPEXPO:
      description:
        short: Acro mode SuperExpo factor for Roll and Pitch
        long: "Refines curve tuned by SC_ACRO_EXPO. 0: pure Expo, 0.7: good feel, 0.95: strong curve (only maxima matter)."
      type: float
      default: 0.7
      min: 0
      max: 0.95
      decimal: 2
    SC_ACRO_SUPEXPOY:
      description:
        short: Acro mode SuperExpo factor for Yaw
        long: "Refines curve tuned by SC_ACRO_EXPO_Y. 0: pure Expo, 0.7: good feel, 0.95: strong curve (only maxima matter)."
      type: float
      default: 0.7
      min: 0
      max: 0.95
      decimal: 2
    SC_BAT_SCALE_EN:
      description:
        short: Battery power level scaler
        long: Scales throttle to compensate for battery voltage drop, maintaining consistent
          performance across SoC (e.g., hover at 0.5 throttle stays at 0.5 regardless of battery level).
      type: boolean
      default: 0
    SC_MAN_F_MAX:
      description:
        short: Manual mode maximum force
        long: '*'
      type: float
      default: 1.0
      min: 0
      max: 1.0
      decimal: 2
    SC_MAN_T_MAX:
      description:
        short: Manual mode maximum torque
        long: '*'
      type: float
      default: 1.0
      min: 0
      max: 1.0
      decimal: 2
