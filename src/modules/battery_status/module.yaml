__max_num_config_instances: &max_num_config_instances 2

module_name: battery_status

parameters:
    - group: Battery Calibration
      definitions:
        BAT${i}_V_DIV:
            description:
                short: Battery ${i} voltage divider (V divider)
                long: |-
                    Datasheet value can be used directly (e.g. Mauch power modules). -1 uses board default.
            type: float
            decimal: 8
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [-1.0, -1.0]

        BAT${i}_A_PER_V:
            description:
                short: Battery ${i} current per volt (A/V)
                long: |-
                    ADC voltage * this factor = battery current. -1 uses board default.
            type: float
            decimal: 8
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [-1.0, -1.0]

        BAT${i}_V_CHANNEL:
            description:
                short: Battery ${i} Voltage ADC Channel
                long: |-
                    -1: board default. -2: disables analog monitoring (use when preferring digital exclusively).
            type: int32
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [-1, -1]

        BAT${i}_V_FILT:
            description:
                short: Battery ${i} voltage filter time constant
                long: |-
                    Higher = more smoothing, less noise, slower response. 0 disables.
            type: float
            decimal: 3
            min: 0.0
            max: 5.0
            unit: s
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0.0, 0.0]

        BAT${i}_I_FILT:
            description:
                short: Battery ${i} current filter time constant
                long: |-
                    Higher = more smoothing, less noise, slower response. 0 disables.
            type: float
            decimal: 3
            min: 0.0
            max: 5.0
            unit: s
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0.0, 0.0]
