module_name: gimbal
parameters:
- group: Mount
  definitions:
    MNT_MODE_IN:
      description:
        short: Mount input mode
        long: |-
          GCS-to-autopilot gimbal input protocol.
          Auto, RC, or MAVLink v2 recommended; others deprecated.
      type: enum
      values:
        -1: DISABLED
        0: Auto (RC and MAVLink gimbal protocol v2)
        1: RC
        2: MAVLINK_ROI (protocol v1, to be deprecated)
        3: MAVLINK_DO_MOUNT (protocol v1, to be deprecated)
        4: MAVlink gimbal protocol v2
        5: Fixed world-frame attitude, not user controllable
      default: -1
      min: -1
      max: 5
      reboot_required: true
    MNT_MODE_OUT:
      description:
        short: Mount output mode
        long: Autopilot-to-gimbal output protocol. MAVLink v2 recommended if supported.
      type: enum
      values:
        0: AUX
        1: MAVLink gimbal protocol v1
        2: MAVLink gimbal protocol v2
      default: 0
      min: 0
      max: 2
      reboot_required: true
    MNT_MAV_SYSID:
      description:
        short: Mavlink System ID of the mount
        long: Target sys ID for commands when MNT_MODE_OUT is protocol v1.
      type: int32
      default: 1
    MNT_MAV_COMPID:
      description:
        short: Mavlink Component ID of the mount
        long: Target component ID for commands when MNT_MODE_OUT is protocol v2.
      type: int32
      default: 154
    MNT_MAN_ROLL:
      description:
        short: Auxiliary channel to control roll (in AUX input or manual mode)
      type: enum
      values:
        0: Disable
        1: AUX1
        2: AUX2
        3: AUX3
        4: AUX4
        5: AUX5
        6: AUX6
      default: 0
      min: 0
      max: 6
    MNT_MAN_PITCH:
      description:
        short: Auxiliary channel to control pitch (in AUX input or manual mode)
      type: enum
      values:
        0: Disable
        1: AUX1
        2: AUX2
        3: AUX3
        4: AUX4
        5: AUX5
        6: AUX6
      default: 0
      min: 0
      max: 6
    MNT_MAN_YAW:
      description:
        short: Auxiliary channel to control yaw (in AUX input or manual mode)
      type: enum
      values:
        0: Disable
        1: AUX1
        2: AUX2
        3: AUX3
        4: AUX4
        5: AUX5
        6: AUX6
      default: 0
      min: 0
      max: 6
    MNT_DO_STAB:
      description:
        short: Stabilize the mount
        long: Enable for a servo gimbal that cannot self-stabilize (uses IMU attitude); disable for passthrough.
      type: enum
      values:
        0: Disable
        1: Stabilize all axis
        2: Stabilize yaw for absolute/lock mode.
        3: Stabilize pitch for absolute/lock mode.
      default: 0
    MNT_MAX_PITCH:
      description:
        short: Max positive angle of pitch setpoint (only in MNT_MODE_OUT=AUX)
        long: Calibrate with output driver settings (e.g. PWM_CENT/_MIN/_MAX).
      type: float
      default: 45.0
      unit: deg
      decimal: 1
    MNT_MIN_PITCH:
      description:
        short: Min negative angle of pitch setpoint (only in MNT_MODE_OUT=AUX)
        long: Calibrate with output driver settings (e.g. PWM_CENT/_MIN/_MAX).
      type: float
      default: -45.0
      unit: deg
      decimal: 1
    MNT_RANGE_ROLL:
      description:
        short: Range of roll channel output (only in MNT_MODE_OUT=AUX)
        long: Calibrate with output driver settings (e.g. PWM_CENT/_MIN/_MAX). Only symmetric angular ranges are supported.
      type: float
      default: 90.0
      min: 1.0
      max: 720.0
      unit: deg
      decimal: 1
    MNT_RANGE_YAW:
      description:
        short: Range of yaw channel output (only in MNT_MODE_OUT=AUX)
        long: Calibrate with output driver settings (e.g. PWM_CENT/_MIN/_MAX). Only symmetric angular ranges are supported.
      type: float
      default: 360.0
      min: 1.0
      max: 720.0
      unit: deg
      decimal: 1
    MNT_RATE_PITCH:
      description:
        short: Angular pitch rate for manual input in degrees/second
        long: Full stick [-1..1] maps to [-pitch rate..+pitch rate].
      type: float
      default: 30.0
      min: 1.0
      max: 90.0
      unit: deg/s
    MNT_RATE_YAW:
      description:
        short: Angular yaw rate for manual input in degrees/second
        long: Full stick [-1..1] maps to [-yaw rate..+yaw rate].
      type: float
      default: 30.0
      min: 1.0
      max: 90.0
      unit: deg/s
    MNT_TAU:
      description:
        short: Time constant for open-loop AUX gimbal control
        long: |-
          Alpha filter convergence rate (s) for open-loop AUX mount control.
          Use when no position feedback is available; tune for the specific servo's speed and response.
      type: float
      default: 0.3
      min: 0.0
    MNT_RC_IN_MODE:
      description:
        short: Input mode for RC gimbal input
      type: enum
      values:
        0: Angle
        1: Angular rate
      default: 1
      min: 0
      max: 1
    MNT_LND_P_MIN:
      description:
        short: Pitch minimum when landed
      type: float
      default: -90.0
      min: -90.0
      max: 90.0
      unit: deg
      decimal: 1
    MNT_LND_P_MAX:
      description:
        short: Pitch maximum when landed
      type: float
      default: 90.0
      min: -90.0
      max: 90.0
      unit: deg
      decimal: 1
    MNT_FIXED_PITCH:
      description:
        short: Tracked pitch angle when in fixed mode (MNT_MODE_IN=5)
      type: float
      default: 0.0
      min: -90
      max: 90
      unit: deg
      decimal: 1
