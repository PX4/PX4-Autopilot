module_name: Voliro Allocator

parameters:
    - group: Voliro Allocator
      definitions:
        VOLA_EN:
            description:
                short: Enable dedicated Voliro allocator at boot
                long: Requires reboot. The airframe post script stops the stock allocator before starting this module.
            type: boolean
            default: false
            reboot_required: true
        VOLA_TMAX:
            description:
                short: Maximum thrust per rotor
            type: float
            unit: N
            min: 0.1
            max: 200
            default: 24.5
        VOLA_ARM:
            description:
                short: Rotor arm radius
            type: float
            unit: m
            min: 0.01
            max: 5
            default: 0.315
        VOLA_KAPPA:
            description:
                short: Reaction torque to thrust ratio
            type: float
            unit: m
            min: 0
            max: 1
            default: 0.015
        VOLA_TILT_MIN:
            description:
                short: Minimum finite radial tilt angle
                long: Hardware default is -225 degrees, providing 45 degrees of over-travel around a full thrust-direction revolution.
            type: float
            unit: rad
            min: -6.2832
            max: 0
            default: -3.9269908
        VOLA_TILT_MAX:
            description:
                short: Maximum finite radial tilt angle
                long: Hardware default is 225 degrees, providing 45 degrees of over-travel around a full thrust-direction revolution.
            type: float
            unit: rad
            min: 0
            max: 6.2832
            default: 3.9269908
        VOLA_TILT_RATE:
            description:
                short: Maximum tilt-command slew rate
                long: Slew rate of the persistent joint-position command. Measured encoder angle is used to initialize the command after startup, fallback, or feedback recovery.
            type: float
            unit: rad/s
            min: 0.1
            max: 100
            default: 7.85
        VOLA_TILT_TAU:
            description:
                short: Tilt actuator prediction time constant
                long: Critically damped model time constant used to predict the next measured tilt before re-solving thrust. The default matches the current simulation and must be replaced by a hardware step-response fit.
            type: float
            unit: s
            min: 0.001
            max: 1
            default: 0.05
        VOLA_FB_TMO:
            description:
                short: Tilt feedback timeout
            type: float
            unit: s
            min: 0.01
            max: 1
            default: 0.1
        VOLA_MAX_ITER:
            description:
                short: Maximum projected-solver iterations
            type: int32
            min: 1
            max: 1000
            default: 100
        VOLA_SOL_TOL:
            description:
                short: Projected-solver convergence tolerance
            type: float
            min: 0.00000001
            max: 0.01
            default: 0.000001
        VOLA_REG:
            description:
                short: Allocation regularization
            type: float
            min: 0
            max: 0.01
            default: 0.0000000001
