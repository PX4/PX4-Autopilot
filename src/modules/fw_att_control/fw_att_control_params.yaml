module_name: fw_att_control
parameters:
- group: FW Attitude Control
  definitions:
    FW_R_TC:
      description:
        short: Attitude Roll Time Constant
        long: Latency between a roll step input and the achieved setpoint (inverse to P gain). Smaller systems may need lower values.
      type: float
      default: 0.4
      unit: s
      min: 0.2
      max: 1.0
      decimal: 2
      increment: 0.05
    FW_P_TC:
      description:
        short: Attitude pitch time constant
        long: Latency between a pitch step input and the achieved setpoint (inverse to P gain). Smaller systems may need lower values.
      type: float
      default: 0.4
      unit: s
      min: 0.2
      max: 1.0
      decimal: 2
      increment: 0.05
    FW_P_RMAX_POS:
      description:
        short: Maximum positive / up pitch rate setpoint
      type: float
      default: 60.0
      unit: deg/s
      min: 0.0
      max: 180
      decimal: 1
      increment: 0.5
    FW_P_RMAX_NEG:
      description:
        short: Maximum negative / down pitch rate setpoint
      type: float
      default: 60.0
      unit: deg/s
      min: 0.0
      max: 180
      decimal: 1
      increment: 0.5
    FW_R_RMAX:
      description:
        short: Maximum roll rate setpoint
      type: float
      default: 70.0
      unit: deg/s
      min: 0.0
      max: 180
      decimal: 1
      increment: 0.5
    FW_Y_RMAX:
      description:
        short: Maximum yaw rate setpoint
      type: float
      default: 50.0
      unit: deg/s
      min: 0.0
      max: 180
      decimal: 1
      increment: 0.5
    FW_W_EN:
      description:
        short: Enable wheel steering controller
        long: Active only during automatic runway takeoff and landing; in manual modes the wheel follows yaw stick directly.
      type: boolean
      default: 0
    FW_WR_P:
      description:
        short: Wheel steering rate proportional gain
        long: Wheel steering command scaled by current body angular rate error.
      type: float
      default: 0.5
      unit: '%/rad/s'
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.005
    FW_WR_I:
      description:
        short: Wheel steering rate integrator gain
        long: Integrates steady-state angular rate error to trim constant offset.
      type: float
      default: 0.1
      unit: '%/rad'
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.005
    FW_WR_IMAX:
      description:
        short: Wheel steering rate integrator limit
      type: float
      default: 0.4
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.05
    FW_W_RMAX:
      description:
        short: Maximum wheel steering rate
      type: float
      default: 30.0
      unit: deg/s
      min: 0.0
      max: 90.0
      decimal: 1
      increment: 0.5
    FW_WR_FF:
      description:
        short: Wheel steering rate feed forward
      type: float
      default: 0.2
      unit: '%/rad/s'
      min: 0.0
      max: 10
      decimal: 2
      increment: 0.05
    FW_PSP_OFF:
      description:
        short: Pitch setpoint offset (pitch at level flight)
        long: Airframe-specific pitch offset; set to pitch angle at typical cruise speed.
      type: float
      default: 0.0
      unit: deg
      min: -90.0
      max: 90.0
      decimal: 1
      increment: 0.5
    FW_MAN_YR_MAX:
      description:
        short: Maximum manually added yaw rate
        long: Added on top of the controller's turn-coordination yaw rate in attitude-controlled modes.
      type: float
      default: 30.0
      unit: deg/s
      min: 0
      decimal: 1
      increment: 0.5
    FW_MAN_R_MAX:
      description:
        short: Maximum manual roll angle
        long: Applies to both directions in all manual modes with attitude stabilization
      type: float
      default: 45.0
      unit: deg
      min: 0.0
      max: 90.0
      decimal: 1
      increment: 0.5
    FW_MAN_P_MAX:
      description:
        short: Maximum manual pitch angle
        long: Applies to both directions in all manual modes with attitude stabilization
          but without altitude control
      type: float
      default: 30.0
      unit: deg
      min: 0.0
      max: 90.0
      decimal: 1
      increment: 0.5
