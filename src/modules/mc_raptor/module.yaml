module_name: mc_raptor
parameters:
    - group: Multicopter Raptor
      definitions:
        MC_RAPTOR_ENABLE:
            description:
                short: Enable Raptor flight mode
                long: Set MC_RAPTOR_OFFB for your use case.
            type: boolean
            default: false
            category: System
        MC_RAPTOR_VERBOS:
            description:
                short: Enable verbose output
            type: boolean
            default: false
            category: System

        MC_RAPTOR_OFFB:
            description:
                short: Enable Offboard mode replacement
                long: |-
                    Enabled: replaces Offboard mode, requires external setpoints.
                    Disabled: separate external mode that holds position without setpoints.
            type: boolean
            default: false
            category: System

        MC_RAPTOR_INTREF:
            description:
                short: Use internal reference instead of trajectory_setpoint
                long: |-
                    Uses vehicle position/yaw at activation time as reference.
                    `mc_raptor intref lissajous <A> <B> <C> <fa> <fb> <fc> <duration> <ramp>` to configure.
            type: enum
            values:
                0: None
                1: Lissajous
            default: 0
            category: System
