module_name: Rover Ackermann

parameters:
  - group: Rover Ackermann
    definitions:
      RA_WHEEL_BASE:
        description:
          short: Wheel base
          long: Distance from the front to the rear axle.
        type: float
        unit: m
        min: 0
        max: 100
        increment: 0.001
        decimal: 3
        default: 0

      RA_MAX_STR_ANG:
        description:
          short: Maximum steering angle
        type: float
        unit: rad
        min: 0
        max: 1.5708
        increment: 0.01
        decimal: 2
        default: 0

      RA_STR_RATE_LIM:
        description:
          short: Steering rate limit
          long: Set to -1 to disable.
        type: float
        unit: deg/s
        min: -1
        max: 1000
        increment: 0.01
        decimal: 2
        default: -1

      RA_ACC_RAD_MAX:
        description:
          short: Maximum acceptance radius for the waypoints
          long: |-
            Radius scaled by angle between prev/current/next waypoints for corner cutting.
            Higher = smoother trajectory but farther from waypoint. -1 disables.
        type: float
        unit: m
        min: -1
        max: 100
        increment: 0.01
        decimal: 2
        default: -1

      RA_ACC_RAD_GAIN:
        description:
          short: Tuning parameter for corner cutting
          long: Multiplies the ideal acceptance radius for kinematic/dynamic effects. Higher = rover cuts corners earlier.
        type: float
        min: 1
        max: 100
        increment: 0.01
        decimal: 2
        default: 1
