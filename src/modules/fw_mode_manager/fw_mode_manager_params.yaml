module_name: fw_mode_manager
parameters:
- group: FW Auto Landing
  definitions:
    FW_LND_ANG:
      description:
        short: Maximum landing slope angle
        long: |-
          Typically the desired landing slope angle when landing configuration (flaps, airspeed) is enabled.
          Set this value within the vehicle's performance limits.
      type: float
      default: 5.0
      unit: deg
      min: 1.0
      max: 45.0
      decimal: 1
      increment: 0.5
    FW_LND_FLALT:
      description:
        short: Landing flare altitude (relative to landing altitude)
        long: 'NOTE: max(FW_LND_FLALT, FW_LND_FL_TIME * |z-velocity|) is taken as
          the flare altitude'
      type: float
      default: 0.5
      unit: m
      min: 0.0
      decimal: 1
      increment: 0.5
    FW_LND_USETER:
      description:
        short: Use terrain estimation during landing
        long: |-
          This is critical for detecting when to flare, and should be enabled if possible.

          If enabled and no measurement is found within a given timeout, the landing waypoint altitude will be used OR the landing
          will be aborted, depending on the criteria set in FW_LND_ABORT.

          If disabled, FW_LND_ABORT terrain based criteria are ignored.
      type: enum
      values:
        0: Disable the terrain estimate
        1: Use the terrain estimate to trigger the flare (only)
        2: Calculate landing glide slope relative to the terrain estimate
      default: 1
      min: 0
      max: 2
    FW_LND_EARLYCFG:
      description:
        short: Early landing configuration deployment
        long: |-
          Allows to deploy the landing configuration (flaps, landing airspeed, etc.) already in
          the loiter-down waypoint before the final approach.
          Otherwise is enabled only in the final approach.
      type: boolean
      default: 0
    FW_LND_FL_PMIN:
      description:
        short: Flare, minimum pitch
        long: Minimum pitch during landing flare.
      type: float
      default: 2.5
      unit: deg
      min: -5
      max: 15.0
      decimal: 1
      increment: 0.5
    FW_LND_FL_PMAX:
      description:
        short: Flare, maximum pitch
        long: Maximum pitch during landing flare.
      type: float
      default: 15.0
      unit: deg
      min: 0
      max: 45.0
      decimal: 1
      increment: 0.5
    FW_LND_AIRSPD:
      description:
        short: Landing airspeed
        long: |-
          The calibrated airspeed setpoint during landing.

          If set <= 0, landing airspeed = FW_AIRSPD_MIN by default.
      type: float
      default: -1.0
      unit: m/s
      min: -1.0
      decimal: 1
      increment: 0.1
    FW_LND_THRTC_SC:
      description:
        short: Altitude time constant factor for landing and low-height flight
        long: The TECS altitude time constant (FW_T_ALT_TC) is multiplied by this
          value.
      type: float
      default: 1.0
      min: 0.2
      max: 1.0
      decimal: 1
      increment: 0.1
    FW_LND_FL_TIME:
      description:
        short: Landing flare time
        long: |-
          Multiplied by the descent rate to calculate a dynamic altitude at which
          to trigger the flare.

          NOTE: max(FW_LND_FLALT, FW_LND_FL_TIME * descent rate) is taken as the flare altitude
      type: float
      default: 1.0
      unit: s
      min: 0.1
      max: 5.0
      decimal: 1
      increment: 0.1
    FW_LND_TD_TIME:
      description:
        short: Landing touchdown time (since flare start)
        long: |-
          This is the time after the start of flaring that we expect the vehicle to touch the runway.
          At this time, a 0.5s clamp down ramp will engage, constraining the pitch setpoint to RWTO_PSP.
          If enabled, ensure that RWTO_PSP is configured appropriately for full gear contact on ground roll.

          Set to -1.0 to disable touchdown clamping. E.g. it may not be desirable to clamp on belly landings.

          The touchdown time will be constrained to be greater than or equal to the flare time (FW_LND_FL_TIME).
      type: float
      default: -1.0
      unit: s
      min: -1.0
      max: 5.0
      decimal: 1
      increment: 0.1
    FW_LND_FL_SINK:
      description:
        short: Landing flare sink rate
        long: TECS will attempt to control the aircraft to this sink rate via pitch
          angle (throttle killed during flare)
      type: float
      default: 0.25
      unit: m/s
      min: 0.0
      max: 2
      decimal: 2
      increment: 0.1
    FW_LND_TD_OFF:
      description:
        short: Maximum lateral position offset for the touchdown point
      type: float
      default: 3.0
      unit: m
      min: 0.0
      max: 10.0
      decimal: 1
      increment: 1
    FW_LND_NUDGE:
      description:
        short: Landing touchdown nudging option
        long: |-
          Approach angle nudging: shifts the touchdown point laterally while keeping the approach entrance point constant
          Approach path nudging: shifts the touchdown point laterally along with the entire approach path

          This is useful for manually adjusting the landing point in real time when map or GNSS errors cause an offset from the
          desired landing vector. Nudging is done with yaw stick, constrained to FW_LND_TD_OFF (in meters) and the direction is
          relative to the vehicle heading (stick deflection to the right = land point moves to the right as seen by the vehicle).
      type: enum
      values:
        0: Disable nudging
        1: Nudge approach angle
        2: Nudge approach path
      default: 2
      min: 0
      max: 2
    FW_LND_ABORT:
      description:
        short: Bit mask to set the automatic landing abort conditions
        long: |-
          Terrain estimation:
          bit 0: Abort if terrain is not found
          bit 1: Abort if terrain times out (after a first successful measurement)

          The last estimate is always used as ground, whether the last valid measurement or the land waypoint, depending on the
          selected abort criteria, until an abort condition is entered. If FW_LND_USETER == 0, these bits are ignored.

          TODO: Extend automatic abort conditions
          e.g. glide slope tracking error (horizontal and vertical)
      type: bitmask
      bit:
        0: Abort if terrain is not found (only applies to mission landings)
        1: Abort if terrain times out (after a first successful measurement)
      default: 3
      min: 0
      max: 3
    FW_FLAPS_LND_SCL:
      description:
        short: Flaps setting during landing
        long: |-
          Sets a fraction of full flaps during landing.
          Also applies to flaperons if enabled in the mixer/allocation.
      type: float
      default: 1.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_SPOILERS_LND:
      description:
        short: Spoiler landing setting
      type: float
      default: 0.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
- group: FW Auto Takeoff
  definitions:
    FW_TKO_PITCH_MIN:
      description:
        short: Minimum pitch during takeoff
      type: float
      default: 10.0
      unit: deg
      min: -5.0
      max: 80.0
      decimal: 1
      increment: 0.5
    FW_TKO_AIRSPD:
      description:
        short: Takeoff Airspeed
        long: |-
          The calibrated airspeed setpoint during the takeoff climbout.

          If set <= 0, FW_AIRSPD_MIN will be set by default.
      type: float
      default: -1.0
      unit: m/s
      min: -1.0
      decimal: 1
      increment: 0.1
    FW_LAUN_DETCN_ON:
      description:
        short: Fixed-wing launch detection
        long: |-
          Enables automatic launch detection based on measured acceleration. Use for hand- or catapult-launched vehicles.
          Not compatible with runway takeoff.
      type: boolean
      default: 0
    FW_LAUN_CS_LK_DY:
      description:
        short: Control surface launch delay
        long: |-
          Locks control surfaces during pre-launch (armed) and until this time since launch has passed.
          Only affects control surfaces that have corresponding flag set, and not active for runway takeoff.
          Set to 0 to disable any surface locking after arming.
      type: float
      default: 0.0
      unit: s
      min: 0.0
      decimal: 1
      increment: 0.1
    FW_FLAPS_TO_SCL:
      description:
        short: Flaps setting during take-off
        long: |-
          Sets a fraction of full flaps during take-off.
          Also applies to flaperons if enabled in the mixer/allocation.
      type: float
      default: 0.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
- group: FW General
  definitions:
    FW_P_LIM_MIN:
      description:
        short: Minimum pitch angle setpoint
        long: Applies in any altitude controlled flight mode.
      type: float
      default: -30.0
      unit: deg
      min: -60.0
      max: 0.0
      decimal: 1
      increment: 0.5
    FW_P_LIM_MAX:
      description:
        short: Maximum pitch angle setpoint
        long: Applies in any altitude controlled flight mode.
      type: float
      default: 30.0
      unit: deg
      min: 0.0
      max: 80.0
      decimal: 1
      increment: 0.5
    FW_R_LIM:
      description:
        short: Maximum roll angle setpoint
        long: Applies in any altitude controlled flight mode.
      type: float
      default: 50.0
      unit: deg
      min: 35.0
      max: 75.0
      decimal: 1
      increment: 0.5
    FW_THR_MAX:
      description:
        short: Throttle limit max
        long: |-
          Applies in any altitude controlled flight mode.
          Should be set accordingly to achieve FW_T_CLMB_MAX.
      type: float
      default: 1.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_THR_MIN:
      description:
        short: Throttle limit min
        long: |-
          Applies in any altitude controlled flight mode.
          Usually set to 0 but can be increased to prevent the motor from stopping when
          descending, which can increase achievable descent rates.
      type: float
      default: 0.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_THR_IDLE:
      description:
        short: Idle throttle
        long: This is the minimum throttle while on the ground ("landed") in auto
          modes.
      type: float
      default: 0.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_T_SPDWEIGHT:
      description:
        short: Speed <--> Altitude weight
        long: |-
          Adjusts the amount of weighting that the pitch control
          applies to speed vs height errors.
          0 -> control height only
          2 -> control speed only (gliders)
      type: float
      default: 1.0
      min: 0.0
      max: 2.0
      decimal: 1
      increment: 1.0
    FW_POS_STK_CONF:
      description:
        short: Custom stick configuration
        long: Applies in manual Position and Altitude flight modes.
      type: bitmask
      bit:
        0: Alternative stick configuration (height rate on throttle stick, airspeed
          on pitch stick)
        1: Enable airspeed setpoint via sticks in altitude and position flight mode
      default: 2
      min: 0
      max: 3
    FW_T_CLMB_R_SP:
      description:
        short: Default target climbrate
        long: |-
          In auto modes: default climb rate output by controller to achieve altitude setpoints.
          In manual modes: maximum climb rate setpoint.
      type: float
      default: 3.0
      unit: m/s
      min: 0.1
      decimal: 2
      increment: 0.01
    FW_T_SINK_R_SP:
      description:
        short: Default target sinkrate
        long: |-
          In auto modes: default sink rate output by controller to achieve altitude setpoints.
          In manual modes: maximum sink rate setpoint.
      type: float
      default: 2.0
      unit: m/s
      min: 0.1
      decimal: 2
      increment: 0.01
    FW_GPSF_LT:
      description:
        short: GPS failure loiter time
        long: |-
          The time the system should do open loop loiter and wait for GPS recovery
          before it starts descending. Set to 0 to disable. Roll angle is set to FW_GPSF_R.
          Does only apply for fixed-wing vehicles or VTOLs with NAV_FORCE_VT set to 0.
      type: int32
      default: 30
      unit: s
      min: 0
    FW_GPSF_R:
      description:
        short: GPS failure fixed roll angle
        long: Roll angle in GPS failure loiter mode.
      type: float
      default: 15.0
      unit: deg
      min: 0.0
      max: 60.0
      decimal: 1
      increment: 0.5
    FW_WING_SPAN:
      description:
        short: The aircraft's wing span (length from tip to tip)
        long: This is used for limiting the roll setpoint near the ground. (if multiple
          wings, take the longest span)
      type: float
      default: 3.0
      unit: m
      min: 0.1
      decimal: 1
      increment: 0.1
    FW_WING_HEIGHT:
      description:
        short: Height (AGL) of the wings when the aircraft is on the ground
        long: |-
          This is used to constrain a minimum altitude below which we keep wings level to avoid wing tip strike. It's safer
          to give a slight margin here (> 0m)
      type: float
      default: 0.5
      unit: m
      min: 0.0
      decimal: 1
      increment: 1
- group: FW NPFG Control
  definitions:
    NPFG_PERIOD:
      description:
        short: NPFG period
        long: Period of NPFG control law.
      type: float
      default: 10.0
      unit: s
      min: 1.0
      max: 100.0
      decimal: 1
      increment: 0.1
    NPFG_DAMPING:
      description:
        short: NPFG damping ratio
        long: Damping ratio of NPFG control law.
      type: float
      default: 0.7
      min: 0.1
      max: 1.0
      decimal: 2
      increment: 0.01
    NPFG_LB_PERIOD:
      description:
        short: Enable automatic lower bound on the NPFG period
        long: |-
          Avoids limit cycling from a too aggressively tuned period/damping combination.
          If false, also disables upper bound NPFG_PERIOD_UB.
      type: boolean
      default: 1
    NPFG_UB_PERIOD:
      description:
        short: Enable automatic upper bound on the NPFG period
        long: Adapts period to maintain track keeping in variable winds and path curvature.
      type: boolean
      default: 1
    NPFG_ROLL_TC:
      description:
        short: Roll time constant
        long: |-
          Time constant of roll controller command / response, modeled as first order delay.
          Used to determine lower period bound. Setting zero disables automatic period bounding.
      type: float
      default: 0.5
      unit: s
      min: 0.0
      max: 2.0
      decimal: 2
      increment: 0.05
    NPFG_SW_DST_MLT:
      description:
        short: NPFG switch distance multiplier
        long: |-
          Multiplied by the track error boundary to determine when the aircraft switches
          to the next waypoint and/or path segment. Should be less than 1.
      type: float
      default: 0.32
      min: 0.1
      max: 1.0
      decimal: 2
      increment: 0.01
    NPFG_PERIOD_SF:
      description:
        short: Period safety factor
        long: |-
          Multiplied by period for conservative minimum period bounding (when period lower
          bounding is enabled). 1.0 bounds at marginal stability.
      type: float
      default: 1.5
      min: 1.0
      max: 10.0
      decimal: 1
      increment: 0.1
