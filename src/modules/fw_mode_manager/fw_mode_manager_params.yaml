module_name: fw_mode_manager
parameters:
- group: FW Auto Landing
  definitions:
    FW_LND_ANG:
      description:
        short: Maximum landing slope angle
        long: Desired slope angle when landing config (flaps, airspeed) is active. Set within vehicle performance limits.
      type: float
      default: 5.0
      unit: deg
      min: 1.0
      max: 45.0
      decimal: 1
      increment: 0.5
    FW_LND_FLALT:
      description:
        short: Landing flare altitude (relative to landing altitude)
        long: 'NOTE: max(FW_LND_FLALT, FW_LND_FL_TIME * |z-velocity|) is taken as
          the flare altitude'
      type: float
      default: 0.5
      unit: m
      min: 0.0
      decimal: 1
      increment: 0.5
    FW_LND_USETER:
      description:
        short: Use terrain estimation during landing
        long: |-
          Critical for detecting when to flare; enable if possible.
          No terrain measurement within timeout: use waypoint altitude or abort per FW_LND_ABORT.
          Disabled: FW_LND_ABORT terrain criteria are ignored.
      type: enum
      values:
        0: Disable the terrain estimate
        1: Use the terrain estimate to trigger the flare (only)
        2: Calculate landing glide slope relative to the terrain estimate
      default: 1
      min: 0
      max: 2
    FW_LND_EARLYCFG:
      description:
        short: Early landing configuration deployment
        long: Deploy landing config (flaps, airspeed, etc.) from the loiter-down waypoint; otherwise only at final approach.
      type: boolean
      default: 0
    FW_LND_FL_PMIN:
      description:
        short: Flare, minimum pitch
      type: float
      default: 2.5
      unit: deg
      min: -5
      max: 15.0
      decimal: 1
      increment: 0.5
    FW_LND_FL_PMAX:
      description:
        short: Flare, maximum pitch
      type: float
      default: 15.0
      unit: deg
      min: 0
      max: 45.0
      decimal: 1
      increment: 0.5
    FW_LND_AIRSPD:
      description:
        short: Landing airspeed
        long: Calibrated airspeed setpoint during landing. <=0 uses FW_AIRSPD_MIN.
      type: float
      default: -1.0
      unit: m/s
      min: -1.0
      decimal: 1
      increment: 0.1
    FW_LND_THRTC_SC:
      description:
        short: Altitude time constant factor for landing and low-height flight
        long: Scales FW_T_ALT_TC (TECS altitude time constant).
      type: float
      default: 1.0
      min: 0.2
      max: 1.0
      decimal: 1
      increment: 0.1
    FW_LND_FL_TIME:
      description:
        short: Landing flare time
        long: Flare alt = max(FW_LND_FLALT, FW_LND_FL_TIME * descent_rate).
      type: float
      default: 1.0
      unit: s
      min: 0.1
      max: 5.0
      decimal: 1
      increment: 0.1
    FW_LND_TD_TIME:
      description:
        short: Landing touchdown time (since flare start)
        long: |-
          Time from flare start to expected touchdown. Triggers a 0.5s pitch clamp ramp to RWTO_PSP;
          configure RWTO_PSP for full gear contact. -1.0: disable (e.g. belly landings).
          Constrained to >= FW_LND_FL_TIME.
      type: float
      default: -1.0
      unit: s
      min: -1.0
      max: 5.0
      decimal: 1
      increment: 0.1
    FW_LND_FL_SINK:
      description:
        short: Landing flare sink rate
        long: TECS controls to this sink rate via pitch during flare (throttle killed).
      type: float
      default: 0.25
      unit: m/s
      min: 0.0
      max: 2
      decimal: 2
      increment: 0.1
    FW_LND_TD_OFF:
      description:
        short: Maximum lateral position offset for the touchdown point
      type: float
      default: 3.0
      unit: m
      min: 0.0
      max: 10.0
      decimal: 1
      increment: 1
    FW_LND_NUDGE:
      description:
        short: Landing touchdown nudging option
        long: Corrects map/GNSS landing offset with yaw stick, constrained to FW_LND_TD_OFF. Stick right = land point right (vehicle-relative).
      type: enum
      values:
        0: Disable nudging
        1: Nudge approach angle (touchdown shifts, entrance fixed)
        2: Nudge approach path (touchdown + full path shift)
      default: 2
      min: 0
      max: 2
    FW_LND_ABORT:
      description:
        short: Bit mask to set the automatic landing abort conditions
        long: Last terrain estimate (last valid or land waypoint) is used as ground until abort. Bits ignored if FW_LND_USETER == 0.
      type: bitmask
      bit:
        0: Abort if terrain is not found (only applies to mission landings)
        1: Abort if terrain times out (after a first successful measurement)
      default: 3
      min: 0
      max: 3
    FW_FLAPS_LND_SCL:
      description:
        short: Flaps setting during landing
        long: Fraction of full flaps during landing; also applies to flaperons if enabled.
      type: float
      default: 1.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_SPOILERS_LND:
      description:
        short: Spoiler landing setting
      type: float
      default: 0.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
- group: FW Auto Takeoff
  definitions:
    FW_TKO_PITCH_MIN:
      description:
        short: Minimum pitch during takeoff
      type: float
      default: 10.0
      unit: deg
      min: -5.0
      max: 80.0
      decimal: 1
      increment: 0.5
    FW_TKO_AIRSPD:
      description:
        short: Takeoff Airspeed
        long: Calibrated airspeed setpoint during takeoff climbout. <=0 uses FW_AIRSPD_MIN.
      type: float
      default: -1.0
      unit: m/s
      min: -1.0
      decimal: 1
      increment: 0.1
    FW_LAUN_DETCN_ON:
      description:
        short: Fixed-wing launch detection
        long: Automatic launch detection via measured acceleration; for hand/catapult launches. Not compatible with runway takeoff.
      type: boolean
      default: 0
    FW_LAUN_CS_LK_DY:
      description:
        short: Control surface launch delay
        long: "Locks flagged control surfaces while armed and for this many seconds after launch. 0: disable. Not active for runway takeoff."
      type: float
      default: 0.0
      unit: s
      min: 0.0
      decimal: 1
      increment: 0.1
    FW_FLAPS_TO_SCL:
      description:
        short: Flaps setting during take-off
        long: Fraction of full flaps during takeoff; also applies to flaperons if enabled.
      type: float
      default: 0.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
- group: FW General
  definitions:
    FW_P_LIM_MIN:
      description:
        short: Minimum pitch angle setpoint
        long: Applies in any altitude controlled flight mode.
      type: float
      default: -30.0
      unit: deg
      min: -60.0
      max: 0.0
      decimal: 1
      increment: 0.5
    FW_P_LIM_MAX:
      description:
        short: Maximum pitch angle setpoint
        long: Applies in any altitude controlled flight mode.
      type: float
      default: 30.0
      unit: deg
      min: 0.0
      max: 80.0
      decimal: 1
      increment: 0.5
    FW_R_LIM:
      description:
        short: Maximum roll angle setpoint
        long: Applies in any altitude controlled flight mode.
      type: float
      default: 50.0
      unit: deg
      min: 35.0
      max: 75.0
      decimal: 1
      increment: 0.5
    FW_THR_MAX:
      description:
        short: Throttle limit max
        long: Applies in altitude-controlled modes; set to achieve FW_T_CLMB_MAX.
      type: float
      default: 1.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_THR_MIN:
      description:
        short: Throttle limit min
        long: Applies in altitude-controlled modes. Raise above 0 to prevent motor cutoff during descent and improve descent rates.
      type: float
      default: 0.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_THR_IDLE:
      description:
        short: Idle throttle
        long: Minimum throttle while landed in auto modes.
      type: float
      default: 0.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_T_SPDWEIGHT:
      description:
        short: Speed <--> Altitude weight
        long: |-
          Pitch control weighting between speed and height error.
          0: height only. 2: speed only (gliders).
      type: float
      default: 1.0
      min: 0.0
      max: 2.0
      decimal: 1
      increment: 1.0
    FW_POS_STK_CONF:
      description:
        short: Custom stick configuration
        long: Applies in manual Position and Altitude flight modes.
      type: bitmask
      bit:
        0: Alternative stick configuration (height rate on throttle stick, airspeed
          on pitch stick)
        1: Enable airspeed setpoint via sticks in altitude and position flight mode
      default: 2
      min: 0
      max: 3
    FW_T_CLMB_R_SP:
      description:
        short: Default target climbrate
        long: |-
          In auto modes: default climb rate output by controller to achieve altitude setpoints.
          In manual modes: maximum climb rate setpoint.
      type: float
      default: 3.0
      unit: m/s
      min: 0.1
      decimal: 2
      increment: 0.01
    FW_T_SINK_R_SP:
      description:
        short: Default target sinkrate
        long: |-
          In auto modes: default sink rate output by controller to achieve altitude setpoints.
          In manual modes: maximum sink rate setpoint.
      type: float
      default: 2.0
      unit: m/s
      min: 0.1
      decimal: 2
      increment: 0.01
    FW_GPSF_LT:
      description:
        short: GPS failure loiter time
        long: |-
          Open-loop loiter before descending on GPS failure. 0: disable.
          Roll angle = FW_GPSF_R. Fixed-wing and VTOL (NAV_FORCE_VT=0) only.
      type: int32
      default: 30
      unit: s
      min: 0
    FW_GPSF_R:
      description:
        short: GPS failure fixed roll angle
      type: float
      default: 15.0
      unit: deg
      min: 0.0
      max: 60.0
      decimal: 1
      increment: 0.5
    FW_WING_SPAN:
      description:
        short: The aircraft's wing span (length from tip to tip)
        long: Used to limit roll setpoint near the ground. For multiple wings, use the longest span.
      type: float
      default: 3.0
      unit: m
      min: 0.1
      decimal: 1
      increment: 0.1
    FW_WING_HEIGHT:
      description:
        short: Height (AGL) of the wings when the aircraft is on the ground
        long: Min AGL to keep wings level and avoid tip strike. Give a small margin (>0 m).
      type: float
      default: 0.5
      unit: m
      min: 0.0
      decimal: 1
      increment: 1
- group: FW NPFG Control
  definitions:
    NPFG_PERIOD:
      description:
        short: NPFG period
      type: float
      default: 10.0
      unit: s
      min: 1.0
      max: 100.0
      decimal: 1
      increment: 0.1
    NPFG_DAMPING:
      description:
        short: NPFG damping ratio
      type: float
      default: 0.7
      min: 0.1
      max: 1.0
      decimal: 2
      increment: 0.01
    NPFG_LB_PERIOD:
      description:
        short: Enable automatic lower bound on the NPFG period
        long: Prevents limit cycling from overly aggressive period/damping. If false, also disables NPFG_PERIOD_UB.
      type: boolean
      default: 1
    NPFG_UB_PERIOD:
      description:
        short: Enable automatic upper bound on the NPFG period
        long: Adapts period for track keeping in variable winds and path curvature.
      type: boolean
      default: 1
    NPFG_ROLL_TC:
      description:
        short: Roll time constant
        long: "First-order roll command/response time constant; sets lower period bound. 0: disable period bounding."
      type: float
      default: 0.5
      unit: s
      min: 0.0
      max: 2.0
      decimal: 2
      increment: 0.05
    NPFG_SW_DST_MLT:
      description:
        short: NPFG switch distance multiplier
        long: Track error boundary multiplier for waypoint/segment switching. Should be < 1.
      type: float
      default: 0.32
      min: 0.1
      max: 1.0
      decimal: 2
      increment: 0.01
    NPFG_PERIOD_SF:
      description:
        short: Period safety factor
        long: Multiplier for conservative period lower bound (when lower bounding is enabled). 1.0 = marginal stability.
      type: float
      default: 1.5
      min: 1.0
      max: 10.0
      decimal: 1
      increment: 0.1
    FW_WP_RST_DIST:
      description:
        short: Max position reset distance
        long: |-
          If a position reset > this occurs mid-segment, fly direct to current waypoint instead of rejoining.
          -1: disable.
      type: float
      default: -1.0
      unit: m
      min: -1.0
      max: 10000.0
      decimal: 0
      increment: 1
