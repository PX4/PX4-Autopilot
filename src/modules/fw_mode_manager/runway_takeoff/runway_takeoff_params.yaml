module_name: runway_takeoff
parameters:
- group: Runway Takeoff
  definitions:
    RWTO_TKOFF:
      description:
        short: Runway takeoff with landing gear
      type: boolean
      default: 0
    RWTO_MAX_THR:
      description:
        short: Throttle during runway takeoff
      type: float
      default: 1.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    RWTO_PSP:
      description:
        short: Pitch setpoint during taxi / before rotation
        long: A taildragger may need slight pitch-up to keep the tail wheel on the ground before rotation speed.
      type: float
      default: 0.0
      unit: deg
      min: -10.0
      max: 20.0
      decimal: 1
      increment: 0.5
    RWTO_RAMP_TIME:
      description:
        short: Throttle ramp up time for runway takeoff
      type: float
      default: 2.0
      unit: s
      min: 1.0
      max: 15.0
      decimal: 2
      increment: 0.1
    RWTO_NUDGE:
      description:
        short: Enable yaw stick nudging during runway ground roll
        long: Enables yaw stick to nudge the wheel during ground roll. Useful when GNSS/heading error misaligns with intended course, especially on narrow runways or with off-trim servos.
      type: boolean
      default: 1
    RWTO_ROT_AIRSPD:
      description:
        short: Takeoff rotation airspeed
        long: "CAS threshold to begin rotation. Must be < FW_TKO_AIRSPD (capped otherwise). <=0: use 0.9 * FW_TKO_AIRSPD."
      type: float
      default: -1.0
      unit: m/s
      min: -1.0
      decimal: 1
      increment: 0.1
    RWTO_ROT_TIME:
      description:
        short: Takeoff rotation time
        long: Time to linearly ramp in pitch constraints during rotation.
      type: float
      default: 1.0
      unit: s
      min: 0.1
      decimal: 1
      increment: 0.1
