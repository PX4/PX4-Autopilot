module_name: fw_rate_control
parameters:
- group: FW Rate Control
  definitions:
    FW_USE_AIRSPD:
      description:
        short: Use airspeed for control
        long: |-
          When enabled and valid, airspeed is used by:
          - Rate controller: output scaling
          - Attitude controller: coordinated turns
          - Position controller: airspeed setpoint tracking, takeoff
          - VTOL: transition logic
      type: boolean
      default: 1
    FW_PR_P:
      description:
        short: Pitch rate proportional gain
      type: float
      default: 0.08
      unit: '%/rad/s'
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.005
    FW_PR_D:
      description:
        short: Pitch rate derivative gain
      type: float
      default: 0.0
      unit: '%/rad/s'
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.005
    FW_PR_I:
      description:
        short: Pitch rate integrator gain
      type: float
      default: 0.1
      unit: '%/rad'
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.005
    FW_PR_IMAX:
      description:
        short: Pitch rate integrator limit
      type: float
      default: 0.4
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.05
    FW_RR_P:
      description:
        short: Roll rate proportional gain
      type: float
      default: 0.05
      unit: '%/rad/s'
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.005
    FW_RR_D:
      description:
        short: Roll rate derivative gain
      type: float
      default: 0.0
      unit: '%/rad/s'
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.005
    FW_RR_I:
      description:
        short: Roll rate integrator gain
      type: float
      default: 0.1
      unit: '%/rad'
      min: 0.0
      max: 10
      decimal: 2
      increment: 0.01
    FW_RR_IMAX:
      description:
        short: Roll integrator limit
      type: float
      default: 0.2
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.05
    FW_YR_P:
      description:
        short: Yaw rate proportional gain
      type: float
      default: 0.05
      unit: '%/rad/s'
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.005
    FW_YR_D:
      description:
        short: Yaw rate derivative gain
      type: float
      default: 0.0
      unit: '%/rad/s'
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.005
    FW_YR_I:
      description:
        short: Yaw rate integrator gain
      type: float
      default: 0.1
      unit: '%/rad'
      min: 0.0
      max: 10
      decimal: 1
      increment: 0.5
    FW_YR_IMAX:
      description:
        short: Yaw rate integrator limit
      type: float
      default: 0.2
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.05
    FW_RR_FF:
      description:
        short: Roll rate feed forward
        long: |
          Direct feed forward from rate setpoint to torque setpoint.
          Positive values compensate aerodynamic damping (scaled linearly with airspeed).
          Negative values reduce setpoint tracking aggressiveness while preserving disturbance rejection (2-DOF controller, scaled quadratically with airspeed)
      type: float
      default: 0.5
      unit: '%/rad/s'
      min: -10.0
      max: 10.0
      decimal: 2
      increment: 0.05
    FW_PR_FF:
      description:
        short: Pitch rate feed forward
        long: |
          Direct feed forward from rate setpoint to torque setpoint.
          Positive values compensate aerodynamic damping (scaled linearly with airspeed).
          Negative values reduce setpoint tracking aggressiveness while preserving disturbance rejection (2-DOF controller, scaled quadratically with airspeed)
      type: float
      default: 0.5
      unit: '%/rad/s'
      min: -10.0
      max: 10.0
      decimal: 2
      increment: 0.05
    FW_YR_FF:
      description:
        short: Yaw rate feed forward
        long: |
          Direct feed forward from rate setpoint to torque setpoint.
          Positive values compensate aerodynamic damping (scaled linearly with airspeed).
          Negative values reduce setpoint tracking aggressiveness while preserving disturbance rejection (2-DOF controller, scaled quadratically with airspeed)
      type: float
      default: 0.3
      unit: '%/rad/s'
      min: -10.0
      max: 10.0
      decimal: 2
      increment: 0.05
    FW_ACRO_X_MAX:
      description:
        short: Acro body roll max rate setpoint
      type: float
      default: 90
      min: 10
      max: 720
      unit: deg
    FW_ACRO_Y_MAX:
      description:
        short: Acro body pitch max rate setpoint
      type: float
      default: 90
      min: 10
      max: 720
      unit: deg
    FW_ACRO_Z_MAX:
      description:
        short: Acro body yaw max rate setpoint
      type: float
      default: 45
      min: 10
      max: 720
      unit: deg
    FW_BAT_SCALE_EN:
      description:
        short: Enable throttle scale by battery level
        long: Compensates for battery voltage drop by normalizing performance across its operating range.
      type: boolean
      default: 0
    FW_ARSP_SCALE_EN:
      description:
        short: Enable airspeed scaling
        long: |-
          Adjusts rate controller output to account for torque produced by aerodynamic
          surfaces at the current deviation from FW_AIRSPD_TRIM.
          Enable for planes (aerodynamic surfaces), disable for autogyros (rotor wings).
      type: boolean
      default: 1
    FW_DTRIM_R_VMIN:
      description:
        short: Roll trim increment at minimum airspeed
        long: Added to TRIM_ROLL when airspeed = FW_AIRSPD_MIN.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
      increment: 0.01
    FW_DTRIM_P_VMIN:
      description:
        short: Pitch trim increment at minimum airspeed
        long: Added to TRIM_PITCH when airspeed = FW_AIRSPD_MIN.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
      increment: 0.01
    FW_DTRIM_Y_VMIN:
      description:
        short: Yaw trim increment at minimum airspeed
        long: Added to TRIM_YAW when airspeed = FW_AIRSPD_MIN.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
      increment: 0.01
    FW_DTRIM_R_VMAX:
      description:
        short: Roll trim increment at maximum airspeed
        long: Added to TRIM_ROLL when airspeed = FW_AIRSPD_MAX.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
      increment: 0.01
    FW_DTRIM_P_VMAX:
      description:
        short: Pitch trim increment at maximum airspeed
        long: Added to TRIM_PITCH when airspeed = FW_AIRSPD_MAX.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
      increment: 0.01
    FW_DTRIM_Y_VMAX:
      description:
        short: Yaw trim increment at maximum airspeed
        long: Added to TRIM_YAW when airspeed = FW_AIRSPD_MAX.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
      increment: 0.01
    FW_MAN_R_SC:
      description:
        short: Manual roll scale
        long: Scales the roll actuator command in full manual mode; adjusts control surface throws.
      type: float
      default: 1.0
      unit: norm
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    FW_MAN_P_SC:
      description:
        short: Manual pitch scale
        long: Scales the pitch actuator command in full manual mode; adjusts control surface throws.
      type: float
      default: 1.0
      unit: norm
      min: 0.0
      decimal: 2
      increment: 0.01
    FW_MAN_Y_SC:
      description:
        short: Manual yaw scale
        long: Scales the yaw actuator command in full manual mode; adjusts control surface throws.
      type: float
      default: 1.0
      unit: norm
      min: 0.0
      decimal: 2
      increment: 0.01
    FW_RLL_TO_YAW_FF:
      description:
        short: Roll control to yaw control feedforward gain
        long: |-
          Counteracts adverse yaw: when the plane rolls, the nose yaws out of the turn.
          Applies yaw actuator to counteract this effect.
      type: float
      default: 0.0
      min: 0.0
      decimal: 1
      increment: 0.01
    FW_SPOILERS_MAN:
      description:
        short: Spoiler input in manual flight
      type: enum
      values:
        0: Disabled
        1: Flaps channel
        2: Aux1
        3: Aux2
        4: Aux3
        5: Aux4
        6: Aux5
      default: 0
    FW_FLAPS_MAN:
      description:
        short: Flap input in manual flight
      type: enum
      values:
        0: Disabled
        1: Aux1
        2: Aux2
        3: Aux3
        4: Aux4
        5: Aux5
        6: Flaps channel
      default: 0
    FW_ACRO_YAW_EN:
      description:
        short: Enable yaw rate controller in Acro
        long: |-
          Enables yaw rate controller in FW Acro; disabled by default because an active
          controller fights the plane's natural turn coordination.
          When disabled, pilot directly commands the yaw actuator.
      type: boolean
      default: 0
