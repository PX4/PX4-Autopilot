module_name: payload_deliverer

parameters:
    - group: Payload Deliverer
      definitions:

        # Gripper configuration
        PD_GRIPPER_TYPE:
            description:
                short: Type of Gripper (Servo, etc.)
            type: enum
            values:
                -1: Undefined
                0: Servo
            min: -1
            max: 0
            default: 0

        PD_GRIPPER_TO:
            description:
                short: Timeout for successful gripper actuation acknowledgement
                long: |-
                  Max wait for gripper actuation acknowledgement. Without a feedback
                  sensor, success is assumed after this interval and VehicleCommandAck published.
            type: float
            unit: s
            min: 0
            default: 1
