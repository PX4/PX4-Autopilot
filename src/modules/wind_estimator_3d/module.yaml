module_name: wind_estimator_3d
parameters:
- group: 3D Wind Estimator
  definitions:
    FW_W_MASS:
      description:
        short: Vehicle Mass
      type: float
      default: 1.0
      unit: 'kg'
      min: 0.0
      decimal: 3
      increment: 0.01
    FW_W_AREA:
      description:
        short: Vehicle Mass
      type: float
      default: 0.34
      unit: 'm^2'
      min: 0.0
      max: 25
      decimal: 3
      increment: 0.01
    FW_W_CY_B:
      description:
        short: Sideslip force coefficient (side slip)
      type: float
      default: 1.0
      min: 0.0
      max: 4
      decimal: 3
      increment: 0.01
    FW_W_CL_0:
      description:
        short: Lift coefficient (zero angle of attack)
      type: float
      default: 0.15188
      min: 0.0
      max: 4
      decimal: 3
      increment: 0.01
    FW_W_CL_A:
      description:
        short: Lift coefficient (angle of attack)
      type: float
      default: 5.015
      min: 0.0
      max: 10
      decimal: 3
      increment: 0.01
