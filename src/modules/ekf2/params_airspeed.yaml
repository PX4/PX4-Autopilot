module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_ARSP_THR:
      description:
        short: Airspeed fusion threshold
        long: Fuses airspeed for wind estimation above this threshold; 0 disables.
          For reliable wind, also enable EKF2_FUSE_BETA. Fixed-wing/VTOL in FW mode only.
      type: float
      default: 0.0
      min: 0.0
      unit: m/s
      decimal: 1
    EKF2_ASP_DELAY:
      description:
        short: Airspeed measurement delay relative to IMU measurements
      type: float
      default: 100
      min: 0
      max: 300
      unit: ms
      reboot_required: true
      decimal: 1
    EKF2_TAS_GATE:
      description:
        short: Gate size for TAS fusion
      type: float
      default: 5.0
      min: 1.0
      unit: SD
      decimal: 1
    EKF2_EAS_NOISE:
      description:
        short: Measurement noise for airspeed fusion
      type: float
      default: 1.4
      min: 0.5
      max: 5.0
      unit: m/s
      decimal: 1
