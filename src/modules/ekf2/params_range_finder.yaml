module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_RNG_CTRL:
      description:
        short: Range sensor height aiding
        long: |-
          WARNING: Range finder is less reliable and can have unexpected errors.
          Use MPC_ALT_MODE for precise ground-relative height control unless baro errors affect landing/takeoff.
          Fuses range as an additional height source.
          Conditional mode (value 1): active only below EKF2_RNG_A_VMAX and EKF2_RNG_A_HMAX,
          for vertical takeoff/landing where rotor wash corrupts baro.
      type: enum
      values:
        0: Disable range fusion
        1: Enabled (conditional mode)
        2: Enabled
      default: 1
    EKF2_RNG_DELAY:
      description:
        short: Range finder measurement delay relative to IMU measurements
      type: float
      default: 5
      min: 0
      max: 300
      unit: ms
      reboot_required: true
      decimal: 1
    EKF2_RNG_GATE:
      description:
        short: Gate size for range finder fusion
      type: float
      default: 5.0
      min: 1.0
      unit: SD
      decimal: 1
    EKF2_RNG_NOISE:
      description:
        short: Measurement noise for range finder fusion
      type: float
      default: 0.1
      min: 0.01
      unit: m
      decimal: 2
    EKF2_RNG_PITCH:
      description:
        short: Range sensor pitch offset
      type: float
      default: 0.0
      min: -0.75
      max: 0.75
      unit: rad
      decimal: 3
    EKF2_RNG_A_VMAX:
      description:
        short: Maximum horizontal velocity allowed for conditional range aid mode
        long: Horizontal speed limit for range aid in conditional mode (EKF2_RNG_CTRL=1);
          fusion disabled above this.
      type: float
      default: 1.0
      min: 0.1
      max: 2
      unit: m/s
    EKF2_RNG_A_HMAX:
      description:
        short: Maximum height above ground allowed for conditional range aid mode
        long: Altitude limit for range aid in conditional mode (EKF2_RNG_CTRL=1);
          fusion disabled above this.
      type: float
      default: 5.0
      min: 1.0
      max: 10.0
      unit: m
    EKF2_RNG_QLTY_T:
      description:
        short: Minumum range validity period
        long: Min duration of non-zero quality signal required to declare valid.
      type: float
      default: 1.0
      unit: s
      min: 0.1
      max: 5
    EKF2_RNG_K_GATE:
      description:
        short: Gate size used for range finder kinematic consistency check
        long: |-
          Checks that range-rate projected on vertical is consistent with estimated vertical velocity.
          Decrease to increase robustness to faulty data (stuck, reflections).
          Tune EKF2_RNG_NOISE and EKF2_RNG_SFE before adjusting this gate.
      type: float
      default: 1.0
      unit: SD
      min: 0.1
      max: 5.0
    EKF2_RNG_SFE:
      description:
        short: Range finder range dependent noise scaler
        long: Noise scales with range at this rate.
      type: float
      default: 0.05
      min: 0.0
      max: 0.2
      unit: m/m
    EKF2_RNG_POS_X:
      description:
        short: X position of range finder origin in body frame
        long: Forward axis with origin relative to vehicle centre of gravity
      type: float
      default: 0.0
      unit: m
      decimal: 3
    EKF2_RNG_POS_Y:
      description:
        short: Y position of range finder origin in body frame
        long: Forward axis with origin relative to vehicle centre of gravity
      type: float
      default: 0.0
      unit: m
      decimal: 3
    EKF2_RNG_POS_Z:
      description:
        short: Z position of range finder origin in body frame
        long: Forward axis with origin relative to vehicle centre of gravity
      type: float
      default: 0.0
      unit: m
      decimal: 3
    EKF2_RNG_FOG:
      description:
        short: Maximum distance at which the range finder could detect fog
        long: |-
          Readings > this value are not considered fog/rain-blocked.
          A jump from above to below this threshold may reject the measurement.
          0: disabled.
      type: float
      default: 3.0
      min: 0.0
      max: 20.0
      unit: m
      decimal: 1
