module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_GPS_CTRL:
      description:
        short: GNSS sensor aiding
      type: bitmask
      bit:
        0: Lon/lat
        1: Altitude
        2: 3D velocity
        3: Dual antenna heading
      default: 7
      min: 0
      max: 15
    EKF2_GPS_MODE:
      description:
        short: Fusion reset mode
      type: enum
      values:
        0: Automatic (reset on timeout if no other position source)
        1: Dead-reckoning (reset on timeout if no velocity source)
      default: 0
    EKF2_GPS_P_NOISE:
      description:
        short: Measurement noise for GNSS position
      type: float
      default: 0.5
      min: 0.01
      max: 10.0
      unit: m
      decimal: 2
    EKF2_GPS_P_GATE:
      description:
        short: Gate size for GNSS position fusion
      type: float
      default: 5.0
      min: 1.0
      unit: SD
      decimal: 1
    EKF2_GPS_YAW_OFF:
      description:
        short: Heading/Yaw offset for dual antenna GPS
      type: float
      default: 0.0
      min: 0.0
      max: 360.0
      unit: deg
      decimal: 1
    EKF2_GPS_V_GATE:
      description:
        short: Gate size for GNSS velocity fusion
      type: float
      default: 5.0
      min: 1.0
      unit: SD
      decimal: 1
    EKF2_GPS_V_NOISE:
      description:
        short: Measurement noise for GNSS velocity
      type: float
      default: 0.3
      min: 0.01
      max: 5.0
      unit: m/s
      decimal: 2
    EKF2_GPS_CHECK:
      description:
        short: Integer bitmask controlling GPS checks
        long: Drift and offset checks (bits 5-8) only run when on ground and stationary.
      type: bitmask
      bit:
        0: Sat count (EKF2_REQ_NSATS)
        1: PDOP (EKF2_REQ_PDOP)
        2: EPH (EKF2_REQ_EPH)
        3: EPV (EKF2_REQ_EPV)
        4: Speed accuracy (EKF2_REQ_SACC)
        5: Horizontal position drift (EKF2_REQ_HDRIFT)
        6: Vertical position drift (EKF2_REQ_VDRIFT)
        7: Horizontal speed offset (EKF2_REQ_HDRIFT)
        8: Vertical speed offset (EKF2_REQ_VDRIFT)
        9: Spoofing
        10: GPS fix type (EKF2_REQ_FIX)
        11: Jamming
      default: 2047
      min: 0
      max: 4095
    EKF2_REQ_EPH:
      description:
        short: Required EPH to use GPS
      type: float
      default: 3.0
      min: 0.1
      max: 100
      unit: m
      decimal: 1
    EKF2_REQ_EPV:
      description:
        short: Required EPV to use GPS
      type: float
      default: 5.0
      min: 0.1
      max: 100
      unit: m
      decimal: 1
    EKF2_REQ_SACC:
      description:
        short: Required speed accuracy to use GPS
      type: float
      default: 0.5
      min: 0.5
      max: 5.0
      unit: m/s
      decimal: 2
    EKF2_REQ_NSATS:
      description:
        short: Required satellite count to use GPS
      type: int32
      default: 6
      min: 4
      max: 12
    EKF2_REQ_PDOP:
      description:
        short: Maximum PDOP to use GPS
      type: float
      default: 2.5
      min: 1.5
      max: 5.0
      decimal: 1
    EKF2_REQ_HDRIFT:
      description:
        short: Maximum horizontal drift speed to use GPS
      type: float
      default: 0.1
      min: 0.1
      max: 1.0
      unit: m/s
      decimal: 2
    EKF2_REQ_VDRIFT:
      description:
        short: Maximum vertical drift speed to use GPS
      type: float
      default: 0.2
      min: 0.1
      max: 1.5
      decimal: 2
      unit: m/s
    EKF2_REQ_FIX:
      description:
        short: Required GPS fix
      type: enum
      values:
        0: No fix required
        2: 2D fix
        3: 3D fix
        4: RTCM code differential
        5: RTK float
        6: RTK fixed
        8: Extrapolated
      default: 3
    EKF2_REQ_GPS_H:
      description:
        short: Required GPS health time on startup
        long: Min continuous fault-free period to mark GPS healthy. Can reduce to speed
          up init, but not recommended to change.
      type: float
      default: 10.0
      min: 0.1
      decimal: 1
      unit: s
      reboot_required: true
    EKF2_GSF_TAS:
      description:
        short: Default value of true airspeed used in EKF-GSF AHRS calculation
        long: Assumed TAS for EKF-GSF centripetal compensation during turns when no
          airspeed available. 0 disables compensation in fixed-wing modes.
      type: float
      default: 15.0
      min: 0.0
      unit: m/s
      max: 100.0
      decimal: 1
