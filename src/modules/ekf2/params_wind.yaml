module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_WIND_NSD:
      description:
        short: Process noise spectral density for wind velocity prediction
        long: When unaided, wind estimate 1-sigma uncertainty grows by this amount
          per second.
      type: float
      default: 0.05
      min: 0.0
      max: 1.0
      unit: m/s^2/sqrt(Hz)
      decimal: 3
