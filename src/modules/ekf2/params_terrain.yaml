module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_TERR_NOISE:
      description:
        short: Terrain altitude process noise
      type: float
      default: 5.0
      min: 0.5
      unit: m/s
      decimal: 1
    EKF2_TERR_GRAD:
      description:
        short: Magnitude of terrain gradient
      type: float
      default: 0.5
      min: 0.0
      unit: m/m
      decimal: 2
    EKF2_MIN_RNG:
      description:
        short: Expected range finder reading when on ground
        long: Used by terrain estimator when on ground, stationary, and range finder
          reports invalid/no data. Ensures terrain estimate availability at takeoff
          if sensor is within minimum range.
      type: float
      default: 0.01
      min: 0.01
      unit: m
      decimal: 2
