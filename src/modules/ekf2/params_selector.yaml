module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_SEL_ERR_RED:
      description:
        short: Selector error reduce threshold
        long: An instance must outperform the selected by at least this margin before
          its relative score decreases.
      type: float
      default: 0.2
    EKF2_SEL_IMU_RAT:
      description:
        short: Selector angular rate threshold
        long: Angular rate error threshold; differences above this accumulate angular
          error.
      type: float
      default: 7.0
      unit: deg/s
    EKF2_SEL_IMU_ANG:
      description:
        short: Selector angular threshold
        long: Max accumulated gyro angular error before sensor is declared faulty.
      type: float
      default: 15.0
      unit: deg
    EKF2_SEL_IMU_ACC:
      description:
        short: Selector acceleration threshold
        long: Acceleration error threshold; differences above this accumulate velocity
          error.
      type: float
      default: 1.0
      unit: m/s^2
    EKF2_SEL_IMU_VEL:
      description:
        short: Selector angular threshold
        long: Max accumulated accelerometer velocity error before sensor is declared
          faulty.
      type: float
      default: 2.0
      unit: m/s
