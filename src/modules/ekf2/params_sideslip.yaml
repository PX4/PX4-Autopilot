module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_FUSE_BETA:
      description:
        short: Enable synthetic sideslip fusion
        long: For reliable wind, also enable EKF2_ARSP_THR. Fixed-wing or active airspeed
          fusion only. Not supported for tailsitters.
      type: boolean
      default: 0
    EKF2_BETA_GATE:
      description:
        short: Gate size for synthetic sideslip fusion
      type: float
      default: 5.0
      min: 1.0
      unit: SD
      decimal: 1
    EKF2_BETA_NOISE:
      description:
        short: Noise for synthetic sideslip fusion
      type: float
      default: 0.3
      min: 0.1
      max: 1.0
      unit: m/s
      decimal: 2
