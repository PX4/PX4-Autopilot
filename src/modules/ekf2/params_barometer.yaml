module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_BARO_CTRL:
      description:
        short: Barometric sensor height aiding
      type: boolean
      default: 1
    EKF2_BARO_DELAY:
      description:
        short: Barometer measurement delay relative to IMU measurements
      type: float
      default: 0
      min: 0
      max: 300
      unit: ms
      reboot_required: true
      decimal: 1
    EKF2_BARO_GATE:
      description:
        short: Gate size for barometric and GPS height fusion
      type: float
      default: 5.0
      min: 1.0
      unit: SD
      decimal: 1
    EKF2_BARO_NOISE:
      description:
        short: Measurement noise for barometric altitude
      type: float
      default: 3.5
      min: 0.01
      max: 15.0
      unit: m
      decimal: 2
    EKF2_GND_EFF_DZ:
      description:
        short: Baro deadzone range for height fusion
        long: Deadzone for negative baro innovations; enabled when > 0.
      type: float
      default: 4.0
      min: 0.0
      max: 10.0
      unit: m
      decimal: 1
    EKF2_GND_MAX_HGT:
      description:
        short: Height above ground level for ground effect zone
        long: Max AGL height where negative baro innovations (ground effect) are expected.
      type: float
      default: 0.5
      min: 0.0
      max: 5.0
      unit: m
      decimal: 1
    EKF2_PCOEF_XP:
      description:
        short: Static pressure position error coefficient for the positive X axis
        long: Ratio of static pressure error to dynamic pressure for positive X wind.
          Negative if baro rises in forward flight.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    EKF2_PCOEF_XN:
      description:
        short: Static pressure position error coefficient for the negative X axis
        long: Ratio of static pressure error to dynamic pressure for negative X wind.
          Negative if baro rises in reverse flight.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    EKF2_PCOEF_YP:
      description:
        short: Pressure position error coefficient for the positive Y axis
        long: Ratio of static pressure error to dynamic pressure for positive Y (RH)
          wind. Negative if baro rises in rightward flight.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    EKF2_PCOEF_YN:
      description:
        short: Pressure position error coefficient for the negative Y axis
        long: Ratio of static pressure error to dynamic pressure for negative Y (LH)
          wind. Negative if baro rises in leftward flight.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    EKF2_PCOEF_Z:
      description:
        short: Static pressure position error coefficient for the Z axis
        long: Ratio of static pressure error to dynamic pressure for Z-axis wind.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    EKF2_ASPD_MAX:
      description:
        short: Maximum airspeed used for baro static pressure compensation
      type: float
      default: 20.0
      min: 5.0
      max: 50.0
      unit: m/s
      decimal: 1
