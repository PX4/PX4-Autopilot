module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_DRAG_CTRL:
      description:
        short: Multirotor wind estimation selection
        long: Uses specific-force measurements with drag model (EKF2_BCOEF_[XY],
          EKF2_MCOEF). Only for Z-aligned thrust vehicles with no XY thrust.
      type: boolean
      default: 0
    EKF2_DRAG_NOISE:
      description:
        short: Specific drag force observation noise variance
        long: Used by the multi-rotor drag model. Higher values slow wind estimate
          adjustment.
      type: float
      default: 2.5
      min: 0.5
      max: 10.0
      unit: (m/s^2)^2
      decimal: 2
    EKF2_BCOEF_X:
      description:
        short: X-axis ballistic coefficient used for multi-rotor wind estimation
        long: Bluff-body drag along forward/reverse axis (scales with v²). Rotor drag
          is separate (EKF2_MCOEF). 0 disables for this axis. Requires EKF2_DRAG_CTRL.
      type: float
      default: 100.0
      min: 0.0
      max: 200.0
      unit: kg/m^2
      decimal: 1
    EKF2_BCOEF_Y:
      description:
        short: Y-axis ballistic coefficient used for multi-rotor wind estimation
        long: Bluff-body drag along right/left axis (scales with v²). Rotor drag is
          separate (EKF2_MCOEF). 0 disables for this axis. Requires EKF2_DRAG_CTRL.
      type: float
      default: 100.0
      min: 0.0
      max: 200.0
      unit: kg/m^2
      decimal: 1
    EKF2_MCOEF:
      description:
        short: Propeller momentum drag coefficient for multi-rotor wind estimation
        long: |-
          Propeller momentum drag (scales with v, not v²): air normal to the rotor disc loses
          velocity, changing momentum and creating drag. Roughly proportional to blade side-on
          area; significantly higher for ducted rotors.
          For bluff-body drag (v²) see EKF2_BCOEF_X/Y. 0 disables for both axes.
      type: float
      default: 0.15
      min: 0
      max: 1.0
      unit: 1/s
      decimal: 2
