module_name: ekf2
parameters:
- group: EKF2
  definitions:
    EKF2_MAG_TYPE:
      description:
        short: Type of magnetometer fusion
        long: |-
          3-axis fusion can learn body-fixed hard iron errors but requires a stable earth field.
          Automatic: heading on-ground, 3-axis in-flight.
          None: mag unused; yaw can be aligned post-takeoff via horizontal movement and GNSS velocity.
          Init: mag used only to initialize heading.
      type: enum
      values:
        0: Automatic
        1: Magnetic heading
        5: None
        6: Init
      default: 0
      reboot_required: true
    EKF2_MAG_DELAY:
      description:
        short: Magnetometer measurement delay relative to IMU measurements
      type: float
      default: 0
      min: 0
      max: 300
      unit: ms
      reboot_required: true
      decimal: 1
    EKF2_MAG_GATE:
      description:
        short: Gate size for magnetometer XYZ component fusion
      type: float
      default: 3.0
      min: 1.0
      unit: SD
      decimal: 1
    EKF2_MAG_NOISE:
      description:
        short: Measurement noise for magnetometer 3-axis fusion
      type: float
      default: 0.05
      min: 0.001
      max: 1.0
      unit: gauss
      decimal: 3
    EKF2_MAG_B_NOISE:
      description:
        short: Process noise for body magnetic field prediction
      type: float
      default: 0.0001
      min: 0.0
      max: 0.1
      unit: gauss/s
      decimal: 6
    EKF2_MAG_E_NOISE:
      description:
        short: Process noise for earth magnetic field prediction
      type: float
      default: 0.001
      min: 0.0
      max: 0.1
      unit: gauss/s
      decimal: 6
    EKF2_DECL_TYPE:
      description:
        short: Integer bitmask controlling handling of magnetic declination
        long: "0: uses EKF2_MAG_DECL when GPS unavailable. 1: updates EKF2_MAG_DECL\
          \ from EKF on disarm."
      type: bitmask
      bit:
        0: use geo_lookup declination
        1: save EKF2_MAG_DECL on disarm
      default: 3
      min: 0
      max: 3
      reboot_required: true
    EKF2_MAG_ACCLIM:
      description:
        short: Horizontal acceleration threshold used for heading observability check
        long: Heading considered observable when body accel exceeds this, given active
          global position/velocity aiding.
      type: float
      default: 0.5
      min: 0.0
      max: 5.0
      unit: m/s^2
      decimal: 2
    EKF2_MAG_CHECK:
      description:
        short: Magnetic field strength test selection
        long: With GNSS, compares against WMM; otherwise uses an average. Useful to
          reject hard iron disturbance.
      type: bitmask
      bit:
        0: Strength (EKF2_MAG_CHK_STR)
        1: Inclination (EKF2_MAG_CHK_INC)
        2: Wait for WMM
      default: 1
      min: 0
      max: 7
    EKF2_MAG_CHK_STR:
      description:
        short: Magnetic field strength check tolerance
        long: Maximum allowed deviation from the expected magnetic field strength
          to pass the check.
      type: float
      default: 0.2
      min: 0.0
      max: 1.0
      unit: gauss
      decimal: 2
    EKF2_MAG_CHK_INC:
      description:
        short: Magnetic field inclination check tolerance
        long: Maximum allowed deviation from the expected magnetic field inclination
          to pass the check.
      type: float
      default: 20.0
      min: 0.0
      max: 90.0
      unit: deg
      decimal: 1
    EKF2_SYNT_MAG_Z:
      description:
        short: Enable synthetic magnetometer Z component measurement
        long: |-
          For Z-axis magnetic interference. In heading fusion: replaces measured Z with a synthetic
          value from the 3D field vector at the drone's location (requires known global position).
          In 3D fusion: Z measurement is ignored rather than replaced.
      type: boolean
      default: 0
