module_name: mc_pos_control
parameters:
- group: Multicopter Position Control
  definitions:
    MPC_MAN_TILT_MAX:
      description:
        short: Maximal tilt angle in Stabilized, Altitude and Altitude Cruise mode
      type: float
      default: 35.0
      unit: deg
      min: 1
      max: 70
      decimal: 0
      increment: 1
    MPC_MAN_Y_MAX:
      description:
        short: Max manual yaw rate for Stabilized, Altitude, Position mode
      type: float
      default: 150.0
      unit: deg/s
      min: 0
      max: 400
      decimal: 0
      increment: 10
    MPC_MANTHR_MIN:
      description:
        short: Minimum collective thrust in Stabilized mode
        long: |-
          Maps to lowest throttle stick in Stabilized mode.
          Too low loses torque authority. With airmode (see MC_AIRMODE) can be 0.
      type: float
      default: 0.08
      unit: norm
      min: 0
      max: 1
      decimal: 2
      increment: 0.01
    MPC_THR_CURVE:
      description:
        short: Thrust curve mapping in Stabilized Mode
      type: enum
      values:
        0: Rescale to estimate (center stick = hover thrust estimate output)
        1: No rescale (direct 1:1; useful at very low hover thrust)
        2: Rescale to MPC_THR_HOVER (equivalent to No rescale when MPC_THR_HOVER=0.5)
      default: 0
