module_name: mc_pos_control
parameters:
- group: Multicopter Position Control
  definitions:
    SYS_VEHICLE_RESP:
      description:
        short: Responsiveness
        long: |-
          Controls overall responsiveness; higher = faster reaction.
          >0: auto-sets accel/jerk limits. <0: use individual params.
      type: float
      default: -0.4
      min: -1
      max: 1
      decimal: 2
      increment: 0.05
    MPC_XY_VEL_ALL:
      description:
        short: Overall Horizontal Velocity Limit
        long: |-
          >0: auto-sets MPC_XY_VEL_MAX, MPC_VEL_MANUAL etc.
          <0: use individual params.
      type: float
      default: -10.0
      min: -20
      max: 20
      decimal: 1
      increment: 1
    MPC_Z_VEL_ALL:
      description:
        short: Overall Vertical Velocity Limit
        long: |-
          >0: auto-sets MPC_Z_VEL_MAX_UP, MPC_LAND_SPEED etc.
          <0: use individual params.
      type: float
      default: -3.0
      min: -3
      max: 8
      decimal: 1
      increment: 0.5
