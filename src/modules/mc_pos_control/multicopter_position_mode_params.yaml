module_name: mc_pos_control
parameters:
- group: Multicopter Position Control
  definitions:
    MPC_POS_MODE:
      description:
        short: Position/Altitude mode variant
      type: enum
      values:
        0: Direct velocity (sticks map to velocity; no smoothing; applies to vertical/Altitude; useful for tuning)
        4: Acceleration based (sticks map to accel, virtual drag braking)
      default: 4
    MPC_VEL_MANUAL:
      description:
        short: Maximum horizontal velocity setpoint in Position mode
        long: Must be < MPC_XY_VEL_MAX. Set sideways/backward separately with MPC_VEL_MAN_SIDE/MPC_VEL_MAN_BACK.
      type: float
      default: 10.0
      unit: m/s
      min: 3
      max: 20
      increment: 1
      decimal: 1
    MPC_VEL_MAN_SIDE:
      description:
        short: Maximum sideways velocity in Position mode
        long: Negative or > MPC_VEL_MANUAL uses MPC_VEL_MANUAL.
      type: float
      default: -1.0
      unit: m/s
      min: -1
      max: 20
      increment: 1
      decimal: 1
    MPC_VEL_MAN_BACK:
      description:
        short: Maximum backward velocity in Position mode
        long: Negative or > MPC_VEL_MANUAL uses MPC_VEL_MANUAL.
      type: float
      default: -1.0
      unit: m/s
      min: -1
      max: 20
      increment: 1
      decimal: 1
    MPC_ACC_HOR_MAX:
      description:
        short: Maximum horizontal acceleration
        long: |-
          MPC_POS_MODE
          1 just deceleration
          4 not used, use MPC_ACC_HOR instead
      type: float
      default: 5.0
      unit: m/s^2
      min: 2
      max: 15
      increment: 1
      decimal: 2
    MPC_JERK_MAX:
      description:
        short: Maximum horizontal and vertical jerk in Position/Altitude mode
        long: |-
          Max jerk (accel change rate). Lower = smoother, less agile.
          Max value disables. Only with MPC_POS_MODE 4 (Acceleration based).
      type: float
      default: 8.0
      unit: m/s^3
      min: 0.5
      max: 500
      decimal: 0
      increment: 1
