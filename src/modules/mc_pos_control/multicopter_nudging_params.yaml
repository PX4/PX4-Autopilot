module_name: mc_pos_control
parameters:
- group: Multicopter Position Control
  definitions:
    MPC_LAND_RC_HELP:
      description:
        short: Enable nudging based on user input during autonomous land routine
        long: |-
          Using stick input the vehicle can be moved horizontally and yawed.
          The descend speed is amended:
          stick full up - 0
          stick centered - MPC_LAND_SPEED
          stick full down - 2 * MPC_LAND_SPEED

          Manual override has to be disabled to use this feature (MAN_OVERRIDE_SPD -1).
      type: enum
      values:
        0: Nudging disabled
        1: Nudging enabled
      default: 0
      min: 0
      max: 1
    MPC_AUTO_RC_YAW:
      description:
        short: Enable yaw nudging on user input in autonomous modes.
        long: |-
          Using yaw stick the vehicle can be yawed in Auto modes (takeoff, mission, RTL, hold, landing).
          It deactivates with mode switch until yaw stick is moved again.

          Manual override during auto modes has to be disabled to use this feature (see COM_RC_OVERRIDE).
          !Warning! if COM_RC_OVERRIDE = 0 pilot cannot take over control of the vehicle. It is recommended to set a
          mode switch button on the RC to pass to Position mode in case of emergency.
      type: enum
      values:
        0: Yaw nudging disabled
        1: Yaw nudging enabled
      default: 0
      min: 0
      max: 1
    MPC_LAND_RADIUS:
      description:
        short: User assisted landing radius
        long: |-
          When nudging is enabled (see MPC_LAND_RC_HELP), this defines the maximum
          allowed horizontal displacement from the original landing point.
          - If inside of the radius, only allow nudging inputs that do not move the vehicle outside of it.
          - If outside of the radius, only allow nudging inputs that move the vehicle back towards it.

          Set it to -1 for infinite radius.
      type: float
      default: -1.0
      unit: m
      min: -1
      decimal: 0
      increment: 1
