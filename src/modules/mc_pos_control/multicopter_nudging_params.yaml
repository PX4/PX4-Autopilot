module_name: mc_pos_control
parameters:
- group: Multicopter Position Control
  definitions:
    MPC_LAND_RC_HELP:
      description:
        short: Enable nudging based on user input during autonomous land routine
        long: |-
          Stick input moves vehicle horizontally and adjusts descent rate:
          full up = 0, center = MPC_LAND_SPEED, full down = 2 * MPC_LAND_SPEED.
          Requires COM_RC_OVERRIDE disabled.
      type: enum
      values:
        0: Nudging disabled
        1: Nudging enabled
      default: 0
      min: 0
      max: 1
    MPC_LAND_RADIUS:
      description:
        short: User assisted landing radius
        long: |-
          Max horizontal displacement from the original landing point during nudging (MPC_LAND_RC_HELP).
          Inside: only nudge inward. Outside: only nudge back. -1: infinite.
      type: float
      default: -1.0
      unit: m
      min: -1
      decimal: 0
      increment: 1
