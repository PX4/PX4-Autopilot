module_name: mc_pos_control
parameters:
- group: Multicopter Position Control
  definitions:
    MPC_THR_HOVER:
      description:
        short: Vertical thrust required to hover
        long: |-
          Maps to center stick in Stabilized mode (see MPC_THR_CURVE).
          Initializes hover thrust estimator; estimated value sets zero-accel baseline in altitude control.
          Important for land detection.
      type: float
      default: 0.5
      unit: norm
      min: 0.1
      max: 0.8
      decimal: 2
      increment: 0.01
    MPC_THR_XY_MARG:
      description:
        short: Horizontal thrust margin
        long: Reserve for horizontal control when vertical thrust is saturated, preventing total horizontal authority loss.
      type: float
      default: 0.3
      unit: norm
      min: 0
      max: 0.5
      decimal: 2
      increment: 0.01
    MPC_VEL_LP:
      description:
        short: Velocity low pass cutoff frequency
        long: A value of 0 disables the filter.
      type: float
      default: 0.0
      unit: Hz
      min: 0
      max: 50
      decimal: 1
      increment: 0.5
    MPC_VEL_NF_FRQ:
      description:
        short: Velocity notch filter frequency
        long: "Center frequency of 2nd-order velocity notch filter. 0: disable."
      type: float
      default: 0.0
      unit: Hz
      min: 0
      max: 50
      decimal: 1
      increment: 0.5
    MPC_VEL_NF_BW:
      description:
        short: Velocity notch filter bandwidth
        long: A value of 0 disables the filter.
      type: float
      default: 5.0
      unit: Hz
      min: 0
      max: 50
      decimal: 1
      increment: 0.5
    MPC_VELD_LP:
      description:
        short: Velocity derivative low pass cutoff frequency
        long: A value of 0 disables the filter.
      type: float
      default: 5.0
      unit: Hz
      min: 0
      max: 50
      decimal: 1
      increment: 0.5
