module_name: mc_pos_control
parameters:
- group: Multicopter Position Control
  definitions:
    MPC_ACC_UP_MAX:
      description:
        short: Maximum upwards acceleration in climb rate controlled modes
      type: float
      default: 4.0
      unit: m/s^2
      min: 2
      max: 15
      decimal: 1
      increment: 1
    MPC_ACC_DOWN_MAX:
      description:
        short: Maximum downwards acceleration in climb rate controlled modes
      type: float
      default: 3.0
      unit: m/s^2
      min: 2
      max: 15
      decimal: 1
      increment: 1
    MPC_MAN_Y_TAU:
      description:
        short: Manual yaw rate input filter time constant
        long: 0 disables. Not used in Stabilized mode.
      type: float
      default: 0.08
      unit: s
      min: 0
      max: 5
      decimal: 2
      increment: 0.01
    MPC_ALT_MODE:
      description:
        short: Altitude reference mode
      type: enum
      values:
        0: Altitude following (earth-frame; may drift)
        1: Terrain following (distance sensor; reverts to earth-frame if invalid)
        2: Terrain hold (distance sensor when stationary, earth-frame when moving; threshold MPC_HOLD_MAX_XY)
      default: 2
      min: 0
      max: 2
    MPC_HOLD_MAX_XY:
      description:
        short: Max horizontal velocity for position hold
        long: Max horiz velocity for position hold; 0 disables. Only with MPC_POS_MODE 0 or MPC_ALT_MODE 2.
      type: float
      default: 0.8
      unit: m/s
      min: 0
      max: 3
      decimal: 2
    MPC_HOLD_MAX_Z:
      description:
        short: Max vertical velocity for position hold
        long: Max vert velocity for position hold; 0 disables. Only with MPC_ALT_MODE 1.
      type: float
      default: 0.6
      unit: m/s
      min: 0
      max: 3
      decimal: 2
