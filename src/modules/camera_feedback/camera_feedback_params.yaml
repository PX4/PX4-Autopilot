module_name: camera_feedback
parameters:
- group: Camera Control
  definitions:
    CAM_CAP_REPORT:
      description:
        short: Report captures to the ground station
        long: |
          Whether the autopilot reports captures to the ground station by emitting
          CAMERA_IMAGE_CAPTURED.

          Disable for cameras that report captures themselves (e.g. MAVLink Camera
          Protocol v1) to avoid duplicate CAMERA_IMAGE_CAPTURED messages. Capture
          events are still published on the camera_capture topic and logged for
          geotagging regardless of this setting.
      type: boolean
      default: 1
