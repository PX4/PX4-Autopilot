module_name: simulator_sih
parameters:
- group: Simulation In Hardware
  definitions:
    SIH_MASS:
      description:
        short: Vehicle mass
        long: Measurable by weighing on a scale.
      type: float
      default: 1.0
      unit: kg
      min: 0.0
      decimal: 2
      increment: 0.1
    SIH_IXX:
      description:
        short: Vehicle inertia about X axis
        long: 3x3 inertia matrix; resists changes in angular rate.
      type: float
      default: 0.025
      unit: kg m^2
      min: 0.0
      decimal: 3
      increment: 0.005
    SIH_IYY:
      description:
        short: Vehicle inertia about Y axis
        long: 3x3 inertia matrix; resists changes in angular rate.
      type: float
      default: 0.025
      unit: kg m^2
      min: 0.0
      decimal: 3
      increment: 0.005
    SIH_IZZ:
      description:
        short: Vehicle inertia about Z axis
        long: 3x3 inertia matrix; resists changes in angular rate.
      type: float
      default: 0.03
      unit: kg m^2
      min: 0.0
      decimal: 3
      increment: 0.005
    SIH_IXY:
      description:
        short: Vehicle cross term inertia xy
        long: "0 for a quad symmetric about its center of mass."
      type: float
      default: 0.0
      unit: kg m^2
      decimal: 3
      increment: 0.005
    SIH_IXZ:
      description:
        short: Vehicle cross term inertia xz
        long: "0 for a quad symmetric about its center of mass."
      type: float
      default: 0.0
      unit: kg m^2
      decimal: 3
      increment: 0.005
    SIH_IYZ:
      description:
        short: Vehicle cross term inertia yz
        long: "0 for a quad symmetric about its center of mass."
      type: float
      default: 0.0
      unit: kg m^2
      decimal: 3
      increment: 0.005
    SIH_T_MAX:
      description:
        short: Max multicopter propeller thrust force
        long: |-
          Max force per propeller at full speed.
          Typically ~5x vehicle mass.
          See SIH_F_T_MAX for FW/Tailsitter/VTOL pusher.
      type: float
      default: 5.0
      unit: N
      min: 0.0
      decimal: 2
      increment: 0.5
    SIH_Q_MAX:
      description:
        short: Max multicopter propeller torque
        long: |-
          Max torque per propeller at full speed.
          Typically a few percent of max thrust.
          See SIH_F_Q_MAX for FW/Tailsitter/VTOL pusher.
      type: float
      default: 0.1
      unit: Nm
      min: 0.0
      decimal: 3
      increment: 0.05
    SIH_L_ROLL:
      description:
        short: Roll arm length
        long: Half the distance between left and right motors; measurable with a ruler.
      type: float
      default: 0.2
      unit: m
      min: 0.0
      decimal: 2
      increment: 0.05
    SIH_L_PITCH:
      description:
        short: Pitch arm length
        long: Half the distance between front and rear motors; measurable with a ruler.
      type: float
      default: 0.2
      unit: m
      min: 0.0
      decimal: 2
      increment: 0.05
    SIH_KDV:
      description:
        short: First order drag coefficient
        long: |-
          Air drag coefficient: D = -KDV*V.
          Max freefall velocity = 10*MASS/KDV m/s.
      type: float
      default: 1.0
      unit: N/(m/s)
      min: 0.0
      decimal: 2
      increment: 0.05
    SIH_KDW:
      description:
        short: First order angular damper coefficient
        long: |-
          Rotational air drag: Ma = -KDW*W_B.
          Set to 0 if unknown.
      type: float
      default: 0.025
      unit: Nm/(rad/s)
      min: 0.0
      decimal: 3
      increment: 0.005
    SIH_LOC_LAT0:
      description:
        short: Initial geodetic latitude
        long: |-
          North-South starting location.
          LAT0, LON0, H0, MU_X, MU_Y, MU_Z should be mutually consistent.
      type: float
      default: 47.397742
      unit: deg
      min: -90
      max: 90
    SIH_LOC_LON0:
      description:
        short: Initial geodetic longitude
        long: |-
          East-West starting location.
          LAT0, LON0, H0, MU_X, MU_Y, MU_Z should be mutually consistent.
      type: float
      default: 8.545594
      unit: deg
      min: -180
      max: 180
    SIH_LOC_H0:
      description:
        short: Initial AMSL ground altitude
        long: |-
          AMSL altitude at simulation start.
          Adjust so the vehicle sits on the ground at takeoff when using FlightGear.
          LAT0, LON0, H0, MU_X, MU_Y, MU_Z should be mutually consistent.
      type: float
      default: 489.4
      unit: m
      min: -420.0
      max: 8848.0
      decimal: 2
      increment: 0.01
    SIH_DISTSNSR_MIN:
      description:
        short: distance sensor minimum range
      type: float
      default: 0.0
      unit: m
      min: 0.0
      max: 10.0
      decimal: 4
      increment: 0.01
    SIH_DISTSNSR_MAX:
      description:
        short: distance sensor maximum range
      type: float
      default: 100.0
      unit: m
      min: 0.0
      max: 1000.0
      decimal: 4
      increment: 0.01
    SIH_DISTSNSR_OVR:
      description:
        short: if >= 0 the distance sensor measures will be overridden by this value
        long: Disables distance sensor if absolute value exceeds 10000.
      type: float
      default: -1.0
      unit: m
    SIH_T_TAU:
      description:
        short: thruster time constant tau
        long: Time for thruster to step 0 to 100% is about 4*tau.
      type: float
      default: 0.05
      unit: s
    SIH_VEHICLE_TYPE:
      description:
        short: Vehicle type
      type: enum
      values:
        0: Quadcopter
        1: Fixed-Wing
        2: Tailsitter
        3: Standard VTOL
        4: Hexacopter
        5: Rover Ackermann
      default: 0
      reboot_required: true
    SIH_WIND_N:
      description:
        short: Wind velocity from north direction
      type: float
      default: 0.0
      unit: m/s
    SIH_WIND_E:
      description:
        short: Wind velocity from east direction
      type: float
      default: 0.0
      unit: m/s
    SIH_RNGBC_NOISE:
      description:
        short: Ranging beacon measurement noise standard deviation
        long: Gaussian noise on simulated ranging beacons. 0 = disabled.
      type: float
      default: 30.0
      unit: m
      min: 0.0
      max: 100.0
      decimal: 1
    SIH_F_T_MAX:
      description:
        short: Forward thruster max thrust (N)
        long: |-
          Used for FW/Tailsitter/VTOL pusher when SIH_F_CT0 <= 0.
          If SIH_F_CT0 > 0, propeller model (advance ratio J) is used and this is overridden at startup.
      type: float
      default: 2.0
      unit: N
      min: 0.0
      decimal: 3
    SIH_F_Q_MAX:
      description:
        short: Forward thruster max torque (Nm)
        long: |-
          Used for FW/Tailsitter/VTOL pusher when SIH_F_CP0 <= 0.
          If SIH_F_CP0 > 0, propeller model (advance ratio J) is used and this is overridden at startup.
      type: float
      default: 0.0165
      unit: Nm
      min: 0.0
      decimal: 3
    SIH_F_CT0:
      description:
        short: Forward thruster static thrust coefficient
      type: float
      default: 0.0
      min: 0.0
      decimal: 3
    SIH_F_CT1:
      description:
        short: Forward thruster thrust coefficient 1
        long: CT(J) = CT0 + CT1*J + CT2*J^2
      type: float
      default: 0.0
      decimal: 3
    SIH_F_CT2:
      description:
        short: Forward thruster thrust coefficient 2
        long: CT(J) = CT0 + CT1*J + CT2*J^2
      type: float
      default: 0.0
      max: 0.0
      decimal: 3
    SIH_F_CP0:
      description:
        short: Forward thruster static power coefficient
      type: float
      default: 0.0
      min: 0.0
      decimal: 3
    SIH_F_CP1:
      description:
        short: Forward thruster power coefficient 1
        long: CP(J) = CP0 + CP1*J + CP2*J^2
      type: float
      default: 0.0
      decimal: 3
    SIH_F_CP2:
      description:
        short: Forward thruster power coefficient 2
        long: CP(J) = CP0 + CP1*J + CP2*J^2
      type: float
      default: 0.0
      max: 0.0
      decimal: 3
    SIH_F_DIA_INCH:
      description:
        short: Forward thruster propeller diameter in inches
      type: float
      default: 0.1
      min: 0.1
      decimal: 1
    SIH_F_RPM_MAX:
      description:
        short: Forward thruster max RPM
      type: float
      default: 6000.0
      min: 0.1
      decimal: 1
