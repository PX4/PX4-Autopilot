module_name: simulator_sih
parameters:
- group: Simulation In Hardware
  definitions:
    SIH_MASS:
      description:
        short: Vehicle mass
        long: This value can be measured by weighting the quad on a scale.
      type: float
      default: 1.0
      unit: kg
      min: 0.0
      decimal: 2
      increment: 0.1
    SIH_IXX:
      description:
        short: Vehicle inertia about X axis
        long: |-
          The inertia is a 3 by 3 symmetric matrix.
          It represents the difficulty of the vehicle to modify its angular rate.
      type: float
      default: 0.025
      unit: kg m^2
      min: 0.0
      decimal: 3
      increment: 0.005
    SIH_IYY:
      description:
        short: Vehicle inertia about Y axis
        long: |-
          The inertia is a 3 by 3 symmetric matrix.
          It represents the difficulty of the vehicle to modify its angular rate.
      type: float
      default: 0.025
      unit: kg m^2
      min: 0.0
      decimal: 3
      increment: 0.005
    SIH_IZZ:
      description:
        short: Vehicle inertia about Z axis
        long: |-
          The inertia is a 3 by 3 symmetric matrix.
          It represents the difficulty of the vehicle to modify its angular rate.
      type: float
      default: 0.03
      unit: kg m^2
      min: 0.0
      decimal: 3
      increment: 0.005
    SIH_IXY:
      description:
        short: Vehicle cross term inertia xy
        long: |-
          The inertia is a 3 by 3 symmetric matrix.
          This value can be set to 0 for a quad symmetric about its center of mass.
      type: float
      default: 0.0
      unit: kg m^2
      decimal: 3
      increment: 0.005
    SIH_IXZ:
      description:
        short: Vehicle cross term inertia xz
        long: |-
          The inertia is a 3 by 3 symmetric matrix.
          This value can be set to 0 for a quad symmetric about its center of mass.
      type: float
      default: 0.0
      unit: kg m^2
      decimal: 3
      increment: 0.005
    SIH_IYZ:
      description:
        short: Vehicle cross term inertia yz
        long: |-
          The inertia is a 3 by 3 symmetric matrix.
          This value can be set to 0 for a quad symmetric about its center of mass.
      type: float
      default: 0.0
      unit: kg m^2
      decimal: 3
      increment: 0.005
    SIH_T_MAX:
      description:
        short: Max multicopter propeller thrust force
        long: |-
          This is the maximum force delivered by one propeller
          when the motor is running at full speed.

          This value is usually about 5 times the mass of the quadrotor.

          Refer to SIH_F_T_MAX for the thrust for FW, Tailsitter, and VTOL pusher.
      type: float
      default: 5.0
      unit: N
      min: 0.0
      decimal: 2
      increment: 0.5
    SIH_Q_MAX:
      description:
        short: Max multicopter propeller torque
        long: |-
          This is the maximum torque delivered by one propeller
          when the motor is running at full speed.

          This value is usually about few percent of the maximum thrust force.

          Refer to SIH_F_Q_MAX for the propeller torque for FW, Tailsitter, and VTOL pusher.
      type: float
      default: 0.1
      unit: Nm
      min: 0.0
      decimal: 3
      increment: 0.05
    SIH_L_ROLL:
      description:
        short: Roll arm length
        long: |-
          This is the arm length generating the rolling moment

          This value can be measured with a ruler.
          This corresponds to half the distance between the left and right motors.
      type: float
      default: 0.2
      unit: m
      min: 0.0
      decimal: 2
      increment: 0.05
    SIH_L_PITCH:
      description:
        short: Pitch arm length
        long: |-
          This is the arm length generating the pitching moment

          This value can be measured with a ruler.
          This corresponds to half the distance between the front and rear motors.
      type: float
      default: 0.2
      unit: m
      min: 0.0
      decimal: 2
      increment: 0.05
    SIH_KDV:
      description:
        short: First order drag coefficient
        long: |-
          Physical coefficient representing the friction with air particules.
          The greater this value, the slower the quad will move.

          Drag force function of velocity: D=-KDV*V.
          The maximum freefall velocity can be computed as V=10*MASS/KDV [m/s]
      type: float
      default: 1.0
      unit: N/(m/s)
      min: 0.0
      decimal: 2
      increment: 0.05
    SIH_KDW:
      description:
        short: First order angular damper coefficient
        long: |-
          Physical coefficient representing the friction with air particules during rotations.
          The greater this value, the slower the quad will rotate.

          Aerodynamic moment function of body rate: Ma=-KDW*W_B.
          This value can be set to 0 if unknown.
      type: float
      default: 0.025
      unit: Nm/(rad/s)
      min: 0.0
      decimal: 3
      increment: 0.005
    SIH_LOC_LAT0:
      description:
        short: Initial geodetic latitude
        long: |-
          This value represents the North-South location on Earth where the simulation begins.

          LAT0, LON0, H0, MU_X, MU_Y, and MU_Z should ideally be consistent among each others
          to represent a physical ground location on Earth.
      type: float
      default: 47.397742
      unit: deg
      min: -90
      max: 90
    SIH_LOC_LON0:
      description:
        short: Initial geodetic longitude
        long: |-
          This value represents the East-West location on Earth where the simulation begins.

          LAT0, LON0, H0, MU_X, MU_Y, and MU_Z should ideally be consistent among each others
          to represent a physical ground location on Earth.
      type: float
      default: 8.545594
      unit: deg
      min: -180
      max: 180
    SIH_LOC_H0:
      description:
        short: Initial AMSL ground altitude
        long: |-
          This value represents the Above Mean Sea Level (AMSL) altitude where the simulation begins.

          If using FlightGear as a visual animation,
          this value can be tweaked such that the vehicle lies on the ground at takeoff.

          LAT0, LON0, H0, MU_X, MU_Y, and MU_Z should ideally be consistent among each others
          to represent a physical ground location on Earth.
      type: float
      default: 489.4
      unit: m
      min: -420.0
      max: 8848.0
      decimal: 2
      increment: 0.01
    SIH_DISTSNSR_MIN:
      description:
        short: distance sensor minimum range
      type: float
      default: 0.0
      unit: m
      min: 0.0
      max: 10.0
      decimal: 4
      increment: 0.01
    SIH_DISTSNSR_MAX:
      description:
        short: distance sensor maximum range
      type: float
      default: 100.0
      unit: m
      min: 0.0
      max: 1000.0
      decimal: 4
      increment: 0.01
    SIH_DISTSNSR_OVR:
      description:
        short: if >= 0 the distance sensor measures will be overridden by this value
        long: Absolute value superior to 10000 will disable distance sensor
      type: float
      default: -1.0
      unit: m
    SIH_T_TAU:
      description:
        short: thruster time constant tau
        long: the time taken for the thruster to step from 0 to 100% should be about
          4 times tau
      type: float
      default: 0.05
      unit: s
    SIH_VEHICLE_TYPE:
      description:
        short: Vehicle type
      type: enum
      values:
        0: Quadcopter
        1: Fixed-Wing
        2: Tailsitter
        3: Standard VTOL
        4: Hexacopter
        5: Rover Ackermann
      default: 0
      reboot_required: true
    SIH_WIND_N:
      description:
        short: Wind velocity from north direction
      type: float
      default: 0.0
      unit: m/s
    SIH_WIND_E:
      description:
        short: Wind velocity from east direction
      type: float
      default: 0.0
      unit: m/s
    SIH_RNGBC_NOISE:
      description:
        short: Ranging beacon measurement noise standard deviation
        long: Gaussian noise added to simulated ranging beacon measurements. Set to 0 to disable noise.
      type: float
      default: 30.0
      unit: m
      min: 0.0
      max: 100.0
      decimal: 1
    SIH_F_T_MAX:
      description:
        short: Forward thruster max thrust (N)
        long: |-
          This is used for the Fixed-Wing, Tailsitter, or pusher of the Standard VTOL
          if SIH_F_CT0 <= 0.
          If SIH_F_CT0 > 0, propeller model with advance ratio J is used
          and this parameter value is overridden at simulation startup.
      type: float
      default: 2.0
      unit: N
      min: 0.0
      decimal: 3
    SIH_F_Q_MAX:
      description:
        short: Forward thruster max torque (Nm)
        long: |-
          This is used for the Fixed-Wing, Tailsitter, or pusher of the Standard VTOL
          if SIH_F_CP0 <= 0.
          If SIH_F_CP0 > 0, propeller model with advance ratio J is used
          and this parameter value is overridden at simulation startup.
      type: float
      default: 0.0165
      unit: Nm
      min: 0.0
      decimal: 3
    SIH_F_CT0:
      description:
        short: Forward thruster static thrust coefficient
      type: float
      default: 0.0
      min: 0.0
      decimal: 3
    SIH_F_CT1:
      description:
        short: Forward thruster thrust coefficient 1
        long: CT(J) = CT0 + CT1*J + CT2*J^2
      type: float
      default: 0.0
      decimal: 3
    SIH_F_CT2:
      description:
        short: Forward thruster thrust coefficient 2
        long: CT(J) = CT0 + CT1*J + CT2*J^2
      type: float
      default: 0.0
      max: 0.0
      decimal: 3
    SIH_F_CP0:
      description:
        short: Forward thruster static power coefficient
      type: float
      default: 0.0
      min: 0.0
      decimal: 3
    SIH_F_CP1:
      description:
        short: Forward thruster power coefficient 1
        long: CP(J) = CP0 + CP1*J + CP2*J^2
      type: float
      default: 0.0
      decimal: 3
    SIH_F_CP2:
      description:
        short: Forward thruster power coefficient 2
        long: CP(J) = CP0 + CP1*J + CP2*J^2
      type: float
      default: 0.0
      max: 0.0
      decimal: 3
    SIH_F_DIA_INCH:
      description:
        short: Forward thruster propeller diameter in inches
      type: float
      default: 0.1
      min: 0.1
      decimal: 1
    SIH_F_RPM_MAX:
      description:
        short: Forward thruster max RPM
      type: float
      default: 6000.0
      min: 0.1
      decimal: 1
    SIH_ESC_EN:
      description:
        short: Enable per-motor ESC telemetry
        long: |-
          When enabled, SIH publishes simulated per-motor esc_status (RPM, voltage,
          current, temperature) for multicopter vehicle types (Quadcopter, Hexacopter).
          This feeds the MAVLink ESC_STATUS/ESC_INFO streams, the logger, and the
          battery model (which derives load-dependent current and voltage sag from it).
      type: boolean
      default: 1
      reboot_required: true
    SIH_ESC_KV:
      description:
        short: Motor velocity constant Kv
        long: |-
          No-load motor speed per volt. Used to derive the back-EMF/torque constant
          Ke = Kt = 60 / (2*pi*Kv) for the electrical model. Low values represent large
          heavy-lift motors, high values small racing motors.
      type: float
      default: 2400.0
      unit: rpm/V
      min: 1.0
      decimal: 1
    SIH_ESC_R:
      description:
        short: Motor phase resistance
        long: Winding resistance used for terminal voltage (V = I*R + Ke*omega) and ohmic heating (I^2*R).
      type: float
      default: 0.05
      unit: Ohm
      min: 0.0
      decimal: 4
      increment: 0.001
    SIH_ESC_I0:
      description:
        short: Motor no-load current
        long: No-load (idle) current of the motor, scaled by throttle in the current model I = Q/Kt + I0*u.
      type: float
      default: 1.0
      unit: A
      min: 0.0
      decimal: 2
      increment: 0.1
    SIH_ESC_VBUS:
      description:
        short: Nominal ESC bus voltage (fallback)
        long: |-
          Bus voltage used to derive the maximum shaft speed and as the reported ESC
          voltage when no battery_status is available. When a battery is connected, the
          measured (sagged) battery voltage is reported and used instead.
      type: float
      default: 16.0
      unit: V
      min: 0.0
      decimal: 2
      increment: 0.1
    SIH_ESC_TAMB:
      description:
        short: ESC/motor ambient temperature
      type: float
      default: 25.0
      unit: celcius
      decimal: 1
    SIH_ESC_RTH:
      description:
        short: Motor thermal resistance to ambient
        long: Lumped thermal resistance in the model C_th*dT/dt = I^2*R - (T - T_amb)/R_th.
      type: float
      default: 5.0
      unit: K/W
      min: 0.0
      decimal: 2
    SIH_ESC_CTH:
      description:
        short: Motor thermal capacitance
        long: Lumped thermal mass in the model C_th*dT/dt = I^2*R - (T - T_amb)/R_th.
      type: float
      default: 20.0
      unit: J/K
      min: 0.0
      decimal: 2
    SIH_ESC_RPMMAX:
      description:
        short: Maximum shaft speed for ESC telemetry
        long: |-
          Maximum propeller shaft speed at full throttle. If set to 0, it is derived
          from Kv and the bus voltage (Kv*V_bus*0.9). Set explicitly for large props
          where the no-load speed estimate is inaccurate.
      type: float
      default: 0.0
      unit: rpm
      min: 0.0
      decimal: 1
    SIH_ESC_TAU_UP:
      description:
        short: ESC spin-up time constant
        long: |-
          First-order time constant for the reported RPM when accelerating. If set to 0,
          the thrust time constant SIH_T_TAU is used. Large high-inertia props spin up
          fast under power but free-wheel down slowly (see SIH_ESC_TAU_DN).
      type: float
      default: 0.0
      unit: s
      min: 0.0
      decimal: 3
    SIH_ESC_TAU_DN:
      description:
        short: ESC spin-down time constant
        long: |-
          First-order time constant for the reported RPM when decelerating. If set to 0,
          the thrust time constant SIH_T_TAU is used. Typically larger than SIH_ESC_TAU_UP
          for high-inertia propellers.
      type: float
      default: 0.0
      unit: s
      min: 0.0
      decimal: 3
