module_name: battery_simulator
parameters:
- group: SITL
  definitions:
    SIM_BAT_DRAIN:
      description:
        short: Simulated battery full-discharge time
        long: Drain time (100% to 0%) while armed. 0 = disabled (useful if battery state is provided externally, e.g. via MAVLink).
      type: float
      default: 60
      min: 0
      increment: 1
      unit: s
    SIM_BAT_MIN_PCT:
      description:
        short: Simulator Battery minimal percentage
        long: Alters battery level on the fly during SITL/HITL; useful for testing low-battery behavior.
      type: float
      default: 50.0
      min: 0
      max: 100
      increment: 0.1
      unit: '%'
