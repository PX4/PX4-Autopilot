module_name: battery_simulator
parameters:
- group: SITL
  definitions:
    SIM_BAT_ENABLE:
      description:
        short: Simulator Battery enabled
        long: |-
          Enable or disable the internal battery simulation. This is useful
          when the battery is simulated externally and interfaced with PX4
          through MAVLink for example.
      type: boolean
      default: 1
    SIM_BAT_DRAIN:
      description:
        short: Simulator Battery drain interval
      type: float
      default: 60
      min: 1
      max: 86400
      increment: 1
      unit: s
    SIM_BAT_MIN_PCT:
      description:
        short: Simulator Battery minimal percentage
        long: |-
          Can be used to alter the battery level during SITL- or HITL-simulation on the fly.
          Particularly useful for testing different low-battery behaviour.
      type: float
      default: 50.0
      min: 0
      max: 100
      increment: 0.1
      unit: '%'
