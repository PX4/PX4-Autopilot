__max_num_config_instances: &max_num_config_instances 3

module_name: MAVLink
serial_config:
    - command: |
        if [ $SERIAL_DEV != ethernet ]; then
            set MAV_ARGS "-d ${SERIAL_DEV} -b p:${BAUD_PARAM} -m p:MAV_${i}_MODE -r p:MAV_${i}_RATE"
        else
            set MAV_ARGS "-u p:MAV_${i}_UDP_PRT -o p:MAV_${i}_REMOTE_PRT -m p:MAV_${i}_MODE -r p:MAV_${i}_RATE"
            if param compare MAV_${i}_BROADCAST 1
            then
                set MAV_ARGS "${MAV_ARGS} -p"
            fi
            if param compare MAV_${i}_BROADCAST 2
            then
                set MAV_ARGS "${MAV_ARGS} -c"
            fi
        fi
        if param compare MAV_${i}_FORWARD 1
        then
            set MAV_ARGS "${MAV_ARGS} -f"
        fi
        if param compare MAV_${i}_RADIO_CTL 1
        then
            set MAV_ARGS "${MAV_ARGS} -s"
        fi
        if param compare MAV_${i}_FLOW_CTRL 0
        then
            set MAV_ARGS "${MAV_ARGS} -Z"
        fi
        if param compare MAV_${i}_FLOW_CTRL 1
        then
            set MAV_ARGS "${MAV_ARGS} -z"
        fi
        if param compare MAV_${i}_MODE 6
        then
            set MAV_ARGS "${MAV_ARGS} -F p:MAV_${i}_HL_FREQ"
        fi
        mavlink start ${MAV_ARGS} -x
      port_config_param:
        name: MAV_${i}_CONFIG
        group: MAVLink
        # MAVLink instances:
        # 0: Telem1 Port (Telemetry Link)
        # 1: Telem2 Port (Companion Link). Disabled by default to reduce RAM usage
        # 2: Board-specific / no fixed function or port
        default: [TEL1, "", ""]
      num_instances: *max_num_config_instances
      supports_networking: true

parameters:
    - group: MAVLink
      definitions:
        MAV_${i}_MODE:
            description:
                short: MAVLink Mode for instance ${i}
                long: Defines the set and rate of MAVLink streams.

            type: enum
            values:
                0: Normal
                1: Custom
                2: Onboard
                3: OSD
                4: Magic
                5: Config
                #6: Iridium # as the user does not need to configure this, hide it from the UI
                7: Minimal
                8: External Vision
                #9: External Vision Minimal # hidden
                10: Gimbal
                11: Onboard Low Bandwidth
                12: uAvionix
                13: Low Bandwidth
            reboot_required: true
            num_instances: *max_num_config_instances
            default: [0, 2, 0]

        MAV_${i}_RATE:
            description:
                short: Maximum MAVLink sending rate for instance ${i}
                long: |-
                    Max rate for all MAVLink streams; throttled proportionally if exceeded.
                    0: baudrate/20 (half max on 8N1 links where max = baudrate/10).

            type: int32
            min: 0
            unit: B/s
            reboot_required: true
            num_instances: *max_num_config_instances
            default: [1200, 0, 0]

        MAV_${i}_FORWARD:
            description:
                short: Enable MAVLink Message forwarding for instance ${i}
                long: Forwards broadcast messages and messages not addressed to the autopilot
                    to other ports (e.g., enables GCS-to-camera through the autopilot).

            type: boolean
            reboot_required: true
            num_instances: *max_num_config_instances
            default: [true, false, false]

        MAV_${i}_RADIO_CTL:
            description:
                short: Enable software throttling of mavlink on instance ${i}
                long: Throttles MAVLink by `txbuf` in radio's RADIO_STATUS; requires
                    radio to send RADIO_STATUS.

            type: boolean
            reboot_required: true
            num_instances: *max_num_config_instances
            default: [true, true, true]

        MAV_${i}_UDP_PRT:
            description:
                short: MAVLink Network Port for instance ${i}
                long: UDP port for this MAVLink instance (ethernet only).

            type: int32
            reboot_required: true
            num_instances: *max_num_config_instances
            default: [14556, 0, 0]
            requires_ethernet: true

        MAV_${i}_REMOTE_PRT:
            description:
                short: MAVLink Remote Port for instance ${i}
                long: Remote UDP port for this MAVLink instance (ethernet only).

            type: int32
            reboot_required: true
            num_instances: *max_num_config_instances
            default: [14550, 0, 0]
            requires_ethernet: true

        MAV_${i}_BROADCAST:
            description:
                short: Broadcast heartbeats on local network for MAVLink instance ${i}
                long: Allows GCS to auto-discover drone on local network.

            type: enum
            values:
                0: Never broadcast
                1: Always broadcast
                2: Only multicast
            num_instances: *max_num_config_instances
            default: [1, 0, 0]
            requires_ethernet: true

        MAV_${i}_FLOW_CTRL:
            description:
                short: Enable serial flow control for instance ${i}
                long: Force serial flow control on/off; use when auto-detect fails.

            type: enum
            values:
                0: Force off
                1: Force on
                2: Auto-detected
            num_instances: *max_num_config_instances
            default: [2, 2, 2]
            reboot_required: true

        MAV_${i}_HL_FREQ:
            description:
                short: Configures the frequency of HIGH_LATENCY2 stream for instance ${i}
                long: HIGH_LATENCY2 stream frequency in Iridium mode; no effect in other modes.

            type: float
            decimal: 3
            increment: 0.001
            unit: Hz
            min: 0.0
            max: 50.0
            num_instances: *max_num_config_instances
            default: [0.015, 0.015, 0.015]
            reboot_required: true

        MAV_S_MODE:
            description:
                short: MAVLink Mode for SOM to FMU communication channel
                long: Defines the set and rate of MAVLink streams.

            type: enum
            values:
                0: Normal
                #1: Custom
                2: Onboard
                #3: OSD
                #4: Magic
                5: Config
                #6: Iridium
                7: Minimal
                #8: External Vision
                #9: External Vision Minimal
                #10: Gimbal
                11: Onboard Low Bandwidth
                #12: uAvionix
                13: Low Bandwidth
                # We shadow the modes that can block the FMU to SOM connection
            reboot_required: true
            default: 11

        MAV_S_FORWARD:
            description:
                short: Enable MAVLink forwarding on TELEM2
                long : |
                    TELEM2 on Skynode only.

            type: boolean
            reboot_required: true
            default: false
