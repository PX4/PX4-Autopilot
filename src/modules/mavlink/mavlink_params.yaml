module_name: mavlink
parameters:
- group: MAVLink
  definitions:
    MAV_SYS_ID:
      description:
        short: MAVLink system ID
      type: int32
      default: 1
      min: 1
      max: 250
      reboot_required: true
    MAV_COMP_ID:
      description:
        short: MAVLink component ID
      type: int32
      default: 1
      min: 1
      max: 250
      reboot_required: true
    MAV_PROTO_VER:
      description:
        short: MAVLink protocol version
      type: enum
      values:
        1: Version 1 with auto-upgrade to v2 if detected
        2: Version 2
      default: 2
    MAV_SIK_RADIO_ID:
      description:
        short: MAVLink SiK Radio ID
        long: "Non-zero: configure SiK radio to this ID then reset param to 0. Negative:\
          \ factory-reset all config. Only for SiK-radio instances."
      type: int32
      default: 0
      min: -1
      max: 240
    MAV_TYPE:
      description:
        short: MAVLink airframe type
      type: enum
      values:
        0: Generic micro air vehicle
        1: Fixed wing aircraft
        2: Quadrotor
        3: Coaxial helicopter
        4: Normal helicopter with tail rotor
        7: Airship, controlled
        8: Free balloon, uncontrolled
        10: Ground rover
        11: Surface vessel, boat, ship
        12: Submarine
        13: Hexarotor
        14: Octorotor
        15: Tricopter
        19: VTOL Two-rotor Tailsitter
        20: VTOL Quad-rotor Tailsitter
        21: VTOL Tiltrotor
        22: VTOL Standard (separate fixed rotors for hover and cruise flight)
        23: VTOL Tailsitter
      default: 0
      min: 0
      max: 23
    MAV_USEHILGPS:
      description:
        short: Use/Accept HIL GPS message even if not in HIL mode
      type: boolean
      default: 0
    MAV_FWDEXTSP:
      description:
        short: Forward external setpoint messages
        long: In offboard mode, forwards incoming setpoints directly to controllers.
      type: boolean
      default: 1
    MAV_HASH_CHK_EN:
      description:
        short: Parameter hash check
        long: When disabled, MAVLink streams parameters continuously.
      type: boolean
      default: 1
    MAV_HB_FORW_EN:
      description:
        short: Heartbeat message forwarding
        long: Disable to avoid confusing dronekit.
      type: boolean
      default: 1
    MAV_RADIO_TOUT:
      description:
        short: Timeout in seconds for the RADIO_STATUS reports coming in
        long: No RADIO_STATUS for this duration triggers warning and resets SW flow
          control (if MAV_X_RADIO_CTL enabled).
      type: int32
      default: 5
      unit: s
      min: 1
      max: 250
