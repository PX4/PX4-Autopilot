module_name: vtol_att_control
parameters:
- group: VTOL Attitude Control
  definitions:
    VT_TYPE:
      description:
        short: VTOL Type (Tailsitter=0, Tiltrotor=1, Standard=2)
      type: enum
      values:
        0: Tailsitter
        1: Tiltrotor
        2: Standard
      default: 0
      min: 0
      max: 2
      reboot_required: true
    VT_ELEV_MC_LOCK:
      description:
        short: Lock control surfaces in hover
        long: Locks control surfaces at the disarmed value in multicopter mode.
      type: boolean
      default: 1
    VT_F_TRANS_DUR:
      description:
        short: Duration of a front transition
      type: float
      default: 5.0
      unit: s
      min: 0.1
      max: 20.0
      increment: 1
      decimal: 2
    VT_B_TRANS_DUR:
      description:
        short: Maximum duration of a back transition
        long: Transition is also declared over if the groundspeed drops below MPC_XY_CRUISE.
      type: float
      default: 10.0
      unit: s
      min: 0.1
      max: 20.0
      increment: 1
      decimal: 2
    VT_F_TRANS_THR:
      description:
        short: Target throttle value for the transition to fixed-wing flight
      type: float
      default: 1.0
      min: 0.0
      max: 1.0
      increment: 0.01
      decimal: 3
    VT_B_DEC_MSS:
      description:
        short: Approximate deceleration during back transition
        long: |-
          Used to calculate back transition distance in auto mode.
          For standard VTOL and tiltrotors, a controller tracks this value during transition.
      type: float
      default: 2.0
      unit: m/s^2
      min: 0.5
      max: 10
      increment: 0.1
      decimal: 2
    VT_ARSP_BLEND:
      description:
        short: Transition blending airspeed
        long: Airspeed to start blending FW and MC controls. 0 disables.
      type: float
      default: 8.0
      unit: m/s
      min: 0.0
      max: 30.0
      increment: 1
      decimal: 2
    VT_ARSP_TRANS:
      description:
        short: Transition airspeed
        long: Airspeed to switch to fixed-wing mode.
      type: float
      default: 10.0
      unit: m/s
      min: 0.0
      max: 30.0
      increment: 1
      decimal: 2
    VT_TRANS_TIMEOUT:
      description:
        short: Front transition timeout
      type: float
      default: 15.0
      unit: s
      min: 0.1
      max: 30.0
      increment: 1
      decimal: 2
    VT_TRANS_MIN_TM:
      description:
        short: Front transition minimum time
      type: float
      default: 2.0
      unit: s
      min: 0.0
      max: 20.0
      increment: 0.1
      decimal: 1
    VT_FW_MIN_ALT:
      description:
        short: Quad-chute altitude
        long: Min FW altitude (relative to local origin). If altitude drops below this in FW mode, instantly switches to MC and executes COM_QC_ACT.
      type: float
      default: 0.0
      unit: m
      min: 0.0
      max: 200.0
      increment: 1
      decimal: 1
    VT_QC_ALT_LOSS:
      description:
        short: Quad-chute uncommanded descent threshold
        long: |-
          Altitude error threshold for quad-chute during fixed-wing flight.
          Active only when altitude is controlled and vehicle is below the altitude reference.
          Error is relative to the highest altitude reached since dropping below the reference.
          0 disables.
      type: float
      default: 0.0
      unit: m
      min: 0.0
      max: 200.0
      increment: 1
      decimal: 1
    VT_QC_T_ALT_LOSS:
      description:
        short: Quad-chute transition altitude loss threshold
        long: |-
          Altitude loss threshold for quad-chute during VTOL-to-FW transition in altitude-controlled modes.
          Active until 5s after completing FW transition.
          If altitude drops more than this below the transition-start altitude, switches to MC and executes COM_QC_ACT.
          0 disables.
      type: float
      default: 20.0
      unit: m
      min: 0
      max: 50
      increment: 1
      decimal: 1
    VT_FW_QC_P:
      description:
        short: Quad-chute max pitch threshold
        long: Absolute pitch threshold for quad-chute in FW; above this, transitions to MC and executes COM_QC_ACT. 0 disables.
      type: int32
      default: 0
      unit: deg
      min: 0
      max: 180
    VT_FW_QC_R:
      description:
        short: Quad-chute max roll threshold
        long: Absolute roll threshold for quad-chute in FW; above this, transitions to MC and executes COM_QC_ACT. 0 disables.
      type: int32
      default: 0
      unit: deg
      min: 0
      max: 180
    VT_FW_QC_HMAX:
      description:
        short: Quad-chute maximum height
        long: Max height above ground (or Home/local origin if ground unavailable) where quad-chute can trigger. At high altitude, quad-chuting risks battery depletion and crash.
      type: int32
      default: 0
      unit: m
      min: 0
      increment: 1
    VT_F_TR_OL_TM:
      description:
        short: Airspeed-less front transition time (open loop)
        long: |-
          Front transition duration when airspeed feedback is unavailable.
          With airspeed, timeout if airspeed does not reach VT_ARSP_BLEND within this time.
      type: float
      default: 6.0
      unit: s
      min: 1.0
      max: 30.0
      increment: 0.5
      decimal: 1
    VT_FW_DIFTHR_EN:
      description:
        short: Differential thrust in forwards flight
        long: |-
          Enables per-axis differential thrust for roll/pitch/yaw in forward (FW) mode.
          Tune effectiveness with VT_FW_DIFTHR_S_R / _S_P / _S_Y.
      type: bitmask
      bit:
        0: Yaw
        1: Roll
        2: Pitch
      default: 0
      min: 0
      max: 7
    VT_FW_DIFTHR_S_R:
      description:
        short: Roll differential thrust factor in forward flight
        long: Enabled via VT_FW_DIFTHR_EN.
      type: float
      default: 1.0
      min: 0.0
      max: 2.0
      decimal: 2
      increment: 0.1
    VT_FW_DIFTHR_S_P:
      description:
        short: Pitch differential thrust factor in forward flight
        long: Enabled via VT_FW_DIFTHR_EN.
      type: float
      default: 1.0
      min: 0.0
      max: 2.0
      decimal: 2
      increment: 0.1
    VT_FW_DIFTHR_S_Y:
      description:
        short: Yaw differential thrust factor in forward flight
        long: Enabled via VT_FW_DIFTHR_EN.
      type: float
      default: 0.1
      min: 0.0
      max: 2.0
      decimal: 2
      increment: 0.1
    VT_B_DEC_I:
      description:
        short: Backtransition deceleration setpoint to tilt I gain
      type: float
      default: 0.1
      unit: rad s/m
      min: 0
      max: 0.3
      decimal: 2
      increment: 0.05
    VT_PITCH_MIN:
      description:
        short: Minimum pitch angle during hover
        long: Pitch setpoints below this value are converted to FW forward actuation force if VT_FWD_THRUST_EN is set.
      type: float
      default: 0.0
      unit: deg
      min: -10.0
      max: 45.0
      increment: 0.1
      decimal: 1
    VT_LND_PITCH_MIN:
      description:
        short: Minimum pitch angle during hover landing
        long: |-
          Overrides VT_PITCH_MIN in LAND mode (hovering).
          Reducing pitch angle during landing can reduce lift in headwind.
      type: float
      default: 0.0
      unit: deg
      min: -10.0
      max: 45.0
      increment: 0.1
      decimal: 1
    VT_SPOILER_MC_LD:
      description:
        short: Spoiler setting while landing (hover)
      type: float
      default: 0.0
      unit: norm
      min: -1
      max: 1
      decimal: 1
      increment: 0.1
