module_name: vtol_att_control
parameters:
- group: VTOL Attitude Control
  definitions:
    VT_FWD_THRUST_EN:
      description:
        short: Use fixed-wing actuation in hover to accelerate forward
        long: |-
          Prevents wind-induced nose-down by using puller/pusher (standard VTOL) or forward-tilt (tiltrotor) instead of pitch.
          Active only when demanded pitch < VT_PITCH_MIN and in height-rate controlled modes.
          Descend is treated as Landing. Tune with VT_FWD_THRUST_SC.
      type: enum
      values:
        0: Disabled
        1: Enabled (except LANDING)
        2: Enabled if above MPC_LAND_ALT1
        3: Enabled if above MPC_LAND_ALT2
        4: Enabled constantly
        5: Enabled if above MPC_LAND_ALT1 (except LANDING)
        6: Enabled if above MPC_LAND_ALT2 (except LANDING)
      default: 0
    VT_FWD_THRUST_SC:
      description:
        short: Fixed-wing actuation thrust scale in hover
        long: Scale from demanded pitch (below VT_PITCH_MIN) to FW forward actuation in hover. Enabled via VT_FWD_THRUST_EN.
      type: float
      default: 0.7
      min: 0.0
      max: 5.0
      increment: 0.01
      decimal: 2
    VT_B_TRANS_RAMP:
      description:
        short: Back transition MC motor ramp up time
        long: Duration for MC motors to ramp up to commanded thrust during back transition.
      type: float
      default: 3.0
      unit: s
      min: 0.0
      max: 20.0
      increment: 0.1
      decimal: 1
    VT_PSHER_SLEW:
      description:
        short: Pusher throttle ramp up slew rate
        long: |-
          Slew rate of puller/pusher throttle during transitions.
          0 disables limiting, giving instant rise to VT_F_TRANS_THR.
      type: float
      default: 0.33
      unit: 1/s
      min: 0
      increment: 0.01
      decimal: 2
