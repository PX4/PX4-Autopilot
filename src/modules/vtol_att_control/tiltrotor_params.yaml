module_name: vtol_att_control
parameters:
- group: VTOL Attitude Control
  definitions:
    VT_TILT_MC:
      description:
        short: Normalized tilt in Hover
      type: float
      default: 0.0
      min: 0.0
      max: 1.0
      increment: 0.01
      decimal: 3
    VT_TILT_TRANS:
      description:
        short: Normalized tilt in transition to FW
      type: float
      default: 0.4
      min: 0.0
      max: 1.0
      increment: 0.01
      decimal: 3
    VT_TILT_FW:
      description:
        short: Normalized tilt in FW
      type: float
      default: 1.0
      min: 0.0
      max: 1.0
      increment: 0.01
      decimal: 3
    VT_TRANS_P2_DUR:
      description:
        short: Duration of front transition phase 2
        long: Time in seconds it takes to tilt form VT_TILT_TRANS to VT_TILT_FW.
      type: float
      default: 0.5
      unit: s
      min: 0.1
      max: 5.0
      increment: 0.01
      decimal: 3
    VT_BT_TILT_DUR:
      description:
        short: Duration motor tilt up in backtransition
        long: Time in seconds it takes to tilt form VT_TILT_FW to VT_TILT_MC.
      type: float
      default: 1.0
      unit: s
      min: 0.1
      max: 10
      increment: 0.1
      decimal: 1
