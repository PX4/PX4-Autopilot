module_name: mc_rate_control
parameters:
- group: Multicopter Acro Mode
  definitions:
    MC_ACRO_R_MAX:
      description:
        short: Acro mode maximum roll rate
        long: Full stick deflection leads to this rate.
      type: float
      default: 100.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    MC_ACRO_P_MAX:
      description:
        short: Acro mode maximum pitch rate
        long: Full stick deflection leads to this rate.
      type: float
      default: 100.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    MC_ACRO_Y_MAX:
      description:
        short: Acro mode maximum yaw rate
        long: Full stick deflection leads to this rate.
      type: float
      default: 100.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    MC_ACRO_EXPO:
      description:
        short: Acro mode roll, pitch expo factor
        long: |-
          Input curve shape factor.
          0: linear
          1: cubic
      type: float
      default: 0.0
      min: 0
      max: 1
      decimal: 2
    MC_ACRO_EXPO_Y:
      description:
        short: Acro mode yaw expo factor
        long: |-
          Input curve shape factor.
          0: linear
          1: cubic
      type: float
      default: 0.0
      min: 0
      max: 1
      decimal: 2
    MC_ACRO_SUPEXPO:
      description:
        short: Acro mode roll, pitch super expo factor
        long: |-
          Refines curve shape set by MC_ACRO_EXPO.
          0: pure expo
          0.7: reasonable enhancement for intuitive stick feel
          0.95: very strong, only near maxima have effect
      type: float
      default: 0.0
      min: 0
      max: 0.95
      decimal: 2
    MC_ACRO_SUPEXPOY:
      description:
        short: Acro mode yaw super expo factor
        long: |-
          Refines curve shape set by MC_ACRO_EXPO_Y.
          0: pure expo
          0.7: reasonable enhancement for intuitive stick feel
          0.95: very strong, only near maxima have effect
      type: float
      default: 0.0
      min: 0
      max: 0.95
      decimal: 2
