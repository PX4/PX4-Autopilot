module_name: mc_rate_control
parameters:
- group: Multicopter Rate Control
  definitions:
    MC_ROLLRATE_P:
      description:
        short: Roll rate P gain
        long: Control output for angular speed error 1 rad/s.
      type: float
      default: 0.15
      min: 0.01
      max: 0.5
      decimal: 3
      increment: 0.01
    MC_ROLLRATE_I:
      description:
        short: Roll rate I gain
        long: Can compensate static thrust difference or gravity center offset.
      type: float
      default: 0.2
      min: 0.0
      decimal: 3
      increment: 0.01
    MC_RR_INT_LIM:
      description:
        short: Roll rate integrator limit
        long: Increase to counteract disturbances; reduce to improve settling time after large roll moment trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    MC_ROLLRATE_D:
      description:
        short: Roll rate D gain
        long: Small values reduce fast oscillations; too large and oscillations reappear.
      type: float
      default: 0.003
      min: 0.0
      max: 0.01
      decimal: 4
      increment: 0.0005
    MC_ROLLRATE_FF:
      description:
        short: Roll rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    MC_ROLLRATE_K:
      description:
        short: Roll rate controller gain
        long: |-
          Global gain scaling P, I, and D terms:
          ```
          output = MC_ROLLRATE_K * (MC_ROLLRATE_P * error
          + MC_ROLLRATE_I * error_integral
          + MC_ROLLRATE_D * error_derivative)
          ```
          Set MC_ROLLRATE_P=1 for ideal form; MC_ROLLRATE_K=1 for parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    MC_PITCHRATE_P:
      description:
        short: Pitch rate P gain
        long: Control output for angular speed error 1 rad/s.
      type: float
      default: 0.15
      min: 0.01
      max: 0.6
      decimal: 3
      increment: 0.01
    MC_PITCHRATE_I:
      description:
        short: Pitch rate I gain
        long: Can compensate static thrust difference or gravity center offset.
      type: float
      default: 0.2
      min: 0.0
      decimal: 3
      increment: 0.01
    MC_PR_INT_LIM:
      description:
        short: Pitch rate integrator limit
        long: Increase to counteract disturbances; reduce to improve settling time after large pitch moment trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    MC_PITCHRATE_D:
      description:
        short: Pitch rate D gain
        long: Small values reduce fast oscillations; too large and oscillations reappear.
      type: float
      default: 0.003
      min: 0.0
      decimal: 4
      increment: 0.0005
    MC_PITCHRATE_FF:
      description:
        short: Pitch rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    MC_PITCHRATE_K:
      description:
        short: Pitch rate controller gain
        long: |-
          Global gain scaling P, I, and D terms:
          ```
          output = MC_PITCHRATE_K * (MC_PITCHRATE_P * error
          + MC_PITCHRATE_I * error_integral
          + MC_PITCHRATE_D * error_derivative)
          ```
          Set MC_PITCHRATE_P=1 for ideal form; MC_PITCHRATE_K=1 for parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    MC_YAWRATE_P:
      description:
        short: Yaw rate P gain
        long: Control output for angular speed error 1 rad/s.
      type: float
      default: 0.2
      min: 0.0
      max: 0.6
      decimal: 3
      increment: 0.01
    MC_YAWRATE_I:
      description:
        short: Yaw rate I gain
        long: Can compensate static thrust difference or gravity center offset.
      type: float
      default: 0.1
      min: 0.0
      decimal: 3
      increment: 0.01
    MC_YR_INT_LIM:
      description:
        short: Yaw rate integrator limit
        long: Increase to counteract disturbances; reduce to improve settling time after large yaw moment trim changes.
      type: float
      default: 0.3
      min: 0.0
      decimal: 2
      increment: 0.01
    MC_YAWRATE_D:
      description:
        short: Yaw rate D gain
        long: Small values reduce fast oscillations; too large and oscillations reappear.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
      increment: 0.0005
    MC_YAWRATE_FF:
      description:
        short: Yaw rate feedforward
        long: Improves tracking performance.
      type: float
      default: 0.0
      min: 0.0
      decimal: 4
    MC_YAWRATE_K:
      description:
        short: Yaw rate controller gain
        long: |-
          Global gain scaling P, I, and D terms:
          ```
          output = MC_YAWRATE_K * (MC_YAWRATE_P * error
          + MC_YAWRATE_I * error_integral
          + MC_YAWRATE_D * error_derivative)
          ```
          Set MC_YAWRATE_P=1 for ideal form; MC_YAWRATE_K=1 for parallel form.
      type: float
      default: 1.0
      min: 0.01
      max: 5.0
      decimal: 4
      increment: 0.0005
    MC_BAT_SCALE_EN:
      description:
        short: Battery power level scaler
        long: Compensates for battery voltage drop to normalize performance. Hover throttle stays constant as battery depletes (e.g. 0.5 at both 100% and 60% charge), with reduced max acceleration at lower charge.
      type: boolean
      default: 0
    MC_YAW_TQ_CUTOFF:
      description:
        short: Low pass filter cutoff frequency for yaw torque setpoint
        long: |-
          Reduces vibrations by lowering high frequency torque caused by rotor acceleration.
          0 disables the filter
      type: float
      default: 2.0
      min: 0
      max: 10
      unit: Hz
      decimal: 3
