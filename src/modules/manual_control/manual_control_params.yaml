module_name: manual_control
parameters:
- group: Manual Control
  definitions:
    MAN_ARM_GESTURE:
      description:
        short: Enable arm/disarm stick gesture
        long: Left stick to lower-right arms; lower-left disarms.
      type: boolean
      default: 1
    MAN_KILL_GEST_T:
      description:
        short: Trigger time for kill stick gesture
        long: |-
          Hold left stick lower-left and right stick lower-right simultaneously for this duration to kill actuators (one-way).
          Negative disables.
      type: float
      default: -1.0
      unit: s
      decimal: 2
      min: -1
      max: 15
    MAN_DEADZONE:
      description:
        short: Deadzone for sticks (only specific use cases)
        long: |-
          Stick center deadzone to prevent drift from hardware inaccuracy.
          Not applied to throttle, attitude, or rate piloting inputs.
      type: float
      default: 0.1
      min: 0
      max: 1
      decimal: 2
      increment: 0.01
