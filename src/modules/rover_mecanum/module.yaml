module_name: Rover Mecanum

parameters:
  - group: Rover Mecanum
    definitions:
      RM_WHEEL_TRACK:
          description:
            short: Wheel track
          type: float
          unit: m
          min: 0
          max: 100
          increment: 0.001
          decimal: 3
          default: 0

      RM_COURSE_CTL_TH:
        description:
          short: Threshold to update course control in manual position mode
          long: Angle between active cruise and stick-input direction; deadzone for combined fwd/lateral stick inputs.
        type: float
        unit: rad
        min: 0
        max: 3.14
        increment: 0.01
        decimal: 2
        default: 0.17

      RM_YAW_STK_GAIN:
        description:
            short: Yaw stick gain for Manual mode
            long: "<1.0 reduces stick response."
        type: float
        min: 0.1
        max: 1
        increment: 0.01
        decimal: 3
        default: 1
