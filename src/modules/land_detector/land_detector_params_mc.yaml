module_name: land_detector
parameters:
- group: Land Detector
  definitions:
    LNDMC_Z_VEL_MAX:
      description:
        short: Multicopter vertical velocity threshold
        long: Must be below minimum landing speed (MPC_LAND_SPEED or MPC_LAND_CRWL); enforced automatically.
      type: float
      default: 0.25
      unit: m/s
      min: 0
      decimal: 2
    LNDMC_XY_VEL_MAX:
      description:
        short: Multicopter max horizontal velocity
      type: float
      default: 1.5
      unit: m/s
      decimal: 1
    LNDMC_ROT_MAX:
      description:
        short: Multicopter max rotational speed
        long: Max roll/pitch angular velocity norm in landed state.
      type: float
      default: 20.0
      unit: deg/s
      decimal: 1
    LNDMC_ALT_GND:
      description:
        short: Ground effect altitude for multicopters
        long: |-
          Height below which ground effect causes barometric errors.
          Negative: no ground effect.
      type: float
      default: 2.0
      unit: m
      min: -1
      decimal: 2
