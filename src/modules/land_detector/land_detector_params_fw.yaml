module_name: land_detector
parameters:
- group: Land Detector
  definitions:
    LNDFW_VEL_XY_MAX:
      description:
        short: 'Fixed-wing land detector: Max horizontal velocity threshold'
        long: Reduced by 0.7 when flying without airspeed (sensor absent or invalid in flight).
      type: float
      default: 5.0
      unit: m/s
      min: 0.5
      max: 20
      decimal: 1
    LNDFW_VEL_Z_MAX:
      description:
        short: 'Fixed-wing land detector: Max vertiacal velocity threshold'
      type: float
      default: 1.0
      unit: m/s
      min: 0.1
      max: 20
      decimal: 1
    LNDFW_XYACC_MAX:
      description:
        short: 'Fixed-wing land detector: Max horizontal acceleration'
        long: Limit on x,y body-axis acceleration in landed state.
      type: float
      default: 8.0
      unit: m/s^2
      min: 2
      max: 30
      decimal: 1
    LNDFW_AIRSPD_MAX:
      description:
        short: 'Fixed-wing land detector: Max airspeed'
      type: float
      default: 6.0
      unit: m/s
      min: 2
      max: 30
      decimal: 1
    LNDFW_TRIG_TIME:
      description:
        short: Fixed-wing land detection trigger time
        long: Duration speeds and acceleration conditions must hold to detect landing.
      type: float
      default: 2.0
      unit: s
      min: 0.1
      decimal: 1
      reboot_required: true
    LNDFW_ROT_MAX:
      description:
        short: 'Fixed-wing land detector: max rotational speed'
        long: |-
          Max angular velocity norm in landed state.
          Only used when neither airspeed nor groundspeed is available.
      type: float
      default: 0.5
      unit: deg/s
      decimal: 1
