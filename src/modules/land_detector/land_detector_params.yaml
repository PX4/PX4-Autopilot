module_name: land_detector
parameters:
- group: Land Detector
  definitions:
    LND_FLIGHT_T_HI:
      description:
        short: Total flight time in microseconds
        long: High 32 bits. Total us = (LND_FLIGHT_T_HI << 32) | LND_FLIGHT_T_LO.
      category: System
      type: int32
      default: 0
      volatile: true
      min: 0
    LND_FLIGHT_T_LO:
      description:
        short: Total flight time in microseconds
        long: Low 32 bits. Total us = (LND_FLIGHT_T_HI << 32) | LND_FLIGHT_T_LO.
      category: System
      type: int32
      default: 0
      volatile: true
      min: 0
