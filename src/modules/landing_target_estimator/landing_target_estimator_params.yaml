module_name: landing_target_estimator
parameters:
- group: Landing Target Estimator
  definitions:
    LTEST_MODE:
      description:
        short: Landing target mode
      type: enum
      values:
        0: Moving (measurements not used for positioning)
        1: Stationary (velocity w.r.t. target aids velocity est.)
      default: 0
      min: 0
      max: 1
    LTEST_ACC_UNC:
      description:
        short: Acceleration uncertainty
        long: |-
          Variance of acceleration measurement for landing target position prediction.
          Higher = tighter measurement following, more lenient outlier rejection.
      type: float
      default: 10.0
      unit: (m/s^2)^2
      min: 0.01
      decimal: 2
    LTEST_MEAS_UNC:
      description:
        short: Landing target measurement uncertainty
        long: |-
          Variance of the landing target measurement from the driver.
          Higher = less aggressive following, smoother output, fewer rejected measurements.
      type: float
      default: 0.005
      unit: tan(rad)^2
      decimal: 4
    LTEST_POS_UNC_IN:
      description:
        short: Initial landing target position uncertainty
        long: Initial variance of relative landing target position in x and y.
      type: float
      default: 0.1
      unit: m^2
      min: 0.001
      decimal: 3
    LTEST_VEL_UNC_IN:
      description:
        short: Initial landing target velocity uncertainty
        long: Initial variance of relative landing target velocity in x and y.
      type: float
      default: 0.1
      unit: (m/s)^2
      min: 0.001
      decimal: 3
    LTEST_SCALE_X:
      description:
        short: Scale factor for sensor measurements in sensor x axis
      type: float
      default: 1.0
      min: 0.01
      decimal: 3
    LTEST_SCALE_Y:
      description:
        short: Scale factor for sensor measurements in sensor y axis
      type: float
      default: 1.0
      min: 0.01
      decimal: 3
    LTEST_SENS_ROT:
      description:
        short: Rotation of IRLOCK sensor relative to airframe
        long: "Default orientation of Yaw 90\xB0"
      type: enum
      values:
        0: No rotation
        1: "Yaw 45\xB0"
        2: "Yaw 90\xB0"
        3: "Yaw 135\xB0"
        4: "Yaw 180\xB0"
        5: "Yaw 225\xB0"
        6: "Yaw 270\xB0"
        7: "Yaw 315\xB0"
      default: 2
      min: -1
      max: 40
      reboot_required: true
    LTEST_SENS_POS_X:
      description:
        short: X Position of IRLOCK in body frame (forward)
      type: float
      default: 0.0
      reboot_required: true
      unit: m
      decimal: 3
    LTEST_SENS_POS_Y:
      description:
        short: Y Position of IRLOCK in body frame (right)
      type: float
      default: 0.0
      reboot_required: true
      unit: m
      decimal: 3
    LTEST_SENS_POS_Z:
      description:
        short: Z Position of IRLOCK in body frame (downward)
      type: float
      default: 0.0
      reboot_required: true
      unit: m
      decimal: 3
