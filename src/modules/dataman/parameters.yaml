module_name: dataman
parameters:
- group: System
  definitions:
    SYS_DM_BACKEND:
      description:
        short: Dataman storage backend
        long: "'Default storage' uses a file if DATAMAN_PERSISTENT_STORAGE is set, otherwise RAM."
      type: enum
      values:
        -1: Dataman disabled
        0: Default storage
        1: RAM storage
      default: 0
      reboot_required: true
