module_name: Internal Combustion Engine Control

parameters:
  - group: ICE
    definitions:

      ICE_EN:
        description:
          short: Enable internal combustion engine
        type: boolean
        default: false

      ICE_ON_SOURCE:
        description:
          short: Engine start/stop input source
        type: enum
        default: 0
        values:
          0: On arming - disarming
          1: Aux1
          2: Aux2
          3: On Vtol Transitions

      ICE_CHOKE_ST_DUR:
        description:
          short: Duration of choking during startup
        type: float
        unit: s
        min: 0
        max: 10
        decimal: 1
        increment: 0.1
        default: 5

      ICE_STRT_DUR:
        description:
          short: Duration of single starting attempt (excl. choking)
          long: Max time per start attempt before declaring timeout.
        type: float
        unit: s
        min: 0
        max: 10
        decimal: 1
        increment: 0.1
        default: 5

      ICE_MIN_RUN_RPM:
        description:
          short: Minimum RPM for engine to be declared running
        type: float
        unit: rpm
        min: 0
        max: 10000
        decimal: 0
        increment: 1
        default: 2000

      ICE_STRT_ATTEMPT:
        description:
          short: Number attempts for starting the engine
          long: Attempts before declaring a fault.
        type: int32
        min: 0
        max: 10
        default: 3

      ICE_RUN_FAULT_D:
        description:
          short: Fault detection if it stops in running state
          long: If enabled, restarts on fault in running state; otherwise stays running until user stops it.
        type: boolean
        default: true

      ICE_STRT_THR:
        description:
          short: Throttle value for starting engine
        type: float
        unit: norm
        min: 0
        max: 1
        decimal: 0
        increment: 0.01
        default: 0.1

      ICE_STOP_CHOKE:
        description:
          short: Apply choke when stopping engine
        type: boolean
        default: true

      ICE_THR_SLEW:
        description:
          short: Throttle slew rate
        type: float
        unit: 1/s
        min: 0
        max: 1
        decimal: 2
        increment: 0.01
        default: 0.5

      ICE_IGN_DELAY:
        description:
          short: Cold-start delay after ignition before engaging starter
          long: Delay after ignition before engaging starter, to let ignition stabilize.
        type: float
        unit: s
        min: 0
        max: 10
        decimal: 1
        increment: 0.1
        default: 0

      ICE_IDLE_RPM:
        description:
          short: Idle RPM setpoint for the engine.
          long: Controller prevents RPM from dropping below this setpoint.
        type: float
        unit: rpm
        min: 0
        max: 10000
        decimal: 0
        increment: 1
        default: 0.0

      ICE_IDLE_RPM_P:
        description:
          short: Proportional gain for idle RPM control
          long: Output added per (RPM error / 1000).
        type: float
        decimal: 3
        increment: 0.1
        min: 0
        max: 10
        default: 0.0

      ICE_IDLE_RPM_I:
        description:
          short: Integral gain for idle RPM control
          long: Output added per (integrated RPM error / 1000).
        type: float
        decimal: 3
        increment: 0.1
        min: 0
        max: 10
        default: 0.0

      ICE_IDLE_THR_FF:
        description:
          short: Idle RPM throttle for feed-forward
          long: Feed-forward throttle; should approximate throttle needed to hold ICE_IDLE_RPM.
        type: float
        decimal: 2
        increment: 0.01
        min: 0
        max: 1
        default: 0.0
