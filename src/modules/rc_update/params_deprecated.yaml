module_name: rc_update
parameters:
- group: Radio Switches
  definitions:
    RC_MAP_MODE_SW:
      description:
        short: Mode switch channel mapping (deprecated)
        long: |-
          This is the main flight mode selector.
          The channel index (starting from 1 for channel 1) indicates
          which channel should be used for deciding about the main mode.
          A value of zero indicates the switch is not assigned.
      type: enum
      values:
        0: Unassigned
        1: Channel 1
        2: Channel 2
        3: Channel 3
        4: Channel 4
        5: Channel 5
        6: Channel 6
        7: Channel 7
        8: Channel 8
        9: Channel 9
        10: Channel 10
        11: Channel 11
        12: Channel 12
        13: Channel 13
        14: Channel 14
        15: Channel 15
        16: Channel 16
        17: Channel 17
        18: Channel 18
      default: 0
      min: 0
      max: 18
