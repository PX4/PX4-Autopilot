        13: Channel 13
        14: Channel 14
        15: Channel 15
        16: Channel 16
        17: Channel 17
        18: Channel 18
      default: 0
      min: 0
      max: 18
    RC_RSSI_PWM_MIN:
      description:
        short: Min input value for RSSI reading
        long: Only used if RC_RSSI_PWM_CHAN > 0
      type: int32
      default: 1000
      min: 0
      max: 2000
    RC_RSSI_PWM_MAX:
      description:
        short: Max input value for RSSI reading
        long: Only used if RC_RSSI_PWM_CHAN > 0
      type: int32
      default: 2000
      min: 0
      max: 2000
