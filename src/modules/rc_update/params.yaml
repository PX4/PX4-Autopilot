    RC_CHAN_CNT:
      description:
        short: RC channel count
        long: |-
          This parameter is used by Ground Station software to save the number
          of channels which were used during RC calibration. It is only meant
          for ground station use.
      type: int32
      default: 0
      min: 0
      max: 18
    RC_MAP_ROLL:
      description:
        short: Roll control channel mapping
        long: |-
          The channel index (starting from 1 for channel 1) indicates
          which channel should be used for reading roll inputs from.
          A value of zero indicates the switch is not assigned.
      type: enum
      values:
        0: Unassigned
        1: Channel 1
        2: Channel 2
        3: Channel 3
        4: Channel 4
        5: Channel 5
        6: Channel 6
        7: Channel 7
        8: Channel 8
        9: Channel 9
        10: Channel 10
        11: Channel 11
        12: Channel 12
        13: Channel 13
        14: Channel 14
        15: Channel 15
        16: Channel 16
        17: Channel 17
        18: Channel 18
      default: 0
      min: 0
      max: 18
