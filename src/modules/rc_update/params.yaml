module_name: rc_update
parameters:
- group: Radio Calibration
  definitions:
    RC1_MIN:
      description:
        short: RC channel 1 minimum
        long: Minimum value for RC channel 1
      type: float
      default: 1000.0
      min: 800.0
      max: 1500.0
      unit: us
    RC1_TRIM:
      description:
        short: RC channel 1 trim
        long: Mid point value
      type: float
      default: 1500.0
      min: 800.0
      max: 2200.0
      unit: us
    RC1_MAX:
      description:
        short: RC channel 1 maximum
        long: Maximum value for RC channel 1
      type: float
      default: 2000.0
      min: 1500.0
      max: 2200.0
      unit: us
    RC1_REV:
      description:
        short: RC channel 1 reverse
        long: Set to -1 to reverse channel.
      type: int32
      values:
        -1: Reverse
        1: Normal
      default: 1
      min: -1
      max: 1
