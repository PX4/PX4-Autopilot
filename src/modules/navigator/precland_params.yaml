module_name: navigator
parameters:
- group: Precision Land
  definitions:
    PLD_BTOUT:
      description:
        short: Landing Target Timeout
        long: Time without measurements before landing target is considered lost.
      type: float
      default: 5.0
      unit: s
      min: 0.0
      max: 50
      decimal: 1
      increment: 0.5
    PLD_HACC_RAD:
      description:
        short: Horizontal acceptance radius
        long: Start descending if closer above landing target than this.
      type: float
      default: 0.2
      unit: m
      min: 0.0
      max: 10
      decimal: 2
      increment: 0.1
    PLD_MOVING_T_MAX:
      description:
        short: Maximum moving-target prediction time
        long: Max prediction time for moving-target aim in precision landing.
      type: float
      default: 3.0
      min: 0.1
      max: 60
      unit: s
      decimal: 2
    PLD_MOVING_T_MIN:
      description:
        short: Minimum moving-target prediction time
        long: Min prediction time for moving-target aim in precision landing.
      type: float
      default: 2.0
      min: 0.1
      max: 30
      unit: s
      decimal: 2
    PLD_FAPPR_ALT:
      description:
        short: Final approach altitude
        long: Allow final approach (without horizontal positioning) if losing landing
          target closer than this to the ground.
      type: float
      default: 0.1
      unit: m
      min: 0.0
      max: 10
      decimal: 2
      increment: 0.1
    PLD_SRCH_ALT:
      description:
        short: Search altitude
        long: Altitude above home for landing target search.
      type: float
      default: 10.0
      unit: m
      min: 0.0
      max: 100
      decimal: 1
      increment: 0.1
    PLD_SRCH_TOUT:
      description:
        short: Search timeout
        long: Time to search for landing target before falling back to normal landing.
      type: float
      default: 10.0
      unit: s
      min: 0.0
      max: 100
      decimal: 1
      increment: 0.1
    PLD_MAX_SRCH:
      description:
        short: Maximum number of search attempts
        long: Number of times to re-search if target is lost during precision landing.
      type: int32
      default: 3
      min: 0
      max: 100
    PLD_YAW_EN:
      description:
        short: Set to true to control yaw while landing.
        long: Yaw control during landing from vte_orientation topic.
      type: boolean
      default: 0
      min: 0
      max: 1
