module_name: navigator
parameters:
- group: Mission
  definitions:
    MIS_TAKEOFF_ALT:
      description:
        short: Default take-off altitude
        long: Relative takeoff altitude when not specified by mission.
      type: float
      default: 2.5
      unit: m
      min: 0
      decimal: 1
      increment: 0.5
    MIS_TKO_LAND_REQ:
      description:
        short: Mission takeoff/landing required
        long: |-
          Whether a mission must contain a takeoff and/or landing.
          Validity of takeoffs/landings is checked independently.
      type: enum
      values:
        0: No requirements
        1: Require a takeoff
        2: Require a landing
        3: Require a takeoff and a landing
        4: Require both a takeoff and a landing, or neither
        5: Same as previous when landed, in-air require landing only if no valid VTOL
          approach is present
      default: 0
    MIS_DIST_1WP:
      description:
        short: Maximal horizontal distance from Home to first waypoint
        long: |-
          Warning if first waypoint exceeds this distance from Home.
          No effect on mission validity. <=0 disables.
      type: float
      default: 10000
      unit: m
      min: -1
      max: 100000
      decimal: 1
      increment: 100
    MIS_MNT_YAW_CTL:
      description:
        short: Enable gimbal yaw control in missions
        long: |-
          Mount yaw control (MC and ROI items only).
          Enabled: vehicle follows flight direction heading.
          Disabled: vehicle yaws toward the ROI.
      type: enum
      values:
        0: Disable
        1: Enable
      default: 0
      min: 0
      max: 1
    MIS_YAW_TMT:
      description:
        short: Waypoint heading timeout
        long: |-
          Time to wait for target heading at a waypoint that forces heading (e.g. VTOL forward transition).
          >0 also skips heading check for normal waypoints.
          Useful for VTOLs with limited yaw authority in wind. -1: disabled.
      type: float
      default: -1.0
      unit: s
      min: -1
      max: 20
      decimal: 1
      increment: 1
    MIS_YAW_ERR:
      description:
        short: Max yaw error in degrees needed for waypoint heading acceptance
      type: float
      default: 12.0
      unit: deg
      min: 0
      max: 90
      decimal: 1
      increment: 1
    MIS_LND_ABRT_ALT:
      description:
        short: Landing abort min altitude
        long: |-
          Altitude above landing point to climb to after aborted landing; vehicle loiters there until commanded.
          Default when MAV_CMD_NAV_LAND param1 is unset. FW only.
      type: int32
      default: 30
      unit: m
      min: 0
    MIS_COMMAND_TOUT:
      description:
        short: Timeout to allow the payload to execute the mission command
        long: |-
          Ensures payload commands complete before continuing:
          gripper (NAV_CMD_DO_GRIPPER) releases, winch (CMD_DO_WINCH) delivers,
          gimbal (CMD_DO_GIMBAL_MANAGER_PITCHYAW) reaches orientation.
      type: float
      default: 0.0
      unit: s
      min: 0
      decimal: 1
