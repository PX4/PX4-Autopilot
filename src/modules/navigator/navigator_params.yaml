module_name: navigator
parameters:
- group: Mission
  definitions:
    NAV_LOITER_RAD:
      description:
        short: Loiter radius (FW only)
        long: Positive = clockwise, negative = counter-clockwise.
      type: float
      default: 80.0
      unit: m
      min: -10000
      max: 10000
      decimal: 1
      increment: 0.5
    NAV_ACC_RAD:
      description:
        short: Acceptance Radius
        long: Overridden by individual waypoint radius. For FW/rovers, the high-level controller's acceptance radius is used when it exceeds this value.
      type: float
      default: 10.0
      unit: m
      min: 0.05
      max: 200.0
      decimal: 1
      increment: 0.5
    NAV_FW_ALT_RAD:
      description:
        short: FW Altitude Acceptance Radius
      type: float
      default: 10.0
      unit: m
      min: 0.05
      max: 200.0
      decimal: 1
      increment: 0.5
    NAV_FW_ALTL_RAD:
      description:
        short: FW Altitude Acceptance Radius before a landing
        long: Typically tighter than standard because near-ground accuracy matters more.
      type: float
      default: 5.0
      unit: m
      min: 0.05
      max: 200.0
      decimal: 1
    NAV_MC_ALT_RAD:
      description:
        short: MC Altitude Acceptance Radius
      type: float
      default: 0.8
      unit: m
      min: 0.05
      max: 200.0
      decimal: 1
      increment: 0.5
    NAV_TRAFF_AVOID:
      description:
        short: Set traffic avoidance mode
        long: Enables response to ADSB transponder traffic data.
      type: enum
      values:
        0: Disabled
        1: Warn only
        2: Return mode
        3: Land mode
        4: Position Hold mode
      default: 1
    NAV_TRAFF_A_HOR:
      description:
        short: Set NAV TRAFFIC AVOID horizontal distance
        long: Crosstrack horizontal distance threshold.
      type: float
      default: 500
      unit: m
      min: 500
    NAV_TRAFF_A_VER:
      description:
        short: Set NAV TRAFFIC AVOID vertical distance
      type: float
      default: 500
      unit: m
      min: 10
      max: 500
    NAV_TRAFF_COLL_T:
      description:
        short: Estimated time until collision
        long: Assumes constant speed over 3D distance.
      type: int32
      default: 60
      unit: s
      min: 1
      max: 900000000
    NAV_FORCE_VT:
      description:
        short: Force VTOL mode takeoff and land
      type: boolean
      default: 1
    NAV_MIN_LTR_ALT:
      description:
        short: Minimum Loiter altitude
        long: |-
          Min altitude above Home in Loiter/Hold when entered without specifying altitude (e.g. via RC switch).
          Does not apply to mission loiters or reposition setpoints.
          Negative: disabled.
      type: float
      default: -1.0
      unit: m
      min: -1
      decimal: 1
      increment: 0.5
    NAV_MIN_GND_DIST:
      description:
        short: Minimum height above ground during Mission and RTL
        long: |-
          Min above-ground altitude during Mission/RTL (excluding landing commands); requires a distance sensor.
          Only prevents further descent, not forced climb.
          Negative: disabled.
      type: float
      default: -1.0
      unit: m
      min: -1
      decimal: 1
      increment: 1
    NAV_LTR_LAST_DL:
      description:
        short: Loiter at last GCS heartbeat position on data link loss
        long: |-
          On data link loss, loiter at the last GCS heartbeat position instead of current position.
          Applies to Hold mode failsafe only.
      type: boolean
      default: 0
