module_name: detect_and_avoid
parameters:
- group: Detect and Avoid
  definitions:
    DAA_EN:
      description:
        short: Enable DAA
      type: boolean
      default: 1
    DAA_NOTIF_STATE:
      description:
        short: DAA status notification period
        long: Time between notifications for the most urgent conflict.
      type: int32
      default: 20
      unit: s
      min: 0
      max: 600
    DAA_TRAFF_TOUT:
      description:
        short: DAA stale conflict timeout
        long: Time after which a conflict is removed from the buffer if no new data arrived.
      type: int32
      default: 20
      unit: s
      min: 1
      max: 120
      reboot_required: true
