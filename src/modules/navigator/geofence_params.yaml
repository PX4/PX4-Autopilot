module_name: navigator
parameters:
- group: Geofence
  definitions:
    GF_ACTION:
      description:
        short: Geofence violation action
        long: Value 4 (Terminate) kills the vehicle on fence violation.
      type: enum
      values:
        0: None
        1: Warning
        2: Hold mode
        3: Return mode
        4: Terminate
        5: Land mode
      default: 2
      min: 0
      max: 5
    GF_SOURCE:
      description:
        short: Geofence source
        long: GPS avoids dependence on the position estimator.
      type: enum
      values:
        0: GPOS
        1: GPS
      default: 0
      min: 0
      max: 1
    GF_MAX_HOR_DIST:
      description:
        short: Max horizontal distance from Home
        long: Max distance from Home before triggering geofence action. 0 = disabled.
      type: float
      default: 0.0
      unit: m
      min: 0
      max: 10000
      increment: 1
    GF_MAX_VER_DIST:
      description:
        short: Max vertical distance from Home
        long: Max vertical distance from Home before triggering geofence action. 0 = disabled.
      type: float
      default: 0.0
      unit: m
      min: 0
      max: 10000
      increment: 1
