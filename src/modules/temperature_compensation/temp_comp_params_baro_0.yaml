module_name: temperature_compensation
parameters:
- group: Thermal Compensation
  definitions:
    TC_B0_ID:
      description:
        short: Barometer calibration ID
      category: System
      type: int32
      default: 0
    TC_B0_X5:
      description:
        short: Baro offset temp ^5 poly coeff
      category: System
      type: float
      default: 0.0
    TC_B0_X4:
      description:
        short: Baro offset temp ^4 poly coeff
      category: System
      type: float
      default: 0.0
    TC_B0_X3:
      description:
        short: Baro offset temp ^3 poly coeff
      category: System
      type: float
      default: 0.0
    TC_B0_X2:
      description:
        short: Baro offset temp ^2 poly coeff
      category: System
      type: float
      default: 0.0
    TC_B0_X1:
      description:
        short: Baro offset temp ^1 poly coeff
      category: System
      type: float
      default: 0.0
    TC_B0_X0:
      description:
        short: Baro offset temp ^0 poly coeff
      category: System
      type: float
      default: 0.0
    TC_B0_TREF:
      description:
        short: Baro calibration reference temp
      category: System
      type: float
      default: 40.0
    TC_B0_TMIN:
      description:
        short: Baro calibration minimum temp
      category: System
      type: float
      default: 5.0
    TC_B0_TMAX:
      description:
        short: Baro calibration maximum temp
      category: System
      type: float
      default: 75.0
