module_name: temperature_compensation
parameters:
- group: Thermal Compensation
  definitions:
    TC_G0_ID:
      description:
        short: Gyro calibration ID
      category: System
      type: int32
      default: 0
    TC_G0_X3_0:
      description:
        short: Gyro rate offset temp ^3 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_G0_X3_1:
      description:
        short: Gyro rate offset temp ^3 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_G0_X3_2:
      description:
        short: Gyro rate offset temp ^3 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_G0_X2_0:
      description:
        short: Gyro rate offset temp ^2 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_G0_X2_1:
      description:
        short: Gyro rate offset temp ^2 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_G0_X2_2:
      description:
        short: Gyro rate offset temp ^2 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_G0_X1_0:
      description:
        short: Gyro rate offset temp ^1 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_G0_X1_1:
      description:
        short: Gyro rate offset temp ^1 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_G0_X1_2:
      description:
        short: Gyro rate offset temp ^1 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_G0_X0_0:
      description:
        short: Gyro rate offset temp ^0 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_G0_X0_1:
      description:
        short: Gyro rate offset temp ^0 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_G0_X0_2:
      description:
        short: Gyro rate offset temp ^0 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_G0_TREF:
      description:
        short: Gyro calibration reference temp
      category: System
      type: float
      default: 25.0
    TC_G0_TMIN:
      description:
        short: Gyro calibration minimum temp
      category: System
      type: float
      default: 0.0
    TC_G0_TMAX:
      description:
        short: Gyro calibration maximum temp
      category: System
      type: float
      default: 100.0
