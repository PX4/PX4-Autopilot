module_name: temperature_compensation
parameters:
- group: Thermal Compensation
  definitions:
    TC_A3_ID:
      description:
        short: Accelerometer calibration ID
      category: System
      type: int32
      default: 0
    TC_A3_X3_0:
      description:
        short: Accel offset temp ^3 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_A3_X3_1:
      description:
        short: Accel offset temp ^3 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_A3_X3_2:
      description:
        short: Accel offset temp ^3 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_A3_X2_0:
      description:
        short: Accel offset temp ^2 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_A3_X2_1:
      description:
        short: Accel offset temp ^2 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_A3_X2_2:
      description:
        short: Accel offset temp ^2 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_A3_X1_0:
      description:
        short: Accel offset temp ^1 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_A3_X1_1:
      description:
        short: Accel offset temp ^1 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_A3_X1_2:
      description:
        short: Accel offset temp ^1 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_A3_X0_0:
      description:
        short: Accel offset temp ^0 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_A3_X0_1:
      description:
        short: Accel offset temp ^0 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_A3_X0_2:
      description:
        short: Accel offset temp ^0 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_A3_TREF:
      description:
        short: Accel calibration reference temp
      category: System
      type: float
      default: 25.0
    TC_A3_TMIN:
      description:
        short: Accel calibration minimum temp
      category: System
      type: float
      default: 0.0
    TC_A3_TMAX:
      description:
        short: Accel calibration maximum temp
      category: System
      type: float
      default: 100.0
