module_name: temperature_compensation
parameters:
- group: Thermal Compensation
  definitions:
    TC_M3_ID:
      description:
        short: Magnetometer calibration ID
      category: System
      type: int32
      default: 0
    TC_M3_X3_0:
      description:
        short: Mag offset temp ^3 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_M3_X3_1:
      description:
        short: Mag offset temp ^3 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_M3_X3_2:
      description:
        short: Mag offset temp ^3 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_M3_X2_0:
      description:
        short: Mag offset temp ^2 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_M3_X2_1:
      description:
        short: Mag offset temp ^2 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_M3_X2_2:
      description:
        short: Mag offset temp ^2 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_M3_X1_0:
      description:
        short: Mag offset temp ^1 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_M3_X1_1:
      description:
        short: Mag offset temp ^1 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_M3_X1_2:
      description:
        short: Mag offset temp ^1 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_M3_X0_0:
      description:
        short: Mag offset temp ^0 poly coeff - X
      category: System
      type: float
      default: 0.0
    TC_M3_X0_1:
      description:
        short: Mag offset temp ^0 poly coeff - Y
      category: System
      type: float
      default: 0.0
    TC_M3_X0_2:
      description:
        short: Mag offset temp ^0 poly coeff - Z
      category: System
      type: float
      default: 0.0
    TC_M3_TREF:
      description:
        short: Mag calibration reference temp
      category: System
      type: float
      default: 25.0
    TC_M3_TMIN:
      description:
        short: Mag calibration minimum temp
      category: System
      type: float
      default: 0.0
    TC_M3_TMAX:
      description:
        short: Mag calibration maximum temp
      category: System
      type: float
      default: 100.0
