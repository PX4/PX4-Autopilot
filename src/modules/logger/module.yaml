module_name: logger
parameters:
- group: SD Logging
  definitions:
    SDLOG_UTC_OFFSET:
      description:
        short: UTC offset
        long: "Local time offset from UTC. Example: UTC+09:00 (South Korea) = 540 min."
      type: int32
      default: 0
      unit: min
      min: -1000
      max: 1000
    SDLOG_MODE:
      description:
        short: Logging Mode
        long: SD logging only; mavlink backend is controlled independently.
      type: enum
      values:
        0: when armed until disarm (default)
        1: from boot until disarm
        2: from boot until shutdown
        3: while manual input AUX1 >30%
        4: from 1st armed until shutdown
      default: 0
      reboot_required: true
    SDLOG_BACKEND:
      description:
        short: Logging Backend
        long: Logger will not start if no backends are enabled.
      type: bitmask
      bit:
        0: SD card logging
        1: Mavlink logging
      default: 3
      min: 0
      max: 3
      reboot_required: true
    SDLOG_BOOT_BAT:
      description:
        short: Battery-only Logging
        long: Skip log-from-boot if no battery detected (e.g. bench USB power). No effect on arm-based modes.
      type: boolean
      default: 0
    SDLOG_MISSION:
      description:
        short: Mission Log
        long: Additional small log with mission-relevant messages (stats, geotagging). Full log always written and contains all mission log data.
      type: enum
      values:
        0: Disabled
        1: All mission messages
        2: Geotagging messages
      default: 0
      reboot_required: true
    SDLOG_PROFILE:
      description:
        short: Logging topic profile
        long: Multiple profiles increase bandwidth and log size.
      type: bitmask
      bit:
        0: Default set (general log analysis)
        1: Estimator replay, full rate (EKF2)
        2: Thermal calibration (high-rate raw IMU, Baro)
        3: System identification (high-rate actuator, IMU)
        4: High rate (RC, attitude, rates, actuators)
        5: Debug (debug_*.msg)
        6: Sensor comparison (low-rate raw IMU, Baro, Mag)
        7: Computer Vision and Avoidance
        8: Raw FIFO high-rate IMU (Gyro)
        9: Raw FIFO high-rate IMU (Accel)
        10: Mavlink tunnel message (payload comms debug)
        11: High rate sensors
      default: 1
      min: 0
      max: 4095
      reboot_required: true
    SDLOG_MAX_SIZE:
      description:
        short: Maximum log file size
        long: When reached, log file rotates. Value also added to SDLOG_ROTATE cleanup threshold as headroom. 0 disables rotation and cleanup reservation. Must not exceed FAT32 4 GiB limit.
      type: int32
      default: 1024
      min: 0
      max: 4095
      unit: MiB
      reboot_required: false
    SDLOG_ROTATE:
      description:
        short: Maximum disk usage percentage
        long: |-
          Limit applies even during writing. 100: fill disk; 0: disable. Cleanup at log start (not boot), accounting for SDLOG_MAX_SIZE so logs can be FTP'd before deletion.
      type: int32
      default: 90
      min: 0
      max: 100
      reboot_required: false
    SDLOG_DIRS_MAX:
      description:
        short: Maximum number of log directories to keep
        long: At log start, deletes oldest directories to stay at or below this count. Independent of SDLOG_ROTATE/SDLOG_MAX_SIZE (useful in SITL). 0 disables.
      type: int32
      default: 0
      min: 0
      max: 1000
      reboot_required: false
    SDLOG_UUID:
      description:
        short: Log UUID
        long: Adds a unique vehicle ID to the log.
      type: boolean
      default: 1
