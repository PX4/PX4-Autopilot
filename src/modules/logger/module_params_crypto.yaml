module_name: logger
parameters:
- group: SD Logging
  definitions:
    SDLOG_ALGORITHM:
      description:
        short: Logfile Encryption algorithm
      type: enum
      values:
        0: Disabled
        2: XChaCha20
      default: 2
    SDLOG_KEY:
      description:
        short: Logfile Encryption key index
        long: |-
          Keystore index for the log encryption key. For symmetric algorithms: generated at log start, volatile (log-duration only), stored RSA2048-encrypted on SD alongside the logfile using SDLOG_EXCHANGE_KEY.
      type: int32
      default: 2
      min: 0
      max: 255
    SDLOG_EXCH_KEY:
      description:
        short: Logfile Encryption key exchange key
        long: RSA2048 key (at this keystore index) that encrypts the symmetric log key and stores it on SD.
      type: int32
      default: 1
      min: 0
      max: 255
