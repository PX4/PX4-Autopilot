module_name: AutoFollowTarget
parameters:
- group: Follow target
  definitions:
    FLW_TGT_RS:
      description:
        short: Responsiveness to target movement in Target Estimator
        long: "Lower values: more responsive to position changes but less noise rejection."
      type: float
      default: 0.1
      min: 0.0
      max: 1.0
      decimal: 2
    FLW_TGT_HT:
      description:
        short: Follow target height
      type: float
      default: 8.0
      unit: m
      min: 8.0
    FLW_TGT_DST:
      description:
        short: Distance to follow target from
      type: float
      default: 8.0
      unit: m
      min: 1.0
    FLW_TGT_FA:
      description:
        short: Follow Angle setting in degrees
        long: |-
          0 = directly in front of target's motion direction; increases clockwise (right=90, left=-90).
          Out-of-range values are wrapped into ±180 (e.g. 480→120).
      type: float
      default: 180.0
      min: -180.0
      max: 180.0
    FLW_TGT_ALT_M:
      description:
        short: Altitude control mode
        long: |-
          Modes 0/1: drone may crash if target ascends terrain. In mode 2, set FLW_TGT_HT high enough to avoid terrain despite GPS altitude inaccuracies.
      type: enum
      values:
        0: '2D Tracking: Maintain constant altitude relative to home and track XY
          position only'
        1: '2D + Terrain: Maintain constant altitude relative to terrain below and
          track XY position'
        2: '3D Tracking: Track target''s altitude (be aware that GPS altitude bias
          usually makes this useless)'
      default: 0
    FLW_TGT_MAX_VEL:
      description:
        short: Max tangential velocity for follow orbit trajectory
        long: Max speed when circling the target as the orbit angle setpoint changes. Higher = more aggressive.
      type: float
      default: 5.0
      min: 0.0
      max: 20.0
      decimal: 1
