module_name: sensors
parameters:
- group: Sensor Calibration
  definitions:
    CAL_MAG_COMP_TYP:
      description:
        short: Type of magnetometer compensation
      category: System
      type: enum
      values:
        0: Disabled
        1: Throttle-based compensation
        2: Current-based compensation (battery_status instance 0)
        3: Current-based compensation (battery_status instance 1)
      default: 0
- group: Sensors
  definitions:
    SENS_MAG_SIDES:
      description:
        short: Bitfield selecting mag sides for calibration
        long: |-
          Two-side calibration estimates offsets only (scale unchanged); initial six-side calibration recommended.
          Bit values: tail_down=1, nose_down=2, left=4, right=8, upside_down=16, rightside_up=32.
      type: enum
      values:
        34: Two side calibration
        38: Three side calibration
        63: Six side calibration
      default: 63
      min: 34
      max: 63
    CAL_MAG_SIDES:
      description:
        short: For legacy QGC support only
        long: Use SENS_MAG_SIDES instead
      category: Developer
      type: int32
      default: 63
    SENS_MAG_AUTOROT:
      description:
        short: Automatically set external rotations
        long: Auto-detects external magnetometer rotation during calibration.
      type: boolean
      default: 1
    SENS_MAG_RATE:
      description:
        short: Magnetometer max rate
        long: Upper bound; actual rate depends on the sensor.
      type: float
      default: 15.0
      min: 1
      max: 200
      unit: Hz
      reboot_required: true
    SENS_MAG_MODE:
      description:
        short: Sensors hub mag mode
      category: System
      type: enum
      values:
        0: Publish all magnetometers
        1: Publish primary magnetometer
      default: 1
      reboot_required: true
    SENS_MAG_AUTOCAL:
      description:
        short: Magnetometer auto calibration
        long: |-
          Auto-init calibration from bias estimate if available. Captures hard-iron offsets only;
          full calibration still recommended. Mainly for remote nodes (e.g. CAN GPS) unreachable from a GCS.
      category: System
      type: boolean
      default: 0
