module_name: vehicle_imu
parameters:
- group: Sensors
  definitions:
    IMU_INTEG_RATE:
      description:
        short: IMU integration rate
        long: |-
          Rate for integrating raw IMU data into delta angles/velocities.
          Should be a multiple of the estimator update period (ekf2: 10 ms).
      type: enum
      values:
        100: 100 Hz
        200: 200 Hz
        250: 250 Hz
        400: 400 Hz
      default: 200
      min: 100
      max: 1000
      unit: Hz
      reboot_required: true
    SENS_IMU_AUTOCAL:
      description:
        short: IMU auto calibration
        long: Automatically initialize IMU (accel/gyro) calibration from bias estimates
          if available.
      category: System
      type: boolean
      default: 1
    SENS_IMU_CLPNOTI:
      description:
        short: IMU notify clipping
      category: System
      type: boolean
      default: 1
