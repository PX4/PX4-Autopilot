module_name: vehicle_air_data
parameters:
- group: Sensors
  definitions:
    SENS_BARO_QNH:
      description:
        short: QNH for barometer
      type: float
      default: 1013.25
      min: 500
      max: 1500
      unit: hPa
    SENS_BARO_RATE:
      description:
        short: Baro max rate
        long: |-
          Barometric air data maximum publication rate. This is an upper bound,
          actual barometric data rate is still dependent on the sensor.
      type: float
      default: 20.0
      min: 1
      max: 200
      unit: Hz
    SENS_BAR_AUTOCAL:
      description:
        short: Barometer auto calibration
        long: Automatically calibrate barometer based on the GNSS height
      category: System
      type: boolean
      default: 1
    SENS_BARO_K_XP:
      description:
        short: Static pressure position error coefficient for the positive X axis
        long: |-
          Ratio of static pressure error to dynamic pressure generated by a
          positive wind relative velocity along the X body axis. If the baro
          height estimate rises during forward flight, then this will be a
          negative number.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    SENS_BARO_K_XN:
      description:
        short: Static pressure position error coefficient for the negative X axis
        long: |-
          Ratio of static pressure error to dynamic pressure generated by a
          negative wind relative velocity along the X body axis. If the baro
          height estimate rises during backwards flight, then this will be a
          negative number.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    SENS_BARO_K_YP:
      description:
        short: Pressure position error coefficient for the positive Y axis
        long: |-
          Ratio of static pressure error to dynamic pressure generated by a
          wind relative velocity along the positive Y (RH) body axis. If the
          baro height estimate rises during sideways flight to the right, then
          this will be a negative number.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    SENS_BARO_K_YN:
      description:
        short: Pressure position error coefficient for the negative Y axis
        long: |-
          Ratio of static pressure error to dynamic pressure generated by a
          wind relative velocity along the negative Y (LH) body axis. If the
          baro height estimate rises during sideways flight to the left, then
          this will be a negative number.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    SENS_BARO_K_Z:
      description:
        short: Static pressure position error coefficient for the Z axis
        long: Ratio of static pressure error to dynamic pressure generated by a
          wind relative velocity along the Z body axis.
      type: float
      default: 0.0
      min: -0.5
      max: 0.5
      decimal: 2
    SENS_BARO_VMAX:
      description:
        short: Maximum airspeed used for baro static pressure compensation
      type: float
      default: 20.0
      min: 5.0
      max: 50.0
      unit: m/s
      decimal: 1
