module_name: vehicle_air_data
parameters:
- group: Sensors
  definitions:
    SENS_BARO_QNH:
      description:
        short: QNH for barometer
      type: float
      default: 1013.25
      min: 500
      max: 1500
      unit: hPa
    SENS_BARO_RATE:
      description:
        short: Baro max rate
        long: |-
          Barometric air data maximum publication rate. This is an upper bound,
          actual barometric data rate is still dependent on the sensor.
      type: float
      default: 20.0
      min: 1
      max: 200
      unit: Hz
    SENS_BAR_AUTOCAL:
      description:
        short: Barometer auto calibration
        long: |
          Bitmask controlling automatic barometer calibrations.
          Bit 0: GNSS-based altitude offset calibration.
          Bit 1: Online thrust compensation estimation (identifies
          SENS_BARO_PCOEF and SENS_BARO_PTAU during flight and saves
          on disarm).
      category: System
      type: bitmask
      bit:
        0: GNSS altitude offset
        1: Thrust compensation
      default: 1
      min: 0
      max: 3
    SENS_BARO_PCOEF:
      description:
        short: Baro altitude correction per unit normalized thrust
        long: Corrects propwash-induced baro error.
          Sign depends on sensor placement relative to propellers.
          Set to 0 to disable.
      type: float
      default: 0.0
      min: -30.0
      max: 30.0
      unit: m
      decimal: 1
    SENS_BARO_PTAU:
      description:
        short: Baro thrust compensation time constant
        long: First-order low-pass filter time constant on thrust before
          baro compensation. Models delay from thrust change to pressure
          response. Set to 0 for instantaneous compensation.
      type: float
      default: 0.0
      min: 0.0
      max: 2.0
      unit: s
      decimal: 2
