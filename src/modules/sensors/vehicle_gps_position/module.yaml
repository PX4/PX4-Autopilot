__max_num_gps_instances: &max_num_gps_instances 2

module_name: vehicle_gps_position

parameters:
    - group: Sensors
      definitions:
        SENS_GPS_MASK:
            description:
                short: Multi GPS Blending Control Mask
                long: "0 disables blending and always uses the first GPS instance."
            type: bitmask
            bit:
                0: use speed accuracy
                1: use hpos accuracy
                2: use vpos accuracy
            default: 7
            min: 0
            max: 7

        SENS_GPS_TAU:
            description:
                short: Multi GPS Blending Time Constant
                long: Time constant for smoothing position/height offsets between multiple GPS units.
            type: float
            default: 10.0
            unit: s
            decimal: 1
            min: 1.0
            max: 100.0

        SENS_GPS_PRIME:
            description:
                short: Multi GPS primary instance
                long: |-
                    Preferred GPS instance when blending is inactive. EKF waits for primary even if secondary is available; secondary used only on primary timeout.
                    To select a DroneCAN GPS, set to its node ID.
                    No effect when blending is active.
            type: int32
            default: 0
            min: -1
            max: 127
            values:
                -1: Auto (equal priority)
                0: Main serial GPS
                1: Secondary serial GPS
        SENS_GPS${i}_ID:
            description:
                short: GPS ${i} device ID
                long: |-
                    Device ID for antenna offset slot ${i}. 0 disables slot.
                    When all slots are 0, offsets matched by uORB instance (serial GPS only).
            category: System
            type: int32
            default: 0
            num_instances: *max_num_gps_instances
            instance_start: 0

        SENS_GPS${i}_OFFX:
            description:
                short: GPS ${i} antenna X position
                long: |-
                    Forward offset from CoG.
                    Matched to receiver via SENS_GPS${i}_ID.
            type: float
            default: 0.0
            unit: m
            decimal: 3
            num_instances: *max_num_gps_instances
            instance_start: 0

        SENS_GPS${i}_OFFY:
            description:
                short: GPS ${i} antenna Y position
                long: |-
                    Right offset from CoG.
                    Matched to receiver via SENS_GPS${i}_ID.
            type: float
            default: 0.0
            unit: m
            decimal: 3
            num_instances: *max_num_gps_instances
            instance_start: 0

        SENS_GPS${i}_OFFZ:
            description:
                short: GPS ${i} antenna Z position
                long: |-
                    Down offset from CoG.
                    Matched to receiver via SENS_GPS${i}_ID.
            type: float
            default: 0.0
            unit: m
            decimal: 3
            num_instances: *max_num_gps_instances
            instance_start: 0

        SENS_GPS${i}_DELAY:
            description:
                short: GPS ${i} measurement delay
                long: |-
                    GPS delay relative to IMU. Matched via SENS_GPS${i}_ID.
                    Applied only when the driver lacks its own timestamp correction.
            type: int32
            default: 110
            unit: ms
            min: 0
            max: 300
            num_instances: *max_num_gps_instances
            instance_start: 0
