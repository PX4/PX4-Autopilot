module_name: sensors
parameters:
- group: Sensor Calibration
  definitions:
    SENS_FLOW_MINHGT:
      description:
        short: Minimum height above ground when reliant on optical flow
        long: |-
          Min AGL height for reliable optical flow.
          Below this, accuracy degrades to loss of focus.
      type: float
      default: 0.08
      unit: m
      min: 0.0
      max: 1.0
      increment: 0.1
      decimal: 2
    SENS_FLOW_MAXHGT:
      description:
        short: Maximum height above ground when reliant on optical flow
        long: |-
          Max AGL height for reliable optical flow. Height setpoint capped here when
          fully reliant on optical flow and AGL estimate is valid. Above this, accuracy degrades.
      type: float
      default: 100.0
      unit: m
      min: 1.0
      max: 100.0
      increment: 0.1
      decimal: 2
    SENS_FLOW_MAXR:
      description:
        short: Max angular flow rate measurable by sensor
        long: |-
          Max reliably measurable angular flow rate.
          Flow exceeding this is not fused by estimators; ground speed limited to keep flow below 50% of this.
      type: float
      default: 8.0
      unit: rad/s
      min: 1.0
      decimal: 2
- group: Sensors
  definitions:
    SENS_FLOW_ROT:
      description:
        short: Optical flow rotation
        long: |-
          Yaw rotation of optical flow relative to vehicle body frame.
          Zero = flow board X pointing forward.
      type: enum
      values:
        0: No rotation
        1: "Yaw 45\xB0"
        2: "Yaw 90\xB0"
        3: "Yaw 135\xB0"
        4: "Yaw 180\xB0"
        5: "Yaw 225\xB0"
        6: "Yaw 270\xB0"
        7: "Yaw 315\xB0"
      default: 0
    SENS_FLOW_RATE:
      description:
        short: Optical flow max rate
        long: Upper bound; actual rate depends on the sensor.
      type: float
      default: 70.0
      min: 1
      max: 200
      unit: Hz
      reboot_required: true
    SENS_FLOW_SCALE:
      description:
        short: Optical flow scale factor
      type: float
      default: 1.0
      min: 0.5
      max: 1.5
      decimal: 2
