module_name: vehicle_angular_velocity
parameters:
- group: Sensors
  definitions:
    IMU_GYRO_NF0_FRQ:
      description:
        short: Notch filter frequency for gyro
        long: |-
          Center frequency of the 2nd-order notch filter on the primary gyro.
          Prevents feedback amplification of structural resonances.
          Controllers only, not estimators. Applies to angular velocity and acceleration.
          See IMU_GYRO_NF0_BW for bandwidth. 0 disables.
      type: float
      default: 0.0
      min: 0
      max: 1000
      unit: Hz
      increment: 0.1
      decimal: 1
      reboot_required: false
    IMU_GYRO_NF0_BW:
      description:
        short: Notch filter bandwidth for gyro
        long: |-
          Stop-band width of the 2nd-order notch filter on the primary gyro.
          See IMU_GYRO_NF0_FRQ to enable and set frequency.
          Applies to angular velocity and acceleration (controllers only).
      type: float
      default: 20.0
      min: 0
      max: 100
      unit: Hz
      increment: 0.1
      decimal: 1
      reboot_required: false
    IMU_GYRO_NF1_FRQ:
      description:
        short: Notch filter 2 frequency for gyro
        long: |-
          Center frequency of the 2nd-order notch filter (2) on the primary gyro.
          Prevents feedback amplification of structural resonances.
          Controllers only, not estimators. Applies to angular velocity and acceleration.
          See IMU_GYRO_NF1_BW for bandwidth. 0 disables.
      type: float
      default: 0.0
      min: 0
      max: 1000
      unit: Hz
      increment: 0.1
      decimal: 1
      reboot_required: false
    IMU_GYRO_NF1_BW:
      description:
        short: Notch filter 1 bandwidth for gyro
        long: |-
          Stop-band width of the 2nd-order notch filter (2) on the primary gyro.
          See IMU_GYRO_NF1_FRQ to enable and set frequency.
          Applies to angular velocity and acceleration (controllers only).
      type: float
      default: 20.0
      min: 0
      max: 100
      unit: Hz
      increment: 0.1
      decimal: 1
      reboot_required: false
    IMU_GYRO_CUTOFF:
      description:
        short: Low pass filter cutoff frequency for gyro
        long: |-
          Cutoff frequency for the 2nd-order Butterworth filter on the primary gyro.
          Controllers only (angular velocity), not estimators.
          Also applies to angular acceleration (D-term); see IMU_DGYRO_CUTOFF. 0 disables.
      type: float
      default: 40.0
      min: 0
      max: 1000
      unit: Hz
      increment: 0.1
      decimal: 1
      reboot_required: false
    IMU_GYRO_RATEMAX:
      description:
        short: Gyro control data maximum publication rate (inner loop rate)
        long: |-
          Max publish rate for vehicle_angular_velocity; sets the rate-controller loop rate.
          Raw sensor data is always read/filtered at full rate (e.g. 8 kHz).
      type: enum
      values:
        100: 100 Hz
        250: 250 Hz
        400: 400 Hz
        800: 800 Hz
        1000: 1000 Hz
        2000: 2000 Hz
      default: 400
      min: 100
      max: 2000
      unit: Hz
      reboot_required: true
    IMU_DGYRO_CUTOFF:
      description:
        short: Cutoff frequency for angular acceleration (D-Term filter)
        long: |-
          Cutoff for the 2nd-order Butterworth D-term filter (derivative of angular velocity).
          D-term is most noise-susceptible; filtering it allows a higher IMU_GYRO_CUTOFF,
          reducing latency and permitting higher P gains. 0 disables.
      type: float
      default: 20.0
      min: 0
      max: 1000
      unit: Hz
      increment: 0.1
      decimal: 1
      reboot_required: false
    IMU_GYRO_DNF_EN:
      description:
        short: IMU gyro dynamic notch filtering
        long: |-
          Enable bank of dynamically updating notch filters.
          Requires ESC RPM feedback or onboard FFT (IMU_GYRO_FFT_EN).
      type: bitmask
      bit:
        0: ESC RPM
        1: FFT
      default: 0
      min: 0
      max: 3
    IMU_GYRO_DNF_BW:
      description:
        short: IMU gyro ESC notch filter bandwidth
        long: Bandwidth per notch filter when using dynamic notch filtering with ESC
          RPM.
      type: float
      default: 15.0
      unit: Hz
      increment: 0.1
      decimal: 1
      min: 5
      max: 30
    IMU_GYRO_DNF_HMC:
      description:
        short: IMU gyro dynamic notch filter harmonics
        long: Number of ESC RPM harmonics (RPM multiples) for dynamic notch filtering.
      type: int32
      default: 3
      min: 1
      max: 7
    IMU_GYRO_DNF_MIN:
      description:
        short: IMU gyro dynamic notch filter minimum frequency
      type: float
      default: 25.0
      unit: Hz
      increment: 0.1
      decimal: 1
