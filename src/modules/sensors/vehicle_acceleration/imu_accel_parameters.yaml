module_name: vehicle_acceleration
parameters:
- group: Sensors
  definitions:
    IMU_ACCEL_CUTOFF:
      description:
        short: Low pass filter cutoff frequency for accel
        long: |-
          Cutoff frequency for the 2nd-order Butterworth filter on the primary accelerometer.
          Controllers only, not estimators. 0 disables.
      type: float
      default: 30.0
      min: 0
      max: 1000
      unit: Hz
      reboot_required: true
