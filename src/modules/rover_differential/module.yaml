module_name: Rover Differential

parameters:
  - group: Rover Differential
    definitions:
      RD_WHEEL_TRACK:
          description:
            short: Wheel track
            long: Distance from the center of the right wheel to the center of the left wheel.
          type: float
          unit: m
          min: 0
          max: 100
          increment: 0.001
          decimal: 3
          default: 0

      RD_TRANS_TRN_DRV:
        description:
            short: Yaw error threshhold to switch from spot turning to driving
            long: Yaw error below which the state machine switches from turning to driving.
        type: float
        unit: rad
        min: 0.001
        max: 3.14159
        increment: 0.01
        decimal: 3
        default: 0.0872665

      RD_TRANS_DRV_TRN:
        description:
            short: Yaw error threshhold to switch from driving to spot turning
            long: |-
              Yaw error above which the state machine switches from driving to turning.
              Also governs smooth stop at the next waypoint: active if the angle between prevWP-currWP and currWP-nextWP is less than 180 - RD_TRANS_DRV_TRN.
        type: float
        unit: rad
        min: 0.001
        max: 3.14159
        increment: 0.01
        decimal: 3
        default: 0.174533

      RD_YAW_STK_GAIN:
        description:
            short: Yaw stick gain for Manual mode
            long: Assign value <1.0 to decrease stick response for yaw control.
        type: float
        min: 0.1
        max: 1
        increment: 0.01
        decimal: 3
        default: 1
