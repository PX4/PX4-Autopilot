module_name: vision_target_estimator
parameters:
- group: Vision Target Estimator
  definitions:
    VTE_EN:
      description:
        short: Vision Target Estimator module enable
      type: boolean
      default: 1
      reboot_required: true
    VTE_YAW_EN:
      description:
        short: Vision Target Estimator module enable orientation estimation
      type: boolean
      default: 0
      reboot_required: true
    VTE_POS_EN:
      description:
        short: Vision Target Estimator module enable position estimation
      type: boolean
      default: 1
      reboot_required: true
    VTE_AID_MASK:
      description:
        short: Integer bitmask controlling data fusion and aiding methods
      type: bitmask
      bit:
        0: target GNSS position
        1: UAV GNSS velocity
        2: vision relative position
        3: mission position (ignored if GNSS pos enabled)
        4: target GNSS velocity
      default: 14
    VTE_TASK_MASK:
      description:
        short: Integer bitmask controlling the tasks of the target estimator
      type: bitmask
      bit:
        0: precision landing
        1: DEBUG, always active
      default: 1
    VTE_BTOUT:
      description:
        short: Vision target timeout
        long: Seconds without fused measurements before target is considered lost; estimator resets and restarts when a source becomes available.
      type: float
      default: 3.0
      unit: s
      min: 0.0
      max: 50
      decimal: 1
      increment: 0.5
    VTE_TGT_TOUT:
      description:
        short: Target validity timeout
        long: Max time without fused measurements before relative pose/yaw is flagged invalid.
      type: float
      default: 2.0
      unit: s
      min: 0.0
      max: 50
      decimal: 2
      increment: 0.25
    VTE_M_REC_TOUT:
      description:
        short: Measurement recent timeout
        long: Age limit for a raw measurement to be eligible for fusion.
      type: float
      default: 1.0
      unit: s
      min: 0.0
      max: 10
      decimal: 2
      increment: 0.05
    VTE_M_UPD_TOUT:
      description:
        short: Measurement updated timeout
        long: Max age before a cached measurement is discarded.
      type: float
      default: 0.1
      unit: s
      min: 0.0
      max: 5
      decimal: 3
      increment: 0.01
    VTE_ACC_D_UNC:
      description:
        short: UAV acceleration white-noise power spectral density
        long: |-
          White-noise PSD on UAV acceleration input.
          1-sigma vel_uav change over t: sqrt(VTE_ACC_D_UNC * t).
          Variance rate (not per-step); independent of update rate.
          Higher values: tighter tracking, fewer outlier rejections.
          Unit: m^2/s^3.
      type: float
      default: 0.02
      min: 0.0001
      decimal: 4
    VTE_ACC_T_UNC:
      description:
        short: Target acceleration random-walk process noise
        long: |-
          Process-noise PSD for target acceleration random walk (moving-target builds only).
          1-sigma target-accel change over t: sqrt(VTE_ACC_T_UNC * t)
          (0.1 default: ~0.32 m/s^2 at 1s, ~1.0 m/s^2 at 10s).
          Variance rate, independent of update rate.
          Higher: follows manoeuvres more aggressively, accepts more outliers.
          Unit: ((m/s^2)^2)/s.
      type: float
      default: 0.1
      min: 0.01
      decimal: 2
    VTE_BIAS_UNC:
      description:
        short: Bias random-walk process noise
        long: |-
          Process-noise PSD for GPS/vision bias random walk.
          1-sigma bias change over t: sqrt(VTE_BIAS_UNC * t)
          (0.001 default: ~3cm at 1s, ~10cm at 10s, ~32cm at 100s).
          Variance rate, independent of update rate.
          Higher: bias adapts faster; lower: stiffer.
          Tune to realistic drift of the absolute reference (few cm over tens of seconds for consumer GNSS, less for RTK).
          Unit: m^2/s.
      type: float
      default: 0.001
      min: 0.0001
      decimal: 4
    VTE_POS_UNC_IN:
      description:
        short: Initial target and drone relative position uncertainty
        long: Initial x/y/z relative-position variance. Runtime changes take effect on next estimator init/reset.
      type: float
      default: 0.5
      unit: m^2
      min: 0.001
      decimal: 3
    VTE_VEL_UNC_IN:
      description:
        short: Initial target and drone relative velocity uncertainty
        long: Initial x/y/z relative-velocity variance. Runtime changes take effect on next estimator init/reset.
      type: float
      default: 0.5
      unit: (m/s)^2
      min: 0.001
      decimal: 3
    VTE_BIA_UNC_IN:
      description:
        short: Initial GPS bias uncertainty
        long: |-
          Initial target/drone GPS bias variance. Runtime changes take effect on next estimator init/reset.
          Does not affect runtime (governed then by VTE_BIAS_UNC). Keep large to absorb initial misalignments.
      type: float
      default: 1.0
      unit: m^2
      min: 0.001
      decimal: 3
    VTE_BIA_AVG_THR:
      description:
        short: Initial GNSS/vision bias averaging threshold
        long: |-
          Convergence band for the initial GNSS/vision bias LPF.
          When the bias first becomes observable, VTE low-pass-filters samples before activating.
          Exit when consecutive samples stay within this threshold for >=2*tau, or VTE_BIA_AVG_TOUT elapses.
      type: float
      default: 0.3
      unit: m
      min: 0.0
      decimal: 2
    VTE_BIA_AVG_TOUT:
      description:
        short: Initial GNSS/vision bias averaging timeout
        long: |-
          Max time averaging the initial GNSS bias (while GNSS+vision are jointly observable).
          Valid vision samples update the LPF; GNSS measurements propagate to match the vision timestamp.
          If the GNSS sample expires, averaging stops and the current LPF bias is activated.
          0 disables averaging (immediate activation).
      type: float
      default: 1.0
      unit: s
      min: 0.0
      decimal: 2
    VTE_YAW_UNC_IN:
      description:
        short: Initial orientation uncertainty
        long: Initial yaw orientation variance (rad^2). Runtime changes take effect on next estimator init/reset.
      type: float
      default: 1.0
      min: 0.001
      decimal: 3
    VTE_YAW_ACC_UNC:
      description:
        short: Yaw acceleration white-noise power spectral density
        long: |-
          White-noise PSD on yaw acceleration (drives yaw-rate state).
          1-sigma yaw-rate change over t: sqrt(VTE_YAW_ACC_UNC * t)
          (0.004 default: ~3.6 deg/s at 1s, ~11.5 deg/s at 10s).
          Variance rate, independent of update rate.
          Higher: follows rapid heading changes; lower: aggressive smoothing.
          Unit: rad^2/s^3.
      type: float
      default: 0.004
      min: 0.0
      decimal: 4
    VTE_ACC_UNC_IN:
      description:
        short: Initial target absolute acceleration uncertainty
        long: |-
          Initial x/y/z target-acceleration variance (moving-target builds only).
          Runtime changes take effect on next estimator init/reset.
          Does not affect runtime (governed then by VTE_ACC_T_UNC).
      type: float
      default: 0.1
      unit: (m/s^2)^2
      min: 0.001
      decimal: 3
    VTE_GPS_V_NOISE:
      description:
        short: Minimum standard deviation for GPS velocity observations
        long: |-
          Observation noise floor for GPS velocity fusion.
          Clamps per-sample variance to max(reported, VTE_GPS_V_NOISE^2).
          Only active when the sensor under-reports its noise.
      type: float
      default: 0.3
      unit: m/s
      min: 0.01
      max: 5.0
      decimal: 2
    VTE_GPS_P_NOISE:
      description:
        short: Minimum standard deviation for GPS position observations
        long: |-
          Observation noise floor for GPS position fusion (target or mission waypoint).
          Clamps per-sample variance to max(reported, VTE_GPS_P_NOISE^2).
          Only active when the sensor under-reports its noise.
      type: float
      default: 0.5
      unit: m
      min: 0.01
      max: 10.0
      decimal: 2
    VTE_EVA_NOISE:
      description:
        short: Minimum standard deviation for vision yaw observations
        long: |-
          Observation noise floor for vision yaw fusion.
          Clamps per-sample variance to max(reported, VTE_EVA_NOISE^2).
          Only active when the sensor under-reports its noise.
          Default ~0.07 rad (4 deg) suits marker-based yaw; lowering can cause controller oscillation.
      type: float
      default: 0.07
      min: 0.05
      unit: rad
      decimal: 2
    VTE_EVP_NOISE:
      description:
        short: Minimum standard deviation for vision relative-position observations
        long: |-
          Observation noise floor for vision relative-position fusion.
          Clamps per-sample variance to max(reported, VTE_EVP_NOISE^2).
          Only active when the sensor under-reports its noise.
      type: float
      default: 0.1
      min: 0.01
      unit: m
      decimal: 2
    VTE_POS_NIS_THRE:
      description:
        short: Normalized innovation squared threshold for the position estimator
        long: |-
          Chi-squared NIS threshold for position outlier rejection.
          H0: innovation consistent with covariance. False-rejection probability:
          0.46=50%, 1.64=20%, 2.71=10%, 3.84=5%, 6.63=1%, 10.83=0.1%.
      type: float
      default: 3.84
      min: 0.46
      max: 10.83
      decimal: 2
    VTE_YAW_NIS_THRE:
      description:
        short: Normalized innovation squared threshold for the orientation estimator
        long: |-
          Chi-squared NIS threshold for orientation outlier rejection.
          H0: innovation consistent with covariance. False-rejection probability:
          0.46=50%, 1.64=20%, 2.71=10%, 3.84=5%, 6.63=1%, 10.83=0.1%.
      type: float
      default: 3.84
      min: 0.46
      max: 10.83
      decimal: 2
