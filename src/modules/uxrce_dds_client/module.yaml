module_name: UXRCE-DDS Client
serial_config:
    - command: |
        if [ $SERIAL_DEV != ethernet ]; then
            set UXRCE_DDS_ARGS "-t serial -d ${SERIAL_DEV} -b p:${BAUD_PARAM}"
        else
            set UXRCE_DDS_ARGS "-t udp"
        fi
        uxrce_dds_client start ${UXRCE_DDS_ARGS}

      port_config_param:
        name: UXRCE_DDS_CFG
        group: UXRCE-DDS Client
      supports_networking: true

parameters:
    - group: UXRCE-DDS Client
      definitions:

        UXRCE_DDS_DOM_ID:
            description:
                short: uXRCE-DDS domain ID
            category: System
            type: int32
            reboot_required: true
            default: 0

        UXRCE_DDS_KEY:
            description:
                short: uXRCE-DDS session key
                long: Must be non-zero. Each client must have a unique key in multi-client setups.
            category: System
            type: int32
            reboot_required: true
            default: 1

        UXRCE_DDS_PRT:
            description:
                short: uXRCE-DDS UDP port
                long: Applies when Ethernet is the selected uXRCE-DDS interface.
            type: int32
            min: 0
            max: 65535
            reboot_required: true
            default: 8888
            requires_ethernet: true

        UXRCE_DDS_AG_IP:
            description:
                short: uXRCE-DDS Agent IP address
                long: Ethernet uXRCE-DDS only. Must be int32 (not decimal dot notation). E.g., 192.168.1.2 = -1062731518; 127.0.0.1 = 2130706433.
            type: int32
            reboot_required: true
            default: 2130706433
            requires_ethernet: true

        UXRCE_DDS_PTCFG:
            description:
                short: uXRCE-DDS participant configuration
            category: System
            reboot_required: true
            type: enum
            values:
                0: Default
                1: Localhost-only (set ROS_LOCALHOST_ONLY=1)
                2: Custom participant (px4_participant profile)
            min: 0
            max: 2
            default: 0

        UXRCE_DDS_SYNCT:
            description:
                short: Enable uXRCE-DDS timestamp synchronization
                long: Syncs message timestamps by measuring the offset between Agent OS time and PX4 time.
            type: boolean
            category: System
            reboot_required: true
            default: 1

        UXRCE_DDS_SYNCC:
            description:
                short: Enable uXRCE-DDS system clock synchronization
                long: Requires UXRCE_DDS_SYNCT. Sets the system clock using the agent's UTC timestamp.
            type: boolean
            category: System
            reboot_required: true
            default: 0

        UXRCE_DDS_TX_TO:
            description:
                short: TX rate timeout configuration
                long: Seconds without TX before reconnecting. <1 disables.
            type: int32
            category: System
            reboot_required: true
            default: 3
            unit: s

        UXRCE_DDS_RX_TO:
            description:
                short: RX rate timeout configuration
                long: Seconds without RX before reconnecting. <1 disables.
            type: int32
            category: System
            reboot_required: true
            default: -1
            unit: s

        UXRCE_DDS_NS_IDX:
            description:
                short: Define an index-based message namespace
                long: Namespace for DDS messages, e.g. uav_0 to uav_9999. <0 leaves namespace empty.
            type: int32
            min: -1
            max: 9999
            category: System
            reboot_required: true
            default: -1

        UXRCE_DDS_FLCTRL:
            description:
                short: Enable serial flow control for UXRCE interface
                long: For reliable high-bandwidth serial uXRCE communication.
            type: boolean
            category: System
            reboot_required: true
            default: 0
