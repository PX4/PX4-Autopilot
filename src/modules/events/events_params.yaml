module_name: events
parameters:
- group: Events
  definitions:
    EV_TSK_STAT_DIS:
      description:
        short: Status Display
        long: "When enabled and supported, arm LEDs flash on vehicle status changes. No status events are currently implemented."
      type: boolean
      default: 0
      reboot_required: true
    EV_TSK_RC_LOSS:
      description:
        short: RC Loss Alarm
        long: "When enabled, plays alarm via buzzer or ESCs (if supported) after disarm, if previously armed with RC signal. Useful for locating crashed drones."
      type: boolean
      default: 0
      reboot_required: true
