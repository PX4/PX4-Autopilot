module_name: mc_att_control
parameters:
- group: Multicopter Attitude Control
  definitions:
    MC_ROLL_P:
      description:
        short: Roll P gain
        long: Desired angular rate (rad/s) per 1 rad error.
      type: float
      default: 4.0
      min: 0.0
      max: 12
      decimal: 2
      increment: 0.1
    MC_PITCH_P:
      description:
        short: Pitch P gain
        long: Desired angular rate (rad/s) per 1 rad error.
      type: float
      default: 4.0
      min: 0.0
      max: 12
      decimal: 2
      increment: 0.1
    MC_YAW_P:
      description:
        short: Yaw P gain
        long: Desired angular rate (rad/s) per 1 rad error.
      type: float
      default: 2.8
      min: 0.0
      max: 5
      decimal: 2
      increment: 0.1
    MC_YAW_WEIGHT:
      description:
        short: Yaw weight
        long: |-
          Fraction [0,1] deprioritizing yaw vs roll/pitch in non-linear attitude control.
          MCs have less yaw authority, and yaw is not critical for hover or 3D nav.
          Use MC_YAW_P for yaw gain tuning — this ratio does not affect it.
      type: float
      default: 0.4
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.1
    MC_ROLLRATE_MAX:
      description:
        short: Max roll rate
        long: |-
          Limits roll rate in manual and auto modes (not acro).
          Prevents large control output and mixer saturation during large autonomous rotations.
          Also bounded by gyro measurement rate.
      type: float
      default: 220.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    MC_PITCHRATE_MAX:
      description:
        short: Max pitch rate
        long: |-
          Limits pitch rate in manual and auto modes (not acro).
          Prevents large control output and mixer saturation during large autonomous rotations.
          Also bounded by gyro measurement rate.
      type: float
      default: 220.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    MC_YAWRATE_MAX:
      description:
        short: Max yaw rate
      type: float
      default: 200.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 1
      increment: 5
    MC_REF_W_N:
      description:
        short: Attitude reference-model natural frequency
        long: Reference model bandwidth; smooths attitude setpoints, generates rate FF. Higher = less lag, more peak rate demand.
      type: float
      default: 50.0
      unit: rad/s
      min: 1.0
      max: 200.0
      decimal: 0
      increment: 1
    MC_REF_FF:
      description:
        short: Attitude reference-model feed-forward gain
        long: "Scale on reference-model rate FF. 0 disables."
      type: float
      default: 0.0
      min: 0.0
      max: 1.0
      decimal: 2
      increment: 0.01
    MC_REF_FF_MAX:
      description:
        short: Feed-forward angular-rate cap; 0 = disabled
        long: Per-axis rate FF cap.
      type: float
      default: 100.0
      unit: deg/s
      min: 0.0
      max: 1800.0
      decimal: 0
      increment: 5
- group: Multicopter Position Control
  definitions:
    MC_MAN_TILT_TAU:
      description:
        short: Manual tilt input filter time constant
        long: "0 disables the filter."
      type: float
      default: 0.0
      unit: s
      min: 0.0
      max: 2.0
      decimal: 2
