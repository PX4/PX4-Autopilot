module_name: atxxxx
parameters:
- group: OSD
  definitions:
    OSD_ATXXXX_CFG:
      description:
        short: Enable/Disable the ATXXX OSD Chip
        long: |-
          Configure the ATXXXX OSD Chip (mounted on the OmnibusF4SD board) and
          select the transmission standard.
      type: enum
      values:
        0: Disabled
        1: NTSC
        2: PAL
      default: 0
      reboot_required: true
