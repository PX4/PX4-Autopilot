module_name: MSP OSD
serial_config:
    - command: msp_osd start -d ${SERIAL_DEV}
      port_config_param:
        name: MSP_OSD_CONFIG
        group: OSD

parameters:
    - group: OSD
      definitions:

        # OSD Parameters
        OSD_SYMBOLS:
            description:
                short: OSD Symbol Selection
            type: bitmask
            bit:
                0: CRAFT_NAME
                1: DISARMED
                2: GPS_LAT
                3: GPS_LON
                4: GPS_SATS
                5: GPS_SPEED
                6: HOME_DIST
                7: HOME_DIR
                8: MAIN_BATT_VOLTAGE
                9: CURRENT_DRAW
                10: MAH_DRAWN
                11: RSSI_VALUE
                12: ALTITUDE
                13: NUMERICAL_VARIO
                # the following are reserved but not currently functional
                14: (unused) FLYMODE
                15: (unused) ESC_TMP
                16: (unused) PITCH_ANGLE
                17: (unused) ROLL_ANGLE
                18: CROSSHAIRS
                19: AVG_CELL_VOLTAGE
                20: (unused) HORIZON_SIDEBARS
                21: POWER
            default: 16383

        # OSD Crosshairs Vertical Position
        OSD_CH_HEIGHT:
            description:
                short: OSD Crosshairs Height
                long: Crosshair vertical position; OSD-limited to 15 discrete values. Negative = below horizon.
            type: int32
            default: 0
            min: -8
            max: 8


        # OSD Log Level
        OSD_LOG_LEVEL:
            description:
                short: OSD Warning Level
            type: int32
            bit:
                0: EMERGENCY
                1: ALERT
                2: CRITICAL
                3: ERROR
                4: WARNING
                5: NOTICE
                6: INFO
                7: DEBUG
                8: NONE
            default: 3

        # Scroll Speed
        OSD_SCROLL_RATE:
            description:
                short: OSD Scroll Rate (ms)
                long: Scroll rate for OSD messages wider than the display; lower-bounded by module loop rate.
            type: int32
            min: 100
            max: 1000
            default: 125

        # Dwell TIme
        OSD_DWELL_TIME:
            description:
                short: OSD Dwell Time (ms)
                long: Dwell at the beginning of the display when scrolling.
            type: int32
            min: 100
            max: 10000
            default: 500

        # RC Stick input
        OSD_RC_STICK:
            description:
                short: OSD RC Stick commands
                long: |
                    Forward RC stick input to VTX when disarmed
            type: int32
            min: 0
            max: 1
            default: 1
