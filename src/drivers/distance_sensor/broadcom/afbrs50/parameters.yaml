module_name: afbrs50
parameters:
- group: Sensors
  definitions:
    SENS_AFBR_MODE:
      description:
        short: AFBR Rangefinder Mode
      type: enum
      values:
        0: Short Range Mode
        1: Long Range Mode
        2: High Speed Short Range Mode
        3: High Speed Long Range Mode
      default: 0
      reboot_required: true
      min: 0
      max: 3
    SENS_AFBR_S_RATE:
      description:
        short: AFBR Rangefinder Short Range Rate
        long: Measurement rate in short range mode.
      type: int32
      default: 50
      min: 1
      max: 100
    SENS_AFBR_L_RATE:
      description:
        short: AFBR Rangefinder Long Range Rate
        long: Measurement rate in long range mode.
      type: int32
      default: 25
      min: 1
      max: 100
    SENS_AFBR_THRESH:
      description:
        short: AFBR Rangefinder Short/Long Range Threshold
        long: Short-to-long when distance > threshold + hysteresis; long-to-short when < threshold - hysteresis.
      type: int32
      default: 4
      unit: m
      min: 1
      max: 50
    SENS_AFBR_HYSTER:
      description:
        short: AFBR Rangefinder Short/Long Range Threshold Hysteresis
        long: Hysteresis for short/long range mode switching.
      type: int32
      default: 1
      unit: m
      min: 1
      max: 10
    SENS_AFBR_ROT:
      description:
        short: AFBR Rangefinder Orientation
        long: Mounting orientation relative to the vehicle body frame.
      type: enum
      values:
        0: No rotation
        1: "Yaw 45\xB0"
        2: "Yaw 90\xB0"
        3: "Yaw 135\xB0"
        4: "Yaw 180\xB0"
        5: "Yaw 225\xB0"
        6: "Yaw 270\xB0"
        7: "Yaw 315\xB0"
        24: "Pitch 90\xB0"
        25: "Pitch 270\xB0"
      default: 25
      reboot_required: true
      min: 0
      max: 25
