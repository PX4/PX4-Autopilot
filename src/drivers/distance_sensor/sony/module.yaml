module_name: Sony ASDT1 Rangefinder
serial_config:
    - command: sony_asdt1 start -d ${SERIAL_DEV}
      port_config_param:
        name: SENS_ASDT1_CFG
        group: Sensors

parameters:
    - group: Sensors
      definitions:
        SENS_ASDT1_MODE:
            description:
                short: Distance measurement range
                long: |
                    Sony AS-DT1 distance measurement range mode. This currently
                    controls the max_distance field published in obstacle_distance.
            type: enum
            values:
                0: 30MSTD
                1: 30M15F
                2: 30M30F
                3: 20M
                4: 40M
            min: 0
            max: 4
            default: 0
            reboot_required: true
