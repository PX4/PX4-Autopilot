module_name: PCA9685 Output
actuator_output:
  output_groups:
    - param_prefix: PCA9685
      channel_label: 'Channel'
      standard_params:
        disarmed: { min: 800, max: 2200, default: 1000 }
        min: { min: 800, max: 1400, default: 1100 }
        center: { min: 800, max: 2200}
        max: { min: 1600, max: 2200, default: 1900 }
        failsafe: { min: 800, max: 2200 }
      custom_params:
        - name: 'DUTY_EN'
          label: "Duty-Cycle\n Mode"
          index_offset: -1
          show_as: bitset
          advanced: true
      num_channels: 16

parameters:
  - group: Actuator Outputs
    definitions:
      PCA9685_EN_BUS:
        description:
          short: Enable the PCA9685 output driver
          long: Value is the I2C bus number.
        type: int32
        min: 0
        max: 10
        default: 0
      PCA9685_I2C_ADDR:
        description:
          short: I2C address of PCA9685
        type: int32
        min: 1
        max: 127
        default: 64
      PCA9685_SCHD_HZ:
        description:
          short: PWM update rate
          long: Higher rates use more I2C bandwidth, increasing output latency or blocking the bus.
        type: float
        decimal: 2
        min: 50.0
        max: 400.0
        default: 50.0
      PCA9685_PWM_FREQ:
        description:
          short: PWM cycle frequency
          long: |-
            Independent of update rate (PCA9685 outputs autonomously). Higher frequency gives more accurate pulse width, but may be unsupported by some ESCs/servos. Should match update rate in most cases. Must not exceed 400 Hz for standard 1000-2000us output; >400 Hz only useful in duty-cycle mode.
        type: float
        decimal: 2
        min: 23.8
        max: 1525.87
        default: 50.0
      PCA9685_DUTY_EN:
        description:
          short: Put the selected channels into Duty-Cycle output mode
          long: |-
            Without bit set: standard PWM. With bit set: duty-cycle at 12-bit resolution. For 0-100% output, set channel MIN=0, MAX=4096; same rule for other standard params.
        type: bitmask
        bit:
          0: Put CH1 to Duty-Cycle mode
          1: Put CH2 to Duty-Cycle mode
          2: Put CH3 to Duty-Cycle mode
          3: Put CH4 to Duty-Cycle mode
          4: Put CH5 to Duty-Cycle mode
          5: Put CH6 to Duty-Cycle mode
          6: Put CH7 to Duty-Cycle mode
          7: Put CH8 to Duty-Cycle mode
          8: Put CH9 to Duty-Cycle mode
          9: Put CH10 to Duty-Cycle mode
          10: Put CH11 to Duty-Cycle mode
          11: Put CH12 to Duty-Cycle mode
          12: Put CH13 to Duty-Cycle mode
          13: Put CH14 to Duty-Cycle mode
          14: Put CH15 to Duty-Cycle mode
          15: Put CH16 to Duty-Cycle mode
        default: 0
