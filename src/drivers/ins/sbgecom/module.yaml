module_name: sbgECom

serial_config:
    - command: sbgecom start -d ${SERIAL_DEV}
      port_config_param:
        name: SENS_SBG_CFG
        group: Sensors

parameters:
    - group: Sensors
      definitions:
        SBG_MODE:
            description:
                short: sbgECom driver mode
                long: INS mode requires EKF2_EN 0; enabling both causes vehicle instability.
            category: System
            type: enum
            values:
                0: Sensors Only (external IMU + mag)
                1: GNSS (sensors + external GNSS)
                2: INS, default (adds external Kalman filter)
            default: 2
        SBG_BAUDRATE:
            description:
                short: sbgECom driver baudrate
            category: System
            type: int32
            min: 9600
            max: 921600
            default: 921600
            reboot_required: true
        SBG_CONFIGURE_EN:
            description:
                short: sbgECom driver INS configuration enable
            category: System
            type: boolean
            default: 0
