module_name: VectorNav (VN-100, VN-200, VN-300)

serial_config:
    - command: vectornav start -d ${SERIAL_DEV}
      port_config_param:
        name: SENS_VN_CFG
        group: Sensors

parameters:
    - group: Sensors
      definitions:

        VN_PORT:
            description:
                short: VectorNav output port
            category: System
            type: enum
            values:
                1: Port 1
                2: Port 2
            default: 2
            reboot_required: true

        VN_MODE:
            description:
                short: VectorNav driver mode
            category: System
            type: enum
            values:
                0: Sensors Only (default)
                1: INS
            default: 0

        VN_IMU_RATE:
            description:
                short: VectorNav IMU output rate
                long: Base rate 800 Hz; parameter is the divisor (effective rate = 800 / value).
            category: System
            type: enum
            values:
                1: 800 Hz
                2: 400 Hz
                4: 200 Hz
                8: 100 Hz
            default: 1
            reboot_required: true
