module_name: MICROSTRAIN

serial_config:
    - command: sleep 1; microstrain start -d ${SERIAL_DEV}
      port_config_param:
        name: SENS_MS_CFG
        group: Sensors

parameters:
    - group: Sensors
      definitions:

        MS_MODE:
            description:
                short: MicroStrain device mode
                long: "Sensor mode: raw IMU to EKF2, INS data to external topics. INS mode: filter output to vehicle nav topics."
            type: enum
            values:
                0: Sensor Mode
                1: INS Mode
            reboot_required: true
            default: 0

        MS_IMU_RATE_HZ:
            description:
                short: MicroStrain IMU data rate
                long: "Valid rates: 0 or any factor of 1000."
            type: int32
            max: 1000
            min: 0
            reboot_required: true
            default: 500

        MS_MAG_RATE_HZ:
            description:
                short: MicroStrain magnetometer data rate
                long: "Valid rates: 0 or any factor of 1000."
            type: int32
            max: 1000
            min: 0
            reboot_required: true
            default: 50

        MS_BARO_RATE_HZ:
            description:
                short: MicroStrain barometer data rate
                long: "Valid rates: 0 or any factor of 1000."
            type: int32
            max: 1000
            min: 0
            reboot_required: true
            default: 50

        MS_FILT_RATE_HZ:
            description:
                short: MicroStrain EKF data rate
                long: "Valid rates: 0 or any factor of 1000."
            type: int32
            max: 1000
            min: 0
            reboot_required: true
            default: 250

        MS_GNSS_RATE_HZ:
            description:
                short: MicroStrain GNSS data rate
                long: "Applies to GNSS receivers 1 and 2. Valid rates: 0, 1 or 5."
            type: int32
            max: 5
            min: 0
            reboot_required: true
            default: 5

        MS_ALIGNMENT:
            description:
                short: MicroStrain heading alignment type
            type: bitmask
            bit:
                0: Dual-antenna GNSS
                1: GNSS kinematic (requires motion, e.g. a GNSS velocity)
                2: Magnetometer
                3: External Heading (first valid external heading will be used to initialize the filter)
            max: 15
            min: 1
            reboot_required: true
            default: 2

        MS_GNSS_AID_SRC:
            description:
                short: MicroStrain GNSS aiding source control
            type: enum
            values:
                1: All internal receivers
                2: External GNSS messages
                3: GNSS receiver 1 only
                4: GNSS receiver 2 only
            reboot_required: true
            default: 1

        MS_INT_MAG_EN:
            description:
                short: Enable MicroStrain internal magnetometer
            type: enum
            values:
                0: Disabled
                1: Enabled
            reboot_required: true
            default: 0

        MS_EXT_MAG_EN:
            description:
                short: Enable MicroStrain external magnetometer aiding
            type: enum
            values:
                0: Disabled
                1: Enabled
            reboot_required: true
            default: 0

        MS_INT_HEAD_EN:
            description:
                short: Enable MicroStrain internal heading aiding
                long: On CV7-GNSS/INS devices with dual antennas, uses dual-antenna heading as aiding.
            type: enum
            values:
                0: Disabled
                1: Enabled
            reboot_required: true
            default: 0

        MS_EXT_HEAD_EN:
            description:
                short: Enable MicroStrain external heading aiding
            type: enum
            values:
                0: Disabled
                1: Enabled
            reboot_required: true
            default: 0

        MS_OPT_FLOW_EN:
            description:
                short: Enable MicroStrain optical flow aiding
                long: Uses optical flow body frame velocity as an aiding measurement.
            type: enum
            values:
                0: Disabled
                1: Enabled
            reboot_required: true
            default: 0

        MS_SVT_EN:
            description:
                short: Enables Microstrain sensor to vehicle transform
                long: Configured via MS_SENSOR_ROLL, MS_SENSOR_PITCH, MS_SENSOR_YAW.
            type: enum
            values:
                0: Disabled
                1: Enabled
            reboot_required: true
            default: 0

        MS_ACCEL_RANGE:
            description:
                short: MicroStrain accelerometer range
                long: |-
                    -1: device default. Range codes vary by device; see the [User Manual](https://www.hbkworld.com/en/products/transducers/inertial-sensors#!ref_microstrain.com) for values.
            type: int32
            reboot_required: true
            default: -1

        MS_GYRO_RANGE:
            description:
                short: MicroStrain gyroscope range
                long: |-
                    -1: device default. Range codes vary by device; see the [User Manual](https://www.hbkworld.com/en/products/transducers/inertial-sensors#!ref_microstrain.com) for values.
            type: int32
            reboot_required: true
            default: -1

        MS_GNSS_OFF1_X:
            description:
                short: MicroStrain GNSS lever arm offset 1 (X)
                long: X-axis lever arm offset (m) for external GNSS receiver; antenna 1 in dual-antenna setups.
            type: float
            reboot_required: true
            default: 0.0

        MS_GNSS_OFF1_Y:
            description:
                short: MicroStrain GNSS lever arm offset 1 (Y)
                long: Y-axis lever arm offset (m) for external GNSS receiver; antenna 1 in dual-antenna setups.
            type: float
            reboot_required: true
            default: 0.0

        MS_GNSS_OFF1_Z:
            description:
                short: MicroStrain GNSS lever arm offset 1 (Z)
                long: Z-axis lever arm offset (m) for external GNSS receiver; antenna 1 in dual-antenna setups.
            type: float
            reboot_required: true
            default: 0.0

        MS_GNSS_OFF2_X:
            description:
                short: MicroStrain GNSS lever arm offset 2 (X)
                long: X-axis lever arm offset (m) for antenna 2; only used on dual-antenna devices.
            type: float
            reboot_required: true
            default: 0.0

        MS_GNSS_OFF2_Y:
            description:
                short: MicroStrain GNSS lever arm offset 2 (Y)
                long: Y-axis lever arm offset (m) for antenna 2; only used on dual-antenna devices.
            type: float
            reboot_required: true
            default: 0.0

        MS_GNSS_OFF2_Z:
            description:
                short: MicroStrain GNSS lever arm offset 2 (Z)
                long: Lever arm offset (m) in the X direction for antenna 2; only used on dual-antenna devices.
            type: float
            reboot_required: true
            default: 0.0

        MS_SENSOR_ROLL:
            description:
                short: MicroStrain Sensor to vehicle transform (Roll)
                long: Sensor-to-vehicle rotation around x-axis (rad). Requires MS_SVT_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_SENSOR_PTCH:
            description:
                short: MicroStrain Sensor to Vehicle Transform (Pitch)
                long: Sensor-to-vehicle rotation around y-axis (rad). Requires MS_SVT_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_SENSOR_YAW:
            description:
                short: MicroStrain Sensor to Vehicle Transform (Yaw)
                long: Sensor-to-vehicle rotation around z-axis (rad). Requires MS_SVT_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_EMAG_ROLL:
            description:
                short: MicroStrain External Magnetometer Orientation (Roll)
                long: Magnetometer orientation offset (rad) around x-axis. Requires MS_EXT_MAG_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_EMAG_PTCH:
            description:
                short: MicroStrain External Magnetometer Orientation (Pitch)
                long: Magnetometer orientation offset (rad) around y-axis. Requires MS_EXT_MAG_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_EMAG_YAW:
            description:
                short: MicroStrain External Magnetometer Orientation (Yaw)
                long: Magnetometer orientation offset (rad) around z-axis. Requires MS_EXT_MAG_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_OFLW_OFF_X:
            description:
                short: MicroStrain optical flow offset (X)
                long: X-axis optical flow sensor lever arm offset (m). Requires MS_OPT_FLOW_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_OFLW_OFF_Y:
            description:
                short: MicroStrain optical flow offset (Y)
                long: Y-axis optical flow sensor lever arm offset (m). Requires MS_OPT_FLOW_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_OFLW_OFF_Z:
            description:
                short: MicroStrain optical flow offset (Z)
                long: Z-axis optical flow sensor lever arm offset (m). Requires MS_OPT_FLOW_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_EHEAD_YAW:
            description:
                short: MicroStrain External Heading Orientation (Yaw)
                long: External heading sensor yaw offset (rad) around z-axis. Requires MS_EXT_HEAD_EN.
            type: float
            reboot_required: true
            default: 0.0

        MS_EMAG_UNCERT:
            description:
                short: MicroStrain external magnetometer uncertainty
                long: Constant 1-sigma uncertainty (Gauss) for all mag aiding axes. Requires MS_EXT_MAG_EN.
            type: float
            reboot_required: true
            default: 0.1

        MS_OFLW_UNCERT:
            description:
                short: MicroStrain optical flow uncertainty
                long: Constant 1-sigma uncertainty (m/s) for X/Y optical flow axes; Z unused. Requires MS_OPT_FLOW_EN.
            type: float
            reboot_required: true
            default: 0.1
