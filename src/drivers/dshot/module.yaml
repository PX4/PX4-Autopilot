module_name: DShot Driver
serial_config:
    - command: dshot telemetry -d ${SERIAL_DEV}
      port_config_param:
        name: DSHOT_TEL_CFG
        group: DShot

parameters:
    - group: DShot
      definitions:
        DSHOT_ESC_TYPE:
          description:
            short: ESC Type
            long: The ESC firmware type
          type: enum
          values:
            0: Unknown
            1: AM32
          default: 0
        DSHOT_MIN:
            description:
                short: Minimum DShot Motor Output
                long: ESC-dependent. Set high enough that motors spin while armed.
            type: float
            unit: norm
            min: 0
            max: 1
            decimal: 2
            increment: 0.01
            default: 0.055
        DSHOT_3D_ENABLE:
            description:
                short: Allows for 3d mode when using DShot and suitable mixer
                long: |-
                    WARNING: requires ESC in 3D mode and DSHOT_MIN=0.
                    Splits throttle: dir1 48-1047, dir2 1049-2047.
                    DShot 0 when mixer outputs 1000 or within the 3D deadband.
            type: boolean
            default: 0
        DSHOT_BIDIR_EDT:
            description:
                short: Enable Extended DShot Telemetry
                long: Additional telemetry interleaved with eRPM frames at low rate.
            type: boolean
            default: 0
            reboot_required: true
        DSHOT_3D_DEAD_H:
            description:
                short: DSHOT 3D deadband high
                long: |-
                    Motor stops when actuator_output in [DSHOT_3D_DEAD_L, DSHOT_3D_DEAD_H].
                    Equal values (default 1000) give a single-point deadband.
                    In mixer_module range (0-1999), not DShot values.
            type: int32
            min: 1000
            max: 1999
            default: 1000
        DSHOT_3D_DEAD_L:
            description:
                short: DSHOT 3D deadband low
                long: |-
                    Motor stops when actuator_output in [DSHOT_3D_DEAD_L, DSHOT_3D_DEAD_H].
                    Equal values (default 1000) give a single-point deadband.
                    In mixer_module range (0-1999), not DShot values.
            type: int32
            min: 0
            max: 1000
            default: 1000
        DSHOT_MOT_POL${i}:
            description:
                short: Number of magnetic poles of motor ${i}
                long: |-
                    Needed to compute RPM from eRPM telemetry.
                    Get from spec sheet or count bell magnets (not stator).
                    Typical 5-inch-prop motors: 14 poles.
            type: int32
            default: 14
            min: 2
            max: 400
            num_instances: 12
            instance_start: 1
