__max_num_config_instances: &max_num_config_instances 3

module_name: heater

parameters:
    - group: Sensors
      definitions:
        HEATER${i}_SENS_ID:
            description:
                short: Device ID of the temperature sensor read by heater ${i}
                long: |-
                    -1 disables. 0 auto-selects (only when HEATER_NUM == 1); multi-output boards require a valid DEVID per heater for 1:1 mapping.
            type: int32
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0, 0, 0]

        HEATER${i}_TEMP:
            description:
                short: Target temperature for heater ${i}
                long: |-
                    Recommended 40-60°C; must exceed max ambient temperature.
            type: float
            decimal: 3
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            unit: celcius
            min: 0
            max: 85.0
            default: [55.0, 55.0, 55.0]

        HEATER${i}_TEMP_FF:
            description:
                short: Heater ${i} controller feedforward value
                long: |-
                    Predicts baseline power to maintain temperature, reducing adjustment time.
            type: float
            unit: '%'
            min: 0
            max: 1.0
            decimal: 3
            reboot_required: false
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0.05, 0.05, 0.05]

        HEATER${i}_TEMP_I:
            description:
                short: Heater ${i} controller integrator gain value
                long: |-
                    Eliminates steady-state error to reach setpoint.
            type: float
            unit: us/C
            min: 0
            max: 1.0
            decimal: 3
            reboot_required: false
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0.025, 0.025, 0.025]

        HEATER${i}_TEMP_P:
            description:
                short: Heater ${i} controller proportional gain value
                long: |-
                    Determines controller response speed to temperature deviations.
            type: float
            unit: us/C
            min: 0
            max: 2.0
            decimal: 3
            reboot_required: false
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [1.0, 1.0, 1.0]

        HEATER${i}_IMAX:
            description:
                short: Heater controller ${i} integrator clamp
                long: |-
                    Limits integrator contribution to controller output.
            type: float
            min: 0.0
            max: 0.25
            decimal: 3
            reboot_required: false
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0.25, 0.25, 0.25]

        HEATER${i}_TEMP_SRC:
            description:
                short: Temperature source for heater ${i}
            type: int32
            values:
                0: Accel
                1: Hygrometer
            reboot_required: true
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0, 0, 0]

        HEATER${i}_NOM_V:
            description:
                short: Nominal supply voltage for heater ${i}
                long: |-
                    Limits PWM duty cycle when supply voltage exceeds this to prevent excess power dissipation. 0 disables.
            type: float
            unit: V
            min: 0
            max: 100.0
            decimal: 1
            reboot_required: false
            num_instances: *max_num_config_instances
            instance_start: 1
            default: [0.0, 0.0, 0.0]
