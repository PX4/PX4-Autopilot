module_name: Vertiq IO
serial_config:
    - command: vertiq_io start -d ${SERIAL_DEV}
      port_config_param:
        name: VERTIQ_IO_CFG
        group: Vertiq IO

actuator_output:
  output_groups:
    - param_prefix: VTQ_IO
      group_label: 'CVIs'
      channel_label: 'CVI'
      instance_start: 0
      standard_params:
        disarmed: { min: 0, max: 65535, default: 0 }
        min: { min: 0, max: 65535, default: 0 }
        max: { min: 0, max: 65535, default: 65535 }
        failsafe: { min: 0, max: 500 }
      num_channels: 16

parameters:
    - group: Vertiq IO
      definitions:
        VTQ_BAUD:
            description:
                short: IQUART serial baud rate
            type: int32
            reboot_required: true
            default: 115200
        VTQ_NUM_CVS:
            description:
              short: Number of IFCI CVs in use
            type: int32
            min: 0
            max: 16
            reboot_required: true
            default: 0
        VTQ_DISARM_TRIG:
            description:
                short: Motor behavior on PX4 disarm
            type: enum
            values:
                0: Send Explicit Disarm
                1: Coast Motors
                2: Set Predefined Velocity Setpoint
            default: 0
        VTQ_DISARM_VELO:
            description:
                short: Velocity sent when DISARM_TRIGGER is Set Predefined Velocity Setpoint
            type: int32
            min: 0
            max: 100
            default: 0
        VTQ_ARM_BEHAVE:
            description:
                short: Motor behavior on PX4 arm
            type: enum
            values:
                0: Use Motor Arm Behavior
                1: Send Explicit Arm Command
            default: 0
        VTQ_TRGT_MOD_ID:
            description:
                short: Target module ID for config communication
                long: |-
                    Target for all config (not operational) get/set requests from PX4.
                    Clients with dynamic object IDs should use this value.
            type: int32
            default: 0
        VTQ_REDO_READ:
            description:
                short: Reinitialize the target module's values into the PX4 parameters
                long: Reinitializes PX4 IQUART params from the target motor. Useful if FC powered on before modules.
            type: boolean
            default: 0
        VTQ_THROTTLE_CVI:
            description:
                short: Module Throttle Control Value Index
            type: int32
            min: 0
            max: 255
            default: 0
        VTQ_CONTROL_MODE:
            description:
                short: Module control mechanism
            type: enum
            values:
                0: PWM (battery-voltage fraction; least safe)
                1: Voltage (constant; set VTQ_MAX_VOLTS)
                2: Velocity (closed-loop; set VTQ_MAX_VELOCITY; know propeller)
            default: 0
        VTQ_MAX_VELOCITY:
            description:
                short: Max velocity in Velocity mode
                long: Velocity commanded at full throttle.
            type: float
            default: 0
        VTQ_MAX_VOLTS:
            description:
                short: Max voltage in Voltage mode
                long: Voltage commanded at full throttle.
            type: float
            default: 0
        VTQ_MOTOR_DIR:
            description:
                short: Module spin direction
                long: Spinning direction and flight mode (2D non-reversible vs. 3D reversible).
            type: enum
            values:
                0: Unconfigured
                1: 3D Counter Clockwise
                2: 3D Clockwise
                3: 2D Counter Clockwise
                4: 2D Clockwise
            default: 0
        VTQ_FC_DIR:
            description:
                short: FC 2D or 3D communication mode
                long: FC and ESC must agree on signal polarity; 3D mode remaps negative signals.
            type: enum
            values:
                0: 2D
                1: 3D
            default: 0
        VTQ_ZERO_ANGLE:
            description:
                short: Encoder zero-phase angle
                long: Adjust to change the 0-phase position during pulsing.
            type: float
            default: 0
        VTQ_VELO_CUTOFF:
            description:
                short: Minimum velocity for pulsing
                long: Pulsing disabled within ±VTQ_VELO_CUTOFF.
            type: float
            default: 0
        VTQ_TQUE_OFF_ANG:
            description:
                short: Pulse angle offset for mechanical properties
                long: Offsets the pulse start position around the motor.
            type: float
            default: 0
        VTQ_PULSE_V_MODE:
            description:
                short: Pulsing voltage mode
            type: enum
            values:
                0: Supply Voltage Mode
                1: Voltage Limit Mode (max = VTQ_PULSE_V_LIM)
            default: 0
        VTQ_PULSE_V_LIM:
            description:
                short: Max pulsing voltage (Voltage Limit Mode)
            type: float
            default: 0
        VTQ_X_CVI:
            description:
                short: CVI for X coordinate
            type: int32
            min: 0
            max: 255
            default: 0
        VTQ_Y_CVI:
            description:
                short: CVI for Y coordinate
            type: int32
            min: 0
            max: 255
            default: 0
        VTQ_TELEM_IDS_1:
            description:
                short: Module IDs [0-31] for telemetry requests
                long: Data received is published via esc_status.
            type: bitmask
            bit:
                0: Module ID 0
                1: Module ID 1
                2: Module ID 2
                3: Module ID 3
                4: Module ID 4
                5: Module ID 5
                6: Module ID 6
                7: Module ID 7
                8: Module ID 8
                9: Module ID 9
                10: Module ID 10
                11: Module ID 11
                12: Module ID 12
                13: Module ID 13
                14: Module ID 14
                15: Module ID 15
                16: Module ID 16
