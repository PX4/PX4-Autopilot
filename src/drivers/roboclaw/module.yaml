module_name: Roboclaw Driver
serial_config:
  - command: roboclaw start ${SERIAL_DEV} ${BAUD_PARAM}
    port_config_param:
      name: RBCLW_SER_CFG
      group: Roboclaw

actuator_output:
  output_groups:
    - param_prefix: RBCLW
      channel_label: 'Channel'
      standard_params:
        disarmed: { min: 127, max: 127, default: 127 }
        min: { min: 0, max: 127, default: 0 }
        max: { min: 127, max: 254, default: 254 }
        failsafe: { min: 0, max: 257 }
      num_channels: 2

parameters:
  - group: Roboclaw Driver
    definitions:
      RBCLW_COUNTS_REV:
        description:
          short: Number of encoder counts for one wheel revolution
          long: 1200 is the Aion R1 default.
        type: int32
        default: 1200
        min: 1
      RBCLW_ADDRESS:
        description:
          short: Address of the ESC on the bus
          long: Must match the address configured on the ESC (0x80-0x87).
        type: enum
        default: 128
        min: 128
        max: 135
        values:
          128: '0x80'
          129: '0x81'
          130: '0x82'
          131: '0x83'
          132: '0x84'
          133: '0x85'
          134: '0x86'
          135: '0x87'
