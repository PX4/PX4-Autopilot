module_name: uavcan
parameters:
- group: UAVCAN
  definitions:
    UAVCAN_ENABLE:
      description:
        short: UAVCAN mode
      type: enum
      values:
        0: Disabled
        1: Sensors Manual Config
        2: Sensors Automatic Config
        3: Sensors and Actuators (ESCs) Automatic Config
      default: 0
      min: 0
      max: 3
      reboot_required: true
    UAVCAN_NODE_ID:
      description:
        short: UAVCAN Node ID
        long: Read the specs at https://dronecan.github.io/ to learn more about Node ID.
      type: int32
      default: 1
      min: 1
      max: 125
      reboot_required: true
    UAVCAN_TRACE_EN:
      description:
        short: UAVCAN event tracing
      type: boolean
      default: 1
      reboot_required: true
    UAVCAN_BITRATE:
      description:
        short: UAVCAN CAN bus bitrate
      type: int32
      default: 1000000
      unit: bit/s
      min: 20000
      max: 1000000
      reboot_required: true
    UAVCAN_RNG_MIN:
      description:
        short: UAVCAN rangefinder minimum range
      type: float
      default: 0.0
      unit: m
    UAVCAN_RNG_MAX:
      description:
        short: UAVCAN rangefinder maximum range
      type: float
      default: 999.0
      unit: m
    UAVCAN_ECU_MAXF:
      description:
        short: UAVCAN fuel tank maximum capacity
      type: float
      default: 15.0
      min: 0.0
      max: 100000.0
      unit: liters
      decimal: 1
      increment: 0.1
      reboot_required: true
    UAVCAN_ECU_FUELT:
      description:
        short: UAVCAN fuel tank fuel type
      type: enum
      values:
        0: Unknown
        1: Liquid
        2: Gas
      default: 1
      min: 0
      max: 2
      reboot_required: true
    UAVCAN_LGT_MODE:
      description:
        short: UAVCAN Navigation light operating mode
        long: |-
          Minimum condition for navigation lights (anti-collision, colored nav, hybrid) to activate.

          Hybrid lights show status colors when inactive and switch to navigation lights when active.
      type: enum
      values:
        0: Always off
        1: When autopilot is armed
        2: When autopilot is prearmed
        3: Always on
      default: 1
      min: 0
      max: 3
      reboot_required: true
    UAVCAN_PUB_ARM:
      description:
        short: publish Arming Status stream
        long: uavcan::equipment::safety::ArmingStatus
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_PUB_RTCM:
      description:
        short: publish RTCM stream
        long: uavcan::equipment::gnss::RTCMStream
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_PUB_MBD:
      description:
        short: publish moving baseline data RTCM stream
        long: ardupilot::gnss::MovingBaselineData
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_ASPD:
      description:
        short: subscription airspeed
        long: |-
          uavcan::equipment::air_data::IndicatedAirspeed
          uavcan::equipment::air_data::TrueAirspeed
          uavcan::equipment::air_data::StaticTemperature
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_BARO:
      description:
        short: subscription barometer
        long: |-
          uavcan::equipment::air_data::StaticPressure
          uavcan::equipment::air_data::StaticTemperature
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_BAT:
      description:
        short: subscription battery
        long: |-
          uavcan::equipment::power::BatteryInfo
          ardupilot::equipment::power::BatteryInfoAux
          cuav::equipment::power::CBAT
      type: enum
      values:
        0: Disable
        1: Raw data (smart battery recommended)
        2: Filter data (CBAT unsupported)
      default: 0
      min: 0
      max: 2
      reboot_required: true
    UAVCAN_SUB_DPRES:
      description:
        short: subscription differential pressure
        long: uavcan::equipment::air_data::RawAirData
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_FLOW:
      description:
        short: subscription flow
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_FUEL:
      description:
        short: subscription fuel tank
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_GPS:
      description:
        short: subscription GPS
        long: |-
          uavcan::equipment::gnss::Fix
          uavcan::equipment::gnss::Fix2
          uavcan::equipment::gnss::Auxiliary
      type: boolean
      default: 1
      reboot_required: true
    UAVCAN_SUB_GPS_R:
      description:
        short: subscription GPS Relative
        long: ardupilot::gnss::RelPosHeading
      type: boolean
      default: 1
      reboot_required: true
    UAVCAN_SUB_HYGRO:
      description:
        short: subscription hygrometer
        long: dronecan::sensors::hygrometer::Hygrometer
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_ICE:
      description:
        short: subscription ICE
        long: uavcan::equipment::ice::reciprocating::Status
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_IMU:
      description:
        short: subscription IMU
        long: uavcan::equipment::ahrs::RawIMU
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_MAG:
      description:
        short: subscription magnetometer
        long: |-
          uavcan::equipment::ahrs::MagneticFieldStrength
          uavcan::equipment::ahrs::MagneticFieldStrength2
      type: boolean
      default: 1
      reboot_required: true
    UAVCAN_SUB_RNG:
      description:
        short: subscription range finder
        long: uavcan::equipment::range_sensor::Measurement
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_BTN:
      description:
        short: subscription button
        long: ardupilot::indication::Button
      type: boolean
      default: 0
      reboot_required: true
    UAVCAN_SUB_MBD:
      description:
        short: subscription MovingBaselineData
        long: ardupilot::gnss::MovingBaselineData
      type: boolean
      default: 0
      reboot_required: true
