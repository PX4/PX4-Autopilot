module_name: ina231
parameters:
- group: Sensors
  definitions:
    SENS_EN_INA231:
      description:
        short: Enable INA231 Power Monitor
        long: For systems with an INA231 Power Monitor, this should be set to true
      type: boolean
      default: 0
      reboot_required: true
    INA231_CONFIG:
      description:
        short: INA231 Power Monitor Config
      type: int32
      default: 1319
      min: 0
      max: 65535
      decimal: 1
      increment: 1
      reboot_required: true
    INA231_CURRENT:
      description:
        short: INA231 Power Monitor Max Current
      type: float
      default: 90.0
      min: 0.1
      max: 200.0
      decimal: 2
      increment: 0.1
      reboot_required: true
    INA231_SHUNT:
      description:
        short: INA231 Power Monitor Shunt
      type: float
      default: 0.00063
      min: 1.0e-09
      max: 0.1
      decimal: 10
      increment: 1.0e-09
      reboot_required: true
