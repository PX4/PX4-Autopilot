module_name: ina226
parameters:
- group: Sensors
  definitions:
    SENS_EN_INA226:
      description:
        short: Enable INA226 Power Monitor
        long: For systems a INA226 Power Monitor, this should be set to true
      type: boolean
      default: 0
      reboot_required: true
    INA226_CONFIG:
      description:
        short: INA226 Power Monitor Config
      type: int32
      default: 18139
      min: 0
      max: 65535
      decimal: 1
      increment: 1
      reboot_required: true
    INA226_CURRENT:
      description:
        short: INA226 Power Monitor Max Current
      type: float
      default: 164.0
      min: 0.1
      max: 200.0
      decimal: 2
      increment: 0.1
      reboot_required: true
    INA226_SHUNT:
      description:
        short: INA226 Power Monitor Shunt
      type: float
      default: 0.0005
      min: 1.0e-09
      max: 0.1
      decimal: 10
      increment: 1.0e-09
      reboot_required: true
