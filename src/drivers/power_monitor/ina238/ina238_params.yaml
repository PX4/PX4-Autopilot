module_name: ina238
parameters:
- group: Sensors
  definitions:
    SENS_EN_INA238:
      description:
        short: Enable INA238 Power Monitor
        long: For systems with an INA238 Power Monitor, this should be set to true
      type: boolean
      default: 0
      reboot_required: true
    INA238_CURRENT:
      description:
        short: INA238 Power Monitor Max Current
      type: float
      default: 327.68
      min: 0.1
      max: 327.68
      decimal: 2
      increment: 0.1
      reboot_required: true
    INA238_SHUNT:
      description:
        short: INA238 Power Monitor Shunt
      type: float
      default: 0.0005
      min: 1.0e-09
      max: 0.1
      decimal: 10
      increment: 1.0e-09
      reboot_required: true
