module_name: ina228
parameters:
- group: Sensors
  definitions:
    SENS_EN_INA228:
      description:
        short: Enable INA228 Power Monitor
        long: For systems with an INA228 Power Monitor, this should be set to true
      type: boolean
      default: 0
      reboot_required: true
    INA228_CONFIG:
      description:
        short: INA228 Power Monitor Config
      type: int32
      default: 63779
      min: 0
      max: 65535
      decimal: 1
      increment: 1
      reboot_required: true
    INA228_CURRENT:
      description:
        short: INA228 Power Monitor Max Current
      type: float
      default: 327.68
      min: 0.1
      max: 327.68
      decimal: 2
      increment: 0.1
      reboot_required: true
    INA228_SHUNT:
      description:
        short: INA228 Power Monitor Shunt
      type: float
      default: 0.0005
      min: 1.0e-09
      max: 0.1
      decimal: 10
      increment: 1.0e-09
      reboot_required: true
