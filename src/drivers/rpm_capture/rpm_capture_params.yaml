module_name: rpm_capture
parameters:
- group: System
  definitions:
    RPM_CAP_ENABLE:
      description:
        short: RPM capture enable
        long: Estimates RPM from pulses on a PWM pin configured as "RPM Input".
      type: boolean
      default: 0
      reboot_required: true
    RPM_PULS_PER_REV:
      description:
        short: Voltage pulses per revolution
      type: int32
      default: 1
      min: 1
      max: 50
      reboot_required: true
