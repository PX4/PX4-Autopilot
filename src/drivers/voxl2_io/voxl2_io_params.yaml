module_name: voxl2_io
parameters:
- group: VOXL2 IO
  definitions:
    VOXL2_IO_BAUD:
      description:
        short: VOXL2_IO UART baud rate
        long: UART link to VOXL2_IO board.
      type: int32
      default: 921600
      unit: bit/s
    VOXL2_IO_DIS:
      description:
        short: VOXL2_IO Disabled PWM
        long: PWM pulse width for disabled state.
      type: int32
      default: 1000
      min: 0
      max: 2000
      unit: us
    VOXL2_IO_MIN:
      description:
        short: VOXL2_IO Min PWM
        long: Minimum PWM pulse width.
      type: int32
      default: 1100
      min: 0
      max: 2000
      unit: us
    VOXL2_IO_MAX:
      description:
        short: VOXL2_IO Max PWM
        long: Maximum PWM pulse width.
      type: int32
      default: 2000
      min: 0
      max: 2000
      unit: us
    VOXL2_IO_CMIN:
      description:
        short: VOXL2_IO Calibration Min PWM
        long: Minimum PWM pulse width for calibration.
      type: int32
      default: 1050
      min: 0
      max: 2000
      unit: us
    VOXL2_IO_CMAX:
      description:
        short: VOXL2_IO Calibration Max PWM
        long: Maximum PWM pulse width for calibration.
      type: int32
      default: 2000
      min: 0
      max: 2000
      unit: us
