module_name: iridiumsbd
parameters:
- group: Iridium SBD
  definitions:
    ISBD_READ_INT:
      description:
        short: Iridium SBD read interval
        long: Nonzero only if data is not sent via ring call.
      type: int32
      default: 0
      unit: s
      min: 0
      max: 5000
    ISBD_SBD_TIMEOUT:
      description:
        short: Iridium SBD session timeout
      type: int32
      default: 60
      unit: s
      min: 0
      max: 300
    ISBD_STACK_TIME:
      description:
        short: Iridium SBD message stacking wait time
        long: 0 disables stacking.
      type: int32
      default: 0
      unit: ms
      min: 0
      max: 500
