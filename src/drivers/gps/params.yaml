module_name: gps
parameters:
- group: GPS
  definitions:
    GPS_DUMP_COMM:
      description:
        short: Log GPS communication data
        long: |-
          1: publish all GPS comms via uORB, logged as gps_dump.
          2: main GPS outputs RTCM, logged as gps_dump for PPK.
      type: enum
      values:
        0: Disable
        1: Full communication
        2: RTCM output (PPK)
      default: 0
      min: 0
      max: 2
    GPS_UBX_DYNMODEL:
      description:
        short: u-blox GPS dynamic platform model
        long: Tunes the navigation engine for the expected motion environment.
      type: enum
      values:
        2: stationary
        4: automotive
        6: airborne with <1g acceleration
        7: airborne with <2g acceleration
        8: airborne with <4g acceleration
      default: 7
      min: 0
      max: 9
      reboot_required: true
    GPS_UBX_DGNSS_TO:
      description:
        short: u-blox GPS DGNSS timeout
        long: "0: use u-blox default."
      type: int32
      default: 0
      min: 0
      max: 255
      unit: s
      reboot_required: true
    GPS_UBX_MIN_CNO:
      description:
        short: u-blox GPS minimum satellite signal level for navigation
        long: "0: use u-blox default."
      type: int32
      default: 0
      min: 0
      max: 255
      unit: dBHz
      reboot_required: true
    GPS_UBX_MIN_ELEV:
      description:
        short: u-blox GPS minimum satellite elevation angle
        long: "0: use u-blox default."
      type: int32
      default: 0
      min: 0
      max: 127
      unit: deg
      reboot_required: true
    GPS_UBX_RATE:
      description:
        short: u-blox GPS output rate
        long: |-
          Output rate of u-blox receivers (protocol v27+).
          0 = auto-select by model: M9N 8Hz, F9P 5Hz, others 10Hz.

          Higher rates cut satellite count (>8Hz limits M9N to 16 SVs).
          Max varies by model/RTK: F9P L1L2 5-7Hz, L1L5 7-8Hz, X20 25Hz.
          High rates at 115200 baud may drop out.
      type: int32
      default: 0
      min: 0
      max: 25
      unit: Hz
      reboot_required: true
    GPS_SAT_INFO:
      description:
        short: Enable sat info (if available)
        long: Publish the satellite_info uORB topic where supported (not on MTK).
      type: boolean
      default: 0
      reboot_required: true
    GPS_UBX_MODE:
      description:
        short: u-blox GPS Mode
        long: |-
          Select the u-blox configuration. Most setups (incl. RTK and dual-GPS without heading) use Default.

          Heading/moving-base modes (1-4) need two F9P units. Modes 3,4 need only UART1 to the autopilot/CAN node plus UART RX DMA, RTK still possible. Mode 5: rover with static base corrections on UART2. Mode 6: GCS (not necessarily an RTK base).
      type: enum
      values:
        0: Default
        1: Heading (Rover With Moving Base UART1 Connected To Autopilot, UART2 Connected
          To Moving Base)
        2: Moving Base (UART1 Connected To Autopilot, UART2 Connected To Rover)
        3: Heading (Rover With Moving Base UART1 Connected to Autopilot Or Can Node
          At 921600)
        4: Moving Base (Moving Base UART1 Connected to Autopilot Or Can Node At 921600)
        5: Rover with Static Base on UART2 (similar to Default, except coming in on
          UART2)
        6: Ground Control Station (UART2 outputs NMEA)
      default: 0
      min: 0
      max: 6
      reboot_required: true
    GPS_UBX_BAUD2:
      description:
        short: u-blox F9P UART2 Baudrate
        long: |-
          In GPS_UBX_MODE 1-3, UART2 carries RTCM corrections.
          Set to 57600 to attach a telemetry radio on UART2.
      type: int32
      default: 230400
      min: 0
      unit: B/s
      reboot_required: true
    GPS_UBX_CFG_INTF:
      description:
        short: u-blox protocol configuration for interfaces
      type: bitmask
      bit:
        0: Enable I2C input protocol UBX
        1: Enable I2C input protocol NMEA
        2: Enable I2C input protocol RTCM3X
        3: Enable I2C output protocol UBX
        4: Enable I2C output protocol NMEA
        5: Enable I2C output protocol RTCM3X
      default: 0
      min: 0
      max: 32
      reboot_required: true
    GPS_UBX_PPK:
      description:
        short: Enable MSM7 message output for PPK workflow
      type: boolean
      default: 0
      reboot_required: true
    GPS_UBX_JAM_DET:
      description:
        short: u-blox GPS jamming detection high sensitivity mode
        long: |-
          High-sensitivity u-blox jamming detection (CFG-SEC-JAMDET_SENSITIVITY_HI).
          Disable to reduce false positives in electrically noisy environments.
      type: boolean
      default: 1
      reboot_required: true
    GPS_CFG_WIPE:
      description:
        short: Wipes the flash config of UBX modules
        long: |-
          UBX modules can store persistent config in FLASH that is loaded on boot.
          PX4 overrides needed values in RAM, but other FLASH settings can still cause
          in-flight problems; wiping on boot avoids this. UBX only.
      type: boolean
      default: 0
      reboot_required: true
    GPS_YAW_OFFSET:
      description:
        short: Heading/Yaw offset for dual antenna GPS
        long: |-
          Heading offset for dual-antenna setups that support heading estimation.
          Angle increases clockwise.

          0: antennas parallel to the forward direction, rover (or Unicore primary) antenna in front.
          90: rover (or Unicore primary, or Septentrio Mosaic Aux) antenna on the right, moving base on the left.

          (Unicore primary = the one connected on the right, seen from the top.)
      type: float
      default: 0.0
      min: 0
      max: 360
      unit: deg
      reboot_required: true
      decimal: 3
    GPS_1_PROTOCOL:
      description:
        short: Protocol for Main GPS
        long: Serial GPS protocol. Auto-detect probes all protocols and is slower.
      type: enum
      values:
        0: Auto detect
        1: u-blox
        2: MTK
        3: Ashtech / Trimble
        4: Emlid Reach
        5: Femtomes
        6: NMEA (generic)
      default: 1
      min: 0
      max: 7
      reboot_required: true
    GPS_2_PROTOCOL:
      description:
        short: Protocol for Secondary GPS
        long: Serial GPS protocol. Auto-detect probes all protocols and is slower.
      type: enum
      values:
        0: Auto detect
        1: u-blox
        2: MTK
        3: Ashtech / Trimble
        4: Emlid Reach
        5: Femtomes
        6: NMEA (generic)
      default: 1
      min: 0
      max: 6
      reboot_required: true
    GPS_1_GNSS:
      description:
        short: GNSS systems for primary GPS (bitmask)
        long: |-
          Set of GNSS systems the receiver uses; check the receiver's docs for how
          many can run in parallel. Currently u-blox only. No bits set = receiver default.
      type: bitmask
      bit:
        0: GPS (with QZSS)
        1: SBAS (GPS augmentation)
        2: Galileo
        3: BeiDou
        4: GLONASS
        5: NAVIC
      default: 0
      min: 0
      max: 63
      reboot_required: true
    GPS_2_GNSS:
      description:
        short: GNSS systems for secondary GPS (bitmask)
        long: |-
          Set of GNSS systems the receiver uses; check the receiver's docs for how
          many can run in parallel. Currently u-blox only. No bits set = receiver default.
      type: bitmask
      bit:
        0: GPS (with QZSS)
        1: SBAS (GPS augmentation)
        2: Galileo
        3: BeiDou
        4: GLONASS
        5: NAVIC
      default: 0
      min: 0
      max: 63
      reboot_required: true
