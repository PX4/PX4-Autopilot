module_name: pps_capture
parameters:
- group: GPS
  definitions:
    PPS_CAP_ENABLE:
      description:
        short: PPS capture enable
        long: Refines GPS time using pulses on a PWM pin configured as 'PPS Input'.
      type: boolean
      default: 0
      reboot_required: true
    PPS_CAP_GPS_ID:
      description:
        short: PPS capture GPS receiver device ID
        long: 0 uses first available GPS. Device ID from sensor_gps publication (e.g. listener sensor_gps).
      type: int32
      default: 0
      min: 0
      reboot_required: true
