[workspace]
name = "PX4-Autopilot"
authors = ["Jacob Oursland <jacob.oursland@gmail.com>"]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64", "win-64"]
version = "v1.17.0-alpha1-dev"

# Minimum dependencies to build PX4 and contribute to the codebase.
# This is the set installed for CI on every supported host platform.
[dependencies]
# Build toolchain
ccache = ">=4.13.4,<5"
cmake = ">=4.3.2,<5"
compilers = ">=1.11.0,<2"
make = ">=4.4.1,<5"
ninja = ">=1.13.2,<2"
pkg-config = ">=0.29.2,<0.30"
pkgconfig = ">=1.6.0,<2"

# VCS available on every supported host
curl = ">=8.20.0,<9"
git = "2.53.*"

# Unix shell utilities used by build/release helper scripts. These conda-forge
# packages aren't published for win-64; on Windows the equivalents come from
# Git for Windows or system tooling.
[target.unix.dependencies]
gnupg = ">=2.5.19,<2.6"
rsync = ">=3.4.1,<4"
unzip = ">=6.0,<7"
wget = ">=1.25.0,<2"
zip = ">=3.0,<4"

# Native build-time libraries
gettext = ">=0.25.1,<0.26"
libexpat = ">=2.7.5,<3"

# Python and Python build dependencies
argcomplete = ">=3.6.3,<4"
cerberus = ">=1.3.5,<2"
empy = ">=3.3.4,<4"
jinja2 = ">=3.1.6,<4"
jsonschema = ">=4.26.0,<5"
lxml = ">=6.1.0,<7"
numpy = ">=2.3.0,<3"
packaging = ">=26.2,<27"
pip = ">=26.0.1,<27"
psutil = ">=7.2.2,<8"
pynacl = ">=1.6.2,<2"
python = ">=3.12.11,<3.13"
pyulog = ">=0.7.0,<0.8"
pyyaml = ">=6.0.3,<7"
requests = ">=2.33.1,<3"
# Pinned <81: setuptools 81 dropped the bundled `pkg_resources` module,
# which the vendored DroneCAN dsdl compiler shim
# (src/drivers/uavcan/libdronecan/.../pydronecan/dronecan/__init__.py)
# imports unconditionally during NuttX firmware builds.
setuptools = ">=80.9.0,<81"
six = ">=1.17.0,<2"
toml = ">=0.10.2,<0.11"
wheel = ">=0.47.0,<0.48"

[pypi-dependencies]
kconfiglib = ">=14.1.0, <15"
nunavut = ">=2.3.1, <3"
pyros-genmsg = ">=0.5.8, <0.6"

# ============================================================================
# Features
# ============================================================================

# Static analysis and Python style checks
[feature.lint.dependencies]
cppcheck = ">=2.20.1,<3"
flake8 = ">=7.3.0,<8"
flake8-blind-except = ">=0.2.1,<0.3"
flake8-builtins = ">=3.0.0,<4"
flake8-class-newline = ">=1.6.0,<2"
flake8-comprehensions = ">=3.17.0,<4"
flake8-deprecated = ">=2.3.0,<3"
flake8-docstrings = ">=1.7.0,<2"
flake8-import-order = ">=0.19.2,<0.20"
flake8-quotes = ">=3.4.0,<4"

# pytest plugins used by the integration test suites
[feature.test.dependencies]
pytest-repeat = ">=0.9.4,<0.10"
pytest-rerunfailures = ">=16.0,<17"

# Code coverage tooling. lcov is only packaged for Unix-like platforms.
[feature.coverage]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[feature.coverage.dependencies]
coverage = ">=7.13.5,<8"
lcov = ">=1.16,<2"

# Documentation generators (Doxygen + Graphviz). texinfo is Unix-only.
[feature.docs]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[feature.docs.dependencies]
doxygen = ">=1.13.2,<2"
graphviz = ">=14.1.2,<15"
texinfo = ">=7.2,<8"

# Native libraries and Python helpers used by the SITL/Gazebo flow
[feature.sim]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[feature.sim.dependencies]
asio = ">=1.36.0,<2"
geographiclib-cpp = ">=2.7,<3"
libboost = ">=1.88.0,<1.89"
libusb = ">=1.0.29,<2"
matplotlib = ">=3.10.9,<4"

# NuttX cross toolchain (arm-none-eabi-gcc). conda-forge does not publish
# this compiler, so the activation hook downloads the official ARM GNU
# release from developer.arm.com into `.toolchains/` and prepends it to
# PATH. Idempotent across activations.
[feature.nuttx]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[feature.nuttx.activation]
scripts = ["Tools/setup/nuttx-activate.sh"]

[feature.nuttx.tasks]
install-arm-gcc = "Tools/setup/install-arm-gcc.sh 13.3.rel1"

# jMAVSim (Java-based simulator)
[feature.jmavsim]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[feature.jmavsim.dependencies]
ant = ">=1.10.16,<2"

# ROS 2 Kilted integration. Pulled from the RoboStack channel.
# Restricted to linux-aarch64 and osx-arm64: RoboStack's current linux-64
# packages reference ros2-distro-mutex 0.10.* (not yet published), which
# breaks the rmw-zenoh + gz-sim-vendor combination we depend on.
[feature.ros2]
channels = ["https://prefix.dev/robostack-kilted"]
platforms = ["linux-aarch64", "osx-arm64"]

[feature.ros2.dependencies]
colcon-common-extensions = ">=0.3.0,<0.4"
rosdep = ">=0.25.1,<0.26"
# Pin the ros2 distro-mutex line so the resolver picks RoboStack builds
# whose protobuf ABI is mutually compatible (rmw-zenoh + gz-sim-vendor).
ros2-distro-mutex = "0.14.*"
ros-kilted-desktop = ">=0.12.0,<0.13"
ros-kilted-diagnostics = ">=4.3.6,<5"
ros-kilted-eigen-stl-containers = ">=1.1.0,<2"
ros-kilted-eigen3-cmake-module = ">=0.4.0,<0.5"
ros-kilted-geographic-msgs = ">=1.0.6,<2"
ros-kilted-gz-sim-vendor = ">=0.2.3,<0.3"
ros-kilted-image-transport-plugins = ">=5.1.1,<6"
ros-kilted-rmw-zenoh-cpp = ">=0.6.6,<0.7"
ros-kilted-ros-gz = ">=2.1.15,<3"
ros-kilted-tf2-geometry-msgs = ">=0.41.6,<0.42"

# ============================================================================
# Environments
# ============================================================================

[environments]
default = { features = ["lint", "test", "coverage", "docs", "nuttx"], solve-group = "default" }
ci = { features = ["lint", "test", "coverage", "docs", "nuttx"], solve-group = "default" }
sim = { features = ["lint", "test", "sim", "jmavsim"], solve-group = "default" }
ros2 = { features = ["lint", "test", "sim", "ros2"], solve-group = "ros2" }
full = { features = ["lint", "test", "coverage", "docs", "sim", "jmavsim", "ros2", "nuttx"], solve-group = "ros2" }

# ============================================================================
# Tasks
# ============================================================================
#
# All tasks are thin wrappers around PX4's Makefile so behaviour stays
# identical to a bare `make` invocation. The value of expressing them here
# is discoverability (`pixi task list`) and the `precommit` / `pr-check`
# aggregates that mirror what CI gates on.

[tasks]
# Build a PX4 target. Pass the target as an argument, e.g.
#   pixi run build px4_sitl_default
#   pixi run -e ci build ark_fpv     (NuttX targets need an env with `nuttx`)
build = { cmd = "Tools/setup/pixi-build.sh", description = "Build a PX4 target (pass target name as argument)" }

# Formatting (CI gates on `check-format` and `check-newlines`)
format = { cmd = "make format", description = "Apply astyle to all C/C++ sources" }
format-changed = { cmd = "make format_changed", description = "astyle only files changed on the current branch" }
check-format = { cmd = "make check_format", description = "Verify astyle formatting (CI gate)" }
check-newlines = { cmd = "make check_newlines", description = "Verify trailing-newline consistency (CI gate)" }

# Static / config checks that CI's Gate Checks matrix runs
validate-configs = { cmd = "make validate_module_configs", description = "Validate module config schemas (CI gate)" }
shellcheck = { cmd = "make shellcheck_all", description = "shellcheck on shell scripts (CI gate)" }
module-docs = { cmd = "make module_documentation", description = "Regenerate module docs; CI verifies output is clean (CI gate)" }
metadata = { cmd = "make px4_metadata", description = "Regenerate parameter/airframe/module metadata (run when you change PARAM_DEFINE_*)" }

# Unit tests (gtest; builds px4_sitl_default as part of the run).
# FUZZTEST_FUZZING_MODE=OFF disables ASAN + sanitize-coverage instrumentation
# that PX4's CMakeLists.txt enables for any Clang build. The instrumented
# binaries hang at startup on macOS Tahoe arm64 with conda-forge clang ≤21
# (an LLVM ASAN-runtime bug fixed in clang 22, but the conda-forge ecosystem
# has not yet rebuilt downstream packages against libxml2 2.14 / pcre2 10.47
# that clang 22 pulls in). Plain gtest unit tests don't need fuzzing
# instrumentation; opt in for fuzz runs.
#
# Wrapped in `bash -c` because pixi's deno_task_shell does not expand
# ${CMAKE_ARGS} in inline `VAR="..." cmd` assignments — the unexpanded
# token reaches make, which then fails with a recursive-variable error.
# Appending (rather than overriding) preserves the conda-seeded
# -DCMAKE_AR / -DCMAKE_RANLIB values needed for the host build.
test = { cmd = "bash -c 'CMAKE_ARGS=\"${CMAKE_ARGS} -DFUZZTEST_FUZZING_MODE=OFF\" make tests'", description = "Build and run PX4 unit tests" }

# Build housekeeping / discovery
clean = { cmd = "make clean", description = "Clean build artifacts" }
distclean = { cmd = "make distclean", description = "Remove build/ and downloaded artifacts" }
boardconfig = { cmd = "make boardconfig", description = "Open kconfig menu for the current board" }
list-targets = { cmd = "make list_config_targets", description = "List available board targets" }

# Pre-commit aggregate: fast checks to run before every commit.
[tasks.precommit]
depends-on = ["format-changed", "check-format", "check-newlines"]
description = "Pre-commit checks: format-changed + check-format + check-newlines"

# Pre-PR aggregate: every CI Gate Checks item plus unit tests. Slower, but
# what CI will run. Does not build firmware — invoke `build` separately for
# the boards you care about.
[tasks.pr-check]
depends-on = [
    "check-format",
    "check-newlines",
    "validate-configs",
    "shellcheck",
    "module-docs",
    "test",
]
description = "All CI Gate Checks + unit tests"
