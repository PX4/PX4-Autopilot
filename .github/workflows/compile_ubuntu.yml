name: Ubuntu environment build

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - 'docs/**'

env:
  RUNS_IN_DOCKER: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build and Test
    strategy:
      fail-fast: false
      matrix:
        version: ['ubuntu:22.04', 'ubuntu:24.04']
    runs-on: [runs-on,runner=4cpu-linux-x64,"image=ubuntu24-full-x64","run-id=${{ github.run_id }}",spot=false,extras=s3-cache]
    container:
      image: ${{ matrix.version }}
      volumes:
        - /github/workspace:/github/workspace
    steps:
      - uses: runs-on/action@v2

      - name: Fix git in container
        run: |
          # we only need this because we are running the job in a container
          # when checkout pulls git it does it in a shared volume
          # and file ownership changes between steps
          # first we install git since its missing from the base image
          # then we mark the directory as safe for other instances
          # of git to use.
          apt update && apt install git -y
          git config --global --add safe.directory $(realpath .)

      - uses: actions/checkout@v6

      - name: Use AWS regional apt mirror
        if: startsWith(runner.name, 'runs-on--')
        run: ./Tools/ci/use_aws_apt_mirror.sh

      - name: Install Deps
        run: |
          # Install against the EC2 mirror; if it fails (e.g. a transient pool-lag
          # 404 during a package rollout), fall back to the canonical archive and
          # retry once -- the mirror has usually converged by then.
          if ! ./Tools/setup/ubuntu.sh; then
            echo "::warning::apt install failed on EC2 mirror, falling back to canonical archive"
            ./Tools/ci/use_aws_apt_mirror.sh --restore
            ./Tools/setup/ubuntu.sh
          fi

      - uses: ./.github/actions/setup-ccache
        id: ccache
        with:
          cache-key-prefix: ccache-ubuntu-${{ matrix.version }}
          max-size: 200M

      - name: Build px4_sitl_default
        run: make px4_sitl_default

      - name: Build px4_fmu-v5_default
        run: make px4_fmu-v5_default

      - uses: ./.github/actions/save-ccache
        if: always()
        with:
          cache-primary-key: ${{ steps.ccache.outputs.cache-primary-key }}
