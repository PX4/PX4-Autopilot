# SIH (Simulation-In-Hardware) MAVSDK tests.
# SIH runs the simulator inside the PX4 instance, so unlike the Gazebo SITL tests
# (see sitl_tests.yml) it needs no separate simulator build.

name: SIH Tests

on:
  push:
    branches:
    - 'main'
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches:
    - '**'
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sih_tests:
    name: Testing PX4 SIH
    runs-on: [runs-on,runner=8cpu-linux-x64,image=ubuntu24-full-x64,"run-id=${{ github.run_id }}",spot=false,extras=s3-cache]
    container:
      image: px4io/px4-dev:v1.16.2
    env:
      PX4_SBOM_DISABLE: 1

    steps:
      - uses: runs-on/action@v2
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure Git Safe Directory
        run: git config --system --add safe.directory '*'

      - uses: ./.github/actions/setup-ccache
        id: ccache
        with:
          cache-key-prefix: ccache-sih-tests

      - uses: ./.github/actions/setup-mavsdk
        with:
          ubuntu-version: '24.04'

      - name: Build PX4 / MAVSDK tests
        env:
          DONT_RUN: 1
        run: make px4_sitl_default mavsdk_tests

      - uses: ./.github/actions/save-ccache
        if: always()
        with:
          cache-primary-key: ${{ steps.ccache.outputs.cache-primary-key }}

      - name: Run SIH / MAVSDK Tests
        run: test/mavsdk_tests/mavsdk_test_runner.py --speed-factor 10 --abort-early test/mavsdk_tests/configs/sitl_sih.json --verbose --force-color
        timeout-minutes: 20

      - name: Upload failed logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: failed-sih-logs.zip
          path: |
            logs/**/**/**/*.log
            logs/**/**/**/*.ulg
            build/px4_sitl_default/tmp_mavsdk_tests/rootfs/log/**/*.ulg
