name: MacOS build

on:
  push:
    branches:
    - 'main'
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: install Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - uses: actions/checkout@v6

    - name: Cache - Restore Homebrew Packages
      uses: actions/cache@v5
      with:
        path: ~/Library/Caches/Homebrew/downloads
        key: macos-homebrew-${{ runner.arch }}-${{ hashFiles('Tools/setup/macos.sh') }}
        restore-keys: |
          macos-homebrew-${{ runner.arch }}-

    - name: Cache - Restore pip Packages
      uses: actions/cache@v5
      with:
        path: ~/Library/Caches/pip
        key: macos-pip-${{ runner.arch }}-${{ hashFiles('Tools/setup/requirements.txt') }}
        restore-keys: |
          macos-pip-${{ runner.arch }}-

    - name: setup
      run: |
        ./Tools/setup/macos.sh
        # Make the venv created by macos.sh the active Python for all
        # subsequent steps. Prepending .venv/bin to PATH alone is not
        # enough: actions/setup-python exports Python3_ROOT_DIR /
        # pythonLocation pointing at the hostedtoolcache interpreter,
        # and find_package(Python3) honours those hints over PATH. The
        # PX4 Python deps (kconfiglib, empy, etc.) only live in the
        # venv, so configure fails at the kconfiglib import otherwise.
        echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
        echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV
        echo "Python3_ROOT_DIR=${{ github.workspace }}/.venv" >> $GITHUB_ENV
        echo "Python_ROOT_DIR=${{ github.workspace }}/.venv" >> $GITHUB_ENV
        echo "pythonLocation=${{ github.workspace }}/.venv" >> $GITHUB_ENV

    - uses: ./.github/actions/setup-ccache
      id: ccache
      with:
        cache-key-prefix: ccache-macos
        max-size: 200M

    - name: Build px4_sitl
      run: make px4_sitl

    - name: Cache - Stats after px4_sitl
      run: ccache -s

    - name: Build px4_fmu-v5_default
      run: make px4_fmu-v5_default

    - uses: ./.github/actions/save-ccache
      if: always()
      with:
        cache-primary-key: ${{ steps.ccache.outputs.cache-primary-key }}
