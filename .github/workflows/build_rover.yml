name: Build CubeOrangePlus Rover

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'Vetri2425/**'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout PX4 v1.16.2
        uses: actions/checkout@v4
        with:
          repository: PX4/PX4-Autopilot
          ref: v1.16.2
          submodules: recursive

      - name: Fetch NuttX submodule tags
        run: |
          cd platforms/nuttx/NuttX/nuttx
          git fetch --tags --depth=1

      - name: Checkout rover patches from fork
        uses: actions/checkout@v4
        with:
          repository: Vetri2425/PX4-Autopilot
          ref: main
          path: fork_patches

      - name: Apply rover patches
        run: |
          cp fork_patches/boards/cubepilot/cubeorangeplus/rover.px4board \
             boards/cubepilot/cubeorangeplus/rover.px4board
          cp fork_patches/src/modules/rover_differential/RoverDifferential.cpp \
             src/modules/rover_differential/RoverDifferential.cpp
          cp fork_patches/src/modules/rover_differential/RoverDifferential.hpp \
             src/modules/rover_differential/RoverDifferential.hpp
          cp fork_patches/src/modules/rover_differential/module.yaml \
             src/modules/rover_differential/module.yaml
          cp fork_patches/src/modules/land_detector/RoverLandDetector.cpp \
             src/modules/land_detector/RoverLandDetector.cpp

      - name: Install dependencies
        run: |
          bash ./Tools/setup/ubuntu.sh --no-sim-tools
          pip3 install packaging

      - name: Build rover firmware
        run: make cubepilot_cubeorangeplus_rover

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cubeorangeplus_rover_firmware
          path: build/cubepilot_cubeorangeplus_rover/cubepilot_cubeorangeplus_rover.px4
